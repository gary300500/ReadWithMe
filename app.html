<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>ReadWithMe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f3ea;
  --bg-soft: #fbf7f0;
  --surface: rgba(255, 252, 247, 0.88);
  --surface-strong: #fffaf5;
  --surface-muted: #f4ecde;
  --text: #1f1b16;
  --text-soft: #6c665f;
  --text-muted: #a0968a;
  --border: rgba(171, 137, 95, 0.18);
  --border-strong: rgba(171, 137, 95, 0.28);
  --accent: #b67a2f;
  --accent-dark: #9b6422;
  --accent-soft: #efe0c8;
  --danger: #c85f4b;
  --shadow: 0 18px 40px rgba(80, 54, 24, 0.12);
  --hairline: rgba(77, 54, 31, 0.08);
  --sans: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  --serif: "Noto Serif SC", "Songti SC", "STSong", serif;
}

* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  height: 100%;
  margin: 0;
}

body {
  overflow: hidden;
  color: var(--text);
  background:
    radial-gradient(circle at 20% 10%, rgba(211, 183, 140, 0.18), transparent 30%),
    radial-gradient(circle at 85% 0%, rgba(255, 255, 255, 0.78), transparent 28%),
    #f0ece6;
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
}

#root {
  position: relative;
  width: min(100vw, 430px);
  height: 100dvh;
  margin: 0 auto;
  overflow: hidden;
  background:
    radial-gradient(circle at 84% 8%, rgba(255, 255, 255, 0.74), transparent 22%),
    linear-gradient(180deg, #fbf7f0 0%, #f8f3ea 52%, #fbf7f0 100%);
}

button,
input,
textarea {
  font: inherit;
}

button {
  margin: 0;
  padding: 0;
  color: inherit;
  background: none;
  border: 0;
  cursor: pointer;
}

input,
textarea {
  color: var(--text);
}

::-webkit-scrollbar {
  width: 4px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: rgba(166, 122, 67, 0.22);
  border-radius: 999px;
}

@media (min-width: 760px) {
  #root {
    height: min(100dvh - 28px, 932px);
    margin-top: 14px;
    border: 10px solid #111;
    border-radius: 42px;
    box-shadow: 0 24px 65px rgba(0, 0, 0, 0.22);
  }
}

.app-screen {
  position: relative;
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background:
    radial-gradient(circle at 86% 7%, rgba(255, 255, 255, 0.82), transparent 21%),
    linear-gradient(180deg, #fbf7f0 0%, #f8f3ea 55%, #fbf7f0 100%);
}

.scroll-area {
  flex: 1;
  min-height: 0;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

.statusbar {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 44px;
  padding: 0 22px;
  flex: 0 0 44px;
  color: var(--text);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.01em;
}

.statusbar .island {
  position: absolute;
  left: 50%;
  top: 8px;
  width: 126px;
  height: 36px;
  transform: translateX(-50%);
  border-radius: 999px;
  background: #050505;
  box-shadow: inset -19px 0 0 rgba(28, 75, 142, 0.25);
}

.status-icons {
  display: flex;
  align-items: center;
  gap: 7px;
}

.signal {
  display: inline-flex;
  align-items: flex-end;
  gap: 2px;
  height: 13px;
}

.signal i {
  display: block;
  width: 3px;
  background: #111;
  border-radius: 2px;
}

.signal i:nth-child(1) { height: 4px; }
.signal i:nth-child(2) { height: 7px; }
.signal i:nth-child(3) { height: 10px; }
.signal i:nth-child(4) { height: 13px; }

.wifi {
  position: relative;
  width: 15px;
  height: 12px;
}

.wifi::before,
.wifi::after {
  position: absolute;
  left: 50%;
  content: "";
  transform: translateX(-50%);
  border: 2px solid #111;
  border-bottom: 0;
  border-radius: 14px 14px 0 0;
}

.wifi::before {
  top: 0;
  width: 14px;
  height: 8px;
}

.wifi::after {
  top: 5px;
  width: 8px;
  height: 5px;
}

.battery {
  position: relative;
  width: 23px;
  height: 12px;
  border: 1.8px solid #111;
  border-radius: 4px;
}

.battery::before {
  position: absolute;
  right: -4px;
  top: 3px;
  width: 2px;
  height: 5px;
  content: "";
  background: #111;
  border-radius: 0 2px 2px 0;
}

.battery::after {
  position: absolute;
  left: 2px;
  top: 2px;
  width: 15px;
  height: 6px;
  content: "";
  background: #111;
  border-radius: 2px;
}

.top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.brand {
  color: #4f4a44;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: -0.02em;
}

.round-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  color: var(--text);
  border-radius: 999px;
  background: rgba(241, 230, 210, 0.78);
  transition: transform 160ms ease, background 160ms ease;
}

.round-button:active {
  transform: scale(0.96);
}

.screen-body {
  padding: 10px 18px 0;
}

.library-scroll {
  padding-bottom: 98px;
}

.screen-title-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 26px 0 18px;
}

.screen-title {
  margin: 0;
  color: var(--text);
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 700;
  line-height: 1.08;
  letter-spacing: -0.01em;
}

.count-pill {
  display: inline-flex;
  align-items: center;
  height: 26px;
  padding: 0 12px;
  color: #81776b;
  background: rgba(235, 229, 219, 0.82);
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
}

.import-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 16px 17px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
  border-radius: 17px;
  background: rgba(255, 252, 247, 0.84);
  box-shadow: 0 9px 26px rgba(80, 54, 24, 0.07);
}

.import-left {
  display: flex;
  align-items: center;
  gap: 16px;
  min-width: 0;
}

.import-icon {
  position: relative;
  display: grid;
  place-items: center;
  width: 70px;
  height: 70px;
  flex: 0 0 auto;
  color: #fff;
  border-radius: 10px;
  background: linear-gradient(145deg, #f6ead4, #fff7ec);
}

.import-icon::before {
  width: 32px;
  height: 26px;
  content: "";
  border-radius: 4px 4px 7px 7px;
  background: linear-gradient(180deg, #b58242, #9d642b);
  box-shadow: inset 0 8px 0 rgba(255, 255, 255, 0.2);
}

.import-icon svg {
  position: absolute;
  bottom: 19px;
  color: #fffaf5;
}

.import-card h2 {
  margin: 0 0 6px;
  color: #2a261f;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.import-card p {
  margin: 0;
  color: var(--text-muted);
  font-size: 13px;
}

.chevron {
  color: #7c7267;
}

.privacy-card {
  display: flex;
  gap: 13px;
  align-items: flex-start;
  padding: 14px 16px;
  margin-bottom: 14px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(255, 250, 245, 0.46);
}

.privacy-badge {
  display: grid;
  place-items: center;
  width: 24px;
  height: 24px;
  flex: 0 0 auto;
  color: var(--accent);
}

.privacy-title {
  margin-bottom: 4px;
  color: var(--text-soft);
  font-size: 13px;
  font-weight: 700;
}

.privacy-text {
  color: var(--text-muted);
  font-size: 12px;
  line-height: 1.5;
}

.book-list {
  display: grid;
  gap: 10px;
  padding: 0;
}

.book-row {
  display: flex;
  width: 100%;
  gap: 14px;
  padding: 10px;
  text-align: left;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(255, 252, 247, 0.72);
  box-shadow: 0 8px 18px rgba(80, 54, 24, 0.04);
}

.book-cover {
  position: relative;
  width: 64px;
  height: 92px;
  flex: 0 0 auto;
  overflow: hidden;
  border-radius: 7px;
  color: #fff;
  background: linear-gradient(145deg, #111823, #4e6674);
  box-shadow: 0 7px 14px rgba(46, 29, 12, 0.16);
}

.book-cover::before {
  position: absolute;
  inset: 0;
  content: "";
  background:
    radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.24), transparent 24%),
    linear-gradient(115deg, transparent 0%, rgba(255, 255, 255, 0.1) 46%, transparent 47%);
}

.book-cover::after {
  position: absolute;
  left: 0;
  top: 0;
  width: 12px;
  height: 100%;
  content: "";
  background: rgba(0, 0, 0, 0.16);
}

.cover-title {
  position: absolute;
  left: 16px;
  right: 10px;
  top: 15px;
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 700;
  line-height: 1.08;
  writing-mode: vertical-rl;
  letter-spacing: 0.08em;
  text-shadow: 0 2px 6px rgba(0, 0, 0, 0.22);
}

.cover-mark {
  position: absolute;
  left: 15px;
  bottom: 8px;
  color: rgba(255, 255, 255, 0.74);
  font-size: 8px;
  font-weight: 800;
  letter-spacing: 0.12em;
}

.cover-1 { background: linear-gradient(150deg, #111823, #587181 60%, #1f2228); }
.cover-2 { background: linear-gradient(150deg, #120c08, #a15b15 58%, #2b1710); }
.cover-3 { background: linear-gradient(150deg, #d88c48, #49362d 57%, #161111); }
.cover-4 { background: linear-gradient(150deg, #e7d6b9, #5d6a6d 54%, #332f2b); }
.cover-5 { background: linear-gradient(150deg, #132134, #4b769b 58%, #09111c); }
.cover-6 { background: linear-gradient(150deg, #2a170f, #8b5c2c 58%, #15100d); }

.book-info {
  min-width: 0;
  flex: 1;
  padding-top: 2px;
}

.book-row-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}

.book-title {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  overflow: hidden;
  color: #241f18;
  font-size: 16px;
  font-weight: 800;
  line-height: 1.35;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.more-button {
  display: grid;
  place-items: center;
  width: 26px;
  height: 26px;
  flex: 0 0 auto;
  color: #81786d;
  border-radius: 999px;
}

.more-button:active {
  background: rgba(166, 122, 67, 0.12);
}

.book-percent {
  margin-top: 5px;
  color: #7f776c;
  font-size: 13px;
  font-weight: 600;
}

.new-pill {
  display: inline-flex;
  align-items: center;
  height: 18px;
  padding: 0 7px;
  color: #fff;
  border-radius: 999px;
  background: #8a4e20;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.02em;
}

.progress-track {
  width: 150px;
  max-width: 100%;
  height: 4px;
  margin: 7px 0 7px;
  overflow: hidden;
  border-radius: 999px;
  background: #e6ded3;
}

.progress-fill {
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, #9b6422, #c78a3a);
}

.last-read {
  overflow: hidden;
  color: #9f9588;
  font-size: 12px;
  line-height: 1.4;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.bottom-nav {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 82px;
  padding: 8px 42px 16px;
  border-top: 1px solid rgba(132, 103, 68, 0.08);
  background: rgba(251, 247, 240, 0.86);
  backdrop-filter: blur(18px);
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  min-width: 72px;
  color: #8f8578;
  font-size: 13px;
  font-weight: 700;
}

.nav-item.active {
  color: var(--accent);
}

.empty-state {
  padding: 34px 18px;
  color: var(--text-muted);
  text-align: center;
}

.empty-state h3 {
  margin: 10px 0 6px;
  color: var(--text);
  font-size: 17px;
}

.delete-dialog {
  position: fixed;
  inset: 0;
  z-index: 90;
  display: grid;
  place-items: center;
  padding: 26px;
  background: rgba(0, 0, 0, 0.32);
}

.dialog-card {
  width: min(100%, 318px);
  padding: 24px;
  text-align: center;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--surface-strong);
  box-shadow: var(--shadow);
}

.dialog-card h3 {
  margin: 0 0 8px;
  font-size: 17px;
}

.dialog-card p {
  margin: 0 0 20px;
  color: var(--text-soft);
  font-size: 13px;
  line-height: 1.55;
}

.dialog-actions {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.toast {
  position: absolute;
  left: 50%;
  top: 112px;
  z-index: 150;
  display: flex;
  align-items: center;
  gap: 10px;
  width: min(328px, calc(100% - 32px));
  min-height: 64px;
  padding: 12px 16px;
  color: #fff;
  transform: translateX(-50%);
  border-radius: 10px;
  background: rgba(24, 24, 24, 0.92);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
}

.toast-icon {
  display: grid;
  place-items: center;
  width: 28px;
  height: 28px;
  flex: 0 0 auto;
  border-radius: 999px;
  background: #39b54a;
  color: #fff;
  font-weight: 900;
}

.toast-title {
  font-size: 15px;
  font-weight: 900;
}

.toast-subtitle {
  margin-top: 2px;
  color: rgba(255, 255, 255, 0.78);
  font-size: 12px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 46px;
  padding: 0 18px;
  border-radius: 11px;
  font-size: 14px;
  font-weight: 800;
}

.btn:disabled {
  cursor: not-allowed;
  opacity: 0.58;
}

.btn-outline {
  color: var(--accent);
  border: 1px solid rgba(182, 122, 47, 0.72);
  background: rgba(255, 255, 255, 0.62);
}

.btn-primary {
  color: #fff;
  background: linear-gradient(180deg, #be8439, #a96c25);
}

.btn-danger {
  color: #fff;
  background: var(--danger);
}

.topbar {
  display: grid;
  grid-template-columns: 44px 1fr 44px;
  align-items: center;
  gap: 8px;
  min-height: 54px;
  padding: 2px 18px 8px;
}

.topbar-title {
  overflow: hidden;
  color: #575148;
  font-size: 14px;
  font-weight: 700;
  text-align: center;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.book-detail-body {
  padding: 2px 18px 110px;
}

.book-summary {
  display: grid;
  grid-template-columns: 78px 1fr;
  gap: 14px;
  align-items: center;
  margin: 8px 0 16px;
}

.book-summary .book-cover {
  width: 78px;
  height: 112px;
}

.book-summary-title {
  color: #241f18;
  font-size: 18px;
  font-weight: 900;
}

.book-summary-meta {
  margin-top: 7px;
  color: #8b8176;
  font-size: 13px;
  line-height: 1.5;
}

.continue-btn {
  width: 100%;
  height: 44px;
  margin: 4px 0 18px;
  color: #fff;
  border-radius: 8px;
  background: linear-gradient(180deg, #a66328, #7d3e12);
  font-size: 14px;
  font-weight: 900;
  box-shadow: 0 8px 18px rgba(124, 66, 19, 0.14);
}

.ai-pregen-card {
  margin: -2px 0 22px;
  padding: 14px 16px;
  border: 1px solid rgba(116, 89, 58, 0.12);
  border-radius: 8px;
  background: rgba(255, 251, 245, 0.72);
}

.ai-pregen-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.ai-pregen-title {
  color: #2f261d;
  font-size: 15px;
  font-weight: 900;
}

.ai-pregen-meta {
  display: block;
  margin-top: 5px;
  color: #8d8174;
  font-size: 12px;
  line-height: 1.45;
}

.ai-pregen-status {
  flex: 0 0 auto;
  color: #9b6b36;
  font-size: 12px;
  font-weight: 850;
  white-space: nowrap;
}

.ai-pregen-actions {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin-top: 12px;
}

.ai-pregen-actions button {
  min-height: 34px;
  padding: 0 10px;
  color: #4a3827;
  border: 1px solid rgba(116, 89, 58, 0.14);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.62);
  font-size: 12px;
  font-weight: 850;
}

.ai-pregen-actions button:disabled {
  color: #b6afa7;
  background: rgba(240, 234, 226, 0.46);
}

.ai-pregen-dialog .dialog-card {
  max-width: 320px;
}

.ai-comment-pregen-dialog .dialog-card {
  max-width: 360px;
  background: #fffaf5;
}

.ai-comment-pregen-dialog .ai-pregen-card {
  margin: 0;
  background: #fffaf5;
  border-color: rgba(116, 89, 58, 0.14);
}

.ai-comment-pregen-dialog .ai-pregen-actions button {
  background: #fff;
}

.ai-comment-pregen-dialog .ai-pregen-actions button:disabled {
  background: #f1ece5;
}

.ai-pregen-input {
  width: 100%;
  height: 42px;
  margin-top: 12px;
  padding: 0 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  outline: none;
  background: #fff;
  font-size: 14px;
}

.book-personas-card {
  margin: 0 0 14px;
  padding: 14px 16px;
  border: 1px solid rgba(116, 89, 58, 0.12);
  border-radius: 8px;
  background: rgba(255, 252, 247, 0.78);
}

.book-personas-open {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  width: 100%;
  min-height: 42px;
  color: #2f261d;
  text-align: left;
}

.book-personas-title {
  display: block;
  font-size: 15px;
  font-weight: 900;
}

.book-personas-meta {
  display: block;
  margin-top: 5px;
  color: #8d8174;
  font-size: 12px;
  line-height: 1.45;
}

.book-personas-count {
  flex: 0 0 auto;
  color: #9b6b36;
  font-size: 12px;
  font-weight: 850;
  white-space: nowrap;
}

.book-personas-dialog .dialog-card {
  max-width: 360px;
  overflow: hidden;
}

.book-personas-tools {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
  margin: 12px 0;
}

.book-personas-tools button {
  min-height: 32px;
  color: #6f5234;
  font-size: 12px;
  font-weight: 850;
  border-radius: 8px;
  background: rgba(126, 86, 46, 0.08);
}

.book-personas-list {
  display: grid;
  gap: 8px;
  width: 100%;
  max-height: 340px;
  overflow-x: hidden;
  overflow-y: auto;
}

.book-persona-row {
  display: grid;
  grid-template-columns: 34px minmax(0, 1fr);
  align-items: center;
  gap: 10px;
  width: 100%;
  min-width: 0;
  min-height: 54px;
  padding: 9px 10px;
  text-align: left;
  box-sizing: border-box;
  border: 1px solid rgba(116, 89, 58, 0.1);
  border-radius: 8px;
  background: #fff;
}

.book-persona-row > div:not(.avatar) {
  min-width: 0;
}

.book-persona-row .persona-title,
.book-persona-row .persona-desc {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.book-persona-row .check-box {
  display: none;
}

.book-persona-row[data-selected="true"] {
  border-color: rgba(145, 92, 39, 0.42);
  background: #fff1df;
}

.volume-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  color: #4e4439;
  font-size: 14px;
  font-weight: 900;
}

.chapters-body {
  padding: 6px 18px 24px;
}

.chapter-hero {
  margin: 8px 0 16px;
}

.chapter-hero h1 {
  margin: 0 0 8px;
  color: var(--text);
  font-family: var(--serif);
  font-size: 27px;
  letter-spacing: -0.04em;
}

.chapter-hero p {
  margin: 0;
  color: var(--text-muted);
  font-size: 13px;
}

.chapter-row {
  width: 100%;
  padding: 10px 12px;
  margin-bottom: 6px;
  text-align: left;
  border: 0;
  border-radius: 8px;
  background: transparent;
}

.chapter-row.current {
  background: #f4eadc;
}

.chapter-title {
  overflow: hidden;
  color: #241f18;
  font-size: 16px;
  font-weight: 800;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.chapter-meta {
  margin-top: 5px;
  color: var(--text-muted);
  font-size: 12px;
}

.bottom-sheet-backdrop {
  position: absolute;
  inset: 0;
  z-index: 95;
  background: rgba(0, 0, 0, 0.36);
}

.plain-backdrop {
  background: rgba(0, 0, 0, 0.02);
}

.sheet-panel {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 100;
  border-radius: 18px 18px 0 0;
  background: rgba(255, 252, 247, 0.98);
  box-shadow: 0 -18px 40px rgba(52, 35, 17, 0.18);
  animation: sheetIn 230ms cubic-bezier(0.22, 0.8, 0.22, 1);
}

.action-row {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  height: 54px;
  padding: 0 20px;
  color: #2c251e;
  text-align: left;
  border-bottom: 1px solid var(--hairline);
  font-size: 15px;
  font-weight: 800;
}

.action-row.danger {
  color: #cf3e2e;
}

.action-cancel {
  width: 100%;
  height: 52px;
  color: #6d6257;
  font-size: 15px;
  font-weight: 800;
}

.reader-screen {
  background: linear-gradient(180deg, #fbf7f0, #f8f3ea 72%, #fbf7f0);
}

.reader-scroll {
  padding: 4px 24px 92px;
}

.reader-title-muted {
  margin: 0 0 24px;
  color: #b1a697;
  font-size: 10px;
  font-weight: 500;
}

.reader-article {
  padding-top: 10px;
}

.reader-p {
  margin: 0 0 24px;
  color: #222;
  font-family: var(--serif);
  font-size: var(--reader-font-size, 20px);
  font-weight: 500;
  line-height: var(--reader-line-height, 1.84);
  letter-spacing: 0.02em;
  text-indent: 2em;
}

.comment-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 24px;
  height: 22px;
  margin-left: 6px;
  padding: 0 8px;
  color: #8f6b3d;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 800;
  line-height: 1;
  text-indent: 0;
  vertical-align: middle;
  border: 1px solid rgba(143, 107, 61, 0.32);
  border-radius: 8px 8px 8px 2px;
  background: rgba(255, 250, 245, 0.5);
}

.comment-badge.active {
  color: #fff;
  border-color: var(--accent);
  background: var(--accent);
}

.chapter-end-discussion {
  margin: 38px 0 28px;
  padding-top: 18px;
  border-top: 1px solid rgba(100, 84, 62, 0.16);
}

.chapter-end-discussion-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 0;
  color: #342a20;
  text-align: left;
}

.chapter-end-title {
  display: flex;
  align-items: baseline;
  gap: 8px;
  min-width: 0;
  font-size: 17px;
  font-weight: 900;
}

.chapter-end-count {
  color: #9b6b36;
  font-size: 12px;
  font-weight: 800;
  white-space: nowrap;
}

.chapter-end-meta {
  margin-top: 8px;
  color: #9b907f;
  font-size: 12px;
  line-height: 1.5;
}

.chapter-end-preview-list {
  display: grid;
  gap: 9px;
  margin-top: 14px;
}

.chapter-end-preview {
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: 9px;
  align-items: flex-start;
  padding: 11px 0;
  text-align: left;
  border-top: 1px solid rgba(100, 84, 62, 0.1);
}

.chapter-end-preview-avatar {
  display: grid;
  place-items: center;
  width: 28px;
  height: 28px;
  color: #fff;
  font-size: 12px;
  font-weight: 900;
  border-radius: 50%;
  background: var(--avatar-bg, var(--accent));
}

.chapter-end-preview-name {
  display: block;
  color: #6d5f4d;
  font-size: 12px;
  font-weight: 800;
}

.chapter-end-preview-text {
  display: block;
  margin-top: 3px;
  color: #3e3429;
  font-size: 13px;
  line-height: 1.55;
}

.chapter-end-composer {
  width: 100%;
  min-height: 42px;
  margin-top: 12px;
  padding: 0 14px;
  color: #9b907f;
  text-align: left;
  font-size: 13px;
  border: 1px solid rgba(100, 84, 62, 0.16);
  border-radius: 8px;
  background: rgba(255, 250, 244, 0.54);
}

.reader-article > .legacy-chapter-discussion {
  display: none;
}

.reader-progress {
  position: absolute;
  left: 18px;
  right: 18px;
  bottom: 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: #a59c90;
  font-size: 11px;
}

.chapter-jump-panel {
  padding: 10px 18px 18px;
}

.reader-paragraph-wrap {
  position: relative;
}

.paragraph-action-bar {
  position: absolute;
  left: 2em;
  top: calc(100% - 18px);
  z-index: 14;
  display: flex;
  align-items: center;
  gap: 8px;
  width: fit-content;
  max-width: calc(100% - 2em);
  margin: 0;
  padding: 6px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 8px;
  background: rgba(0, 0, 0, 0.9);
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
}

.paragraph-action-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 36px;
  padding: 0 12px;
  color: #fff;
  font-size: 13px;
  font-weight: 850;
  white-space: nowrap;
  border: 0;
  border-radius: 7px;
  background: rgba(255, 255, 255, 0.12);
}

.jump-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin: 4px 0 16px;
  color: #2b241c;
  font-size: 13px;
  font-weight: 900;
}

.jump-progress {
  color: #7d7063;
  font-size: 12px;
  font-weight: 800;
}

.jump-range {
  width: 100%;
  accent-color: var(--accent);
}

.jump-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 14px;
  color: #4c4339;
  font-size: 13px;
  font-weight: 800;
}

.reading-setting-panel {
  padding: 10px 18px 24px;
}

.sheet-row {
  display: grid;
  grid-template-columns: 74px 1fr;
  align-items: center;
  gap: 12px;
  min-height: 48px;
  color: #2f2923;
  font-size: 13px;
  font-weight: 800;
}

.stepper {
  display: grid;
  grid-template-columns: 1fr 56px 1fr;
  overflow: hidden;
  height: 36px;
  border-radius: 8px;
  background: #f4efe8;
}

.stepper button,
.stepper span {
  display: grid;
  place-items: center;
  color: #3f382f;
  font-size: 13px;
  font-weight: 800;
}

.swatches {
  display: flex;
  align-items: center;
  gap: 13px;
}

.swatch {
  width: 28px;
  height: 28px;
  border-radius: 999px;
  border: 1px solid rgba(0, 0, 0, 0.04);
}

.swatch.active {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

.spacing-options {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.spacing-option {
  height: 36px;
  color: #7d7368;
  border-radius: 8px;
  background: #f4efe8;
}

.spacing-option.active {
  color: #fff;
  background: #c4a17c;
}

.summon-panel {
  padding: 10px 18px 20px;
}

.summon-title {
  margin: 0 0 8px;
  color: #1f1f1f;
  font-size: 18px;
  font-weight: 900;
}

.summon-subtitle {
  margin: 0 0 12px;
  color: #9a9188;
  font-size: 12px;
}

.summon-row {
  display: grid;
  grid-template-columns: 42px 1fr 24px;
  gap: 10px;
  align-items: center;
  min-height: 54px;
}

.check-box {
  display: grid;
  place-items: center;
  width: 22px;
  height: 22px;
  color: transparent;
  border: 1.5px solid #cfc5ba;
  border-radius: 5px;
}

.check-box.on {
  color: #fff;
  border-color: var(--accent);
  background: var(--accent);
}

.summon-button {
  width: 100%;
  height: 46px;
  margin-top: 12px;
  color: #fff;
  border-radius: 9px;
  background: linear-gradient(180deg, #9d5a22, #7b3c12);
  font-size: 15px;
  font-weight: 900;
}

.reader-progress button {
  color: #9e9e9e;
  font-size: 11px;
}

.reader-progress-middle {
  display: flex;
  align-items: center;
  gap: 10px;
}

.mini-track {
  width: 84px;
  height: 3px;
  overflow: hidden;
  border-radius: 999px;
  background: #e5dccf;
}

.mini-fill {
  height: 100%;
  border-radius: inherit;
  background: #c88833;
}

.comment-sheet-backdrop {
  position: absolute;
  inset: 0;
  z-index: 60;
  background: linear-gradient(180deg, transparent, rgba(61, 44, 25, 0.04));
}

.comment-sheet {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 70;
  display: flex;
  flex-direction: column;
  max-height: 55%;
  min-height: 385px;
  border-radius: 22px 22px 0 0;
  background: rgba(255, 252, 247, 0.96);
  box-shadow: 0 -14px 34px rgba(67, 45, 20, 0.12);
  animation: sheetIn 260ms cubic-bezier(0.22, 0.8, 0.22, 1);
}

@keyframes sheetIn {
  from { transform: translateY(35%); opacity: 0.4; }
  to { transform: translateY(0); opacity: 1; }
}

.sheet-grabber {
  width: 42px;
  height: 4px;
  margin: 10px auto 4px;
  border-radius: 999px;
  background: rgba(70, 48, 24, 0.22);
}

.sheet-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px 12px;
}

.sheet-title-wrap {
  display: flex;
  align-items: baseline;
  gap: 14px;
}

.sheet-title {
  color: #1f1f1f;
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.04em;
}

.sheet-subtitle {
  color: #9c948a;
  font-size: 12px;
  font-weight: 600;
}

.sheet-close {
  display: grid;
  place-items: center;
  width: 38px;
  height: 38px;
  color: #222;
  border-radius: 999px;
  background: #f3eee6;
}

.sheet-tabs {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px 10px;
  color: #9a9a9a;
  font-size: 12px;
  border-bottom: 1px solid var(--hairline);
}

.sheet-tabs strong {
  position: relative;
  color: #2e2e2e;
}

.sheet-tabs strong::after {
  position: absolute;
  left: 50%;
  bottom: -10px;
  width: 16px;
  height: 2px;
  content: "";
  transform: translateX(-50%);
  border-radius: 999px;
  background: var(--accent);
}

.sheet-tab-group {
  display: flex;
  align-items: center;
  gap: 18px;
}

.comments-list {
  flex: 1;
  min-height: 0;
  overflow: auto;
  padding: 0 18px;
}

.comment-item {
  display: grid;
  grid-template-columns: 42px 1fr 34px;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid rgba(95, 78, 57, 0.08);
}

.comment-thread {
  border-bottom: 1px solid var(--hairline);
}

.comment-thread > .comment-item {
  border-bottom: 0;
}

.comment-item.reply {
  grid-template-columns: 30px minmax(0, 1fr) 32px;
  gap: 9px;
  align-items: flex-start;
  padding: 10px 0;
  border-bottom: 0;
}

.comment-item.reply .avatar {
  width: 30px;
  height: 30px;
  font-size: 13px;
}

.avatar {
  display: grid;
  place-items: center;
  width: 42px;
  height: 42px;
  overflow: hidden;
  color: rgba(48, 36, 24, 0.86);
  border: 1px solid rgba(255, 255, 255, 0.72);
  border-radius: 999px;
  background: var(--avatar-bg, #ffd6d6);
  font-size: 20px;
  box-shadow: 0 5px 12px rgba(92, 68, 36, 0.08);
}

.comment-main {
  min-width: 0;
}

.comment-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 7px;
  margin-bottom: 5px;
}

.comment-name {
  color: #222;
  font-size: 14px;
  font-weight: 800;
}

.tag {
  height: 20px;
  padding: 0 7px;
  color: #b46c2c;
  border-radius: 6px;
  background: #fff0df;
  font-size: 10px;
  font-weight: 800;
  line-height: 20px;
}

.comment-text {
  color: #2a2a2a;
  font-size: 14px;
  line-height: 1.55;
}

.comment-reply-to {
  color: #a06225;
  font-weight: 800;
}

.comment-actions {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 8px;
}

.comment-action-button {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  min-height: 24px;
  padding: 0;
  color: #8b7e70;
  font-size: 12px;
  font-weight: 800;
}

.comment-replies {
  margin: -4px 0 10px 54px;
  padding-left: 12px;
  border-left: 2px solid rgba(180, 130, 73, 0.16);
}

.reply-more-button {
  min-height: 30px;
  margin: 0 0 8px;
  color: #9b6b36;
  font-size: 12px;
  font-weight: 850;
}

.replying-strip {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 7px 16px 0;
  color: #8b7e70;
  font-size: 12px;
  font-weight: 800;
  background: rgba(255, 252, 247, 0.96);
}

.replying-strip strong {
  color: #9b6b36;
}

.replying-strip button {
  color: #8b7e70;
  font-weight: 900;
}

.like-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 0;
  border: 0;
  background: transparent;
  color: #6f6b66;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
}

.like-box.liked {
  color: #a66328;
}

.comment-input {
  display: grid;
  grid-template-columns: 42px 1fr 68px;
  gap: 8px;
  align-items: center;
  padding: 10px 16px 14px;
  border-top: 1px solid var(--hairline);
  background: rgba(255, 252, 247, 0.96);
}

.comment-input input {
  width: 100%;
  height: 38px;
  padding: 0 40px 0 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  outline: none;
  background: #fff;
  font-size: 13px;
}

.input-wrap {
  position: relative;
}

.input-wrap .smile {
  position: absolute;
  right: 12px;
  top: 9px;
  color: #8a837a;
}

.send-btn {
  height: 38px;
  color: #776d62;
  border-radius: 10px;
  background: #f0eae2;
  font-size: 14px;
  font-weight: 700;
}

.settings-body {
  padding: 4px 18px 28px;
}

.settings-head {
  margin: 10px 0 18px;
}

.settings-head h1 {
  margin: 0 0 8px;
  color: #1f1b16;
  font-family: var(--serif);
  font-size: 28px;
  line-height: 1.1;
  letter-spacing: -0.04em;
}

.settings-head p {
  margin: 0;
  color: #a19688;
  font-size: 13px;
}

.field-label,
.section-label {
  display: block;
  margin: 0 0 8px;
  color: #6a6258;
  font-size: 12px;
  font-weight: 800;
}

.segment {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 46px;
  margin-bottom: 16px;
  overflow: hidden;
  border: 1px solid var(--border-strong);
  border-radius: 9px;
  background: rgba(255, 252, 247, 0.62);
}

.segment button {
  color: #8d8276;
  font-size: 14px;
  font-weight: 800;
}

.segment button.active {
  color: #fff;
  background: linear-gradient(180deg, #be8439, #a96c25);
}

.form-field {
  margin-bottom: 13px;
}

.input {
  width: 100%;
  height: 45px;
  padding: 0 13px;
  border: 1px solid var(--border-strong);
  border-radius: 9px;
  outline: none;
  background: rgba(255, 252, 247, 0.74);
  color: #554e45;
  font-size: 14px;
  transition: border 160ms ease, box-shadow 160ms ease;
}

.input:focus {
  border-color: rgba(182, 122, 47, 0.58);
  box-shadow: 0 0 0 3px rgba(182, 122, 47, 0.1);
}

.password-wrap {
  position: relative;
}

.password-wrap .input {
  padding-right: 46px;
}

.eye-btn {
  position: absolute;
  right: 12px;
  top: 11px;
  color: #8d8276;
}

.settings-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 14px 0 18px;
}

.profile-list {
  display: grid;
  gap: 8px;
  margin: 0 0 16px;
}

.profile-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 10px;
  width: 100%;
  min-height: 54px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: rgba(255, 252, 247, 0.58);
  color: #5e554a;
  text-align: left;
}

.profile-row.active {
  border-color: rgba(182, 122, 47, 0.52);
  background: rgba(255, 248, 236, 0.88);
  box-shadow: 0 8px 20px rgba(95, 69, 34, 0.07);
}

.profile-name {
  display: block;
  overflow: hidden;
  font-size: 14px;
  font-weight: 800;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.profile-meta {
  display: block;
  overflow: hidden;
  margin-top: 3px;
  color: #9d9285;
  font-size: 12px;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.profile-pill {
  padding: 4px 8px;
  border-radius: 999px;
  background: #efe3d2;
  color: #8a5a22;
  font-size: 11px;
  font-weight: 900;
}

.profile-tools {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 0 0 16px;
}

.status-message {
  padding: 10px 12px;
  margin: -4px 0 16px;
  color: #6c665f;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(255, 252, 247, 0.56);
  font-size: 12px;
  line-height: 1.45;
}

.status-message.error {
  color: #a3422f;
  background: #fff0ec;
}

.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
}

.settings-row-main {
  display: flex;
  gap: 10px;
  min-width: 0;
}

.row-icon {
  display: grid;
  place-items: center;
  width: 28px;
  height: 28px;
  flex: 0 0 auto;
  color: var(--accent);
}

.settings-row-title {
  color: #2a261f;
  font-size: 15px;
  font-weight: 800;
}

.settings-row-desc {
  margin-top: 3px;
  color: #a19688;
  font-size: 12px;
  line-height: 1.35;
}

.toggle {
  position: relative;
  width: 48px;
  height: 28px;
  flex: 0 0 auto;
  border-radius: 999px;
  background: #d8cec1;
  transition: background 160ms ease;
}

.toggle::after {
  position: absolute;
  left: 3px;
  top: 3px;
  width: 22px;
  height: 22px;
  content: "";
  border-radius: 999px;
  background: #fff;
  box-shadow: 0 2px 6px rgba(50, 35, 18, 0.18);
  transition: transform 160ms ease;
}

.toggle.on {
  background: linear-gradient(180deg, #be8439, #9f6421);
}

.toggle.on::after {
  transform: translateX(20px);
}

.persona-list {
  display: grid;
  gap: 12px;
  margin-top: 8px;
}

.persona-row {
  display: flex;

}

.add-friend-btn {

.friend-card {

.config-dialog {
  text-align: left;

.config-dialog h3 {

}

.config-list {

  font-size: 13px;

.config-example-box {

  font-size: 12px;
  line-height: 1.65;

.settings-example-box {

}

.loading-card {

.spinner {

.frequency-hint {

  font-size: 12px;

.prompt-footer {

.avatar-sheet-panel {

.avatar-sheet-title {

.edit-body {

.edit-avatar-zone {

.frequency {

}

  font-weight: 800;

.prompt-box {

  line-height: 1.55;
}

  background: rgba(255, 252, 247, 0.72);

  font-weight: 800;
}

.mode-pill {

  background: rgba(255, 248, 236, 0.86);
  font-size: 11px;
  font-weight: 900;

.mode-pill.active {

  border-color: rgba(92, 116, 91, 0.72);
  background: #59765b;

.advanced-prompt-box {

.preview-sample {

async function mapWithConcurrency(items, limit, fn) {
  const list = Array.isArray(items) ? items : [];
  const results = new Array(list.length);
  if (!list.length) return results;
  const cap = Math.max(1, Math.min(Number(limit) || 1, list.length));
  let cursor = 0;
  const workers = Array.from({ length: cap }, async () => {
    while (true) {
      const index = cursor++;
      if (index >= list.length) return;
      try {
        results[index] = { status: 'fulfilled', value: await fn(list[index], index) };
      } catch (error) {
        results[index] = { status: 'rejected', reason: error };
      }
    }
  });
  await Promise.all(workers);
  return results;
}

const CHINESE_DIGITS = {
  零: 0,
  〇: 0,
  一: 1,
  二: 2,
  两: 2,
  三: 3,
  四: 4,
  五: 5,
  六: 6,
  七: 7,
  八: 8,
  九: 9,
};

const CHINESE_UNITS = {
  十: 10,
  百: 100,
  千: 1000,
  万: 10000,
};

function parseChapterNumber(raw) {
  const text = String(raw || '').replace(/\s+/g, '');
  if (!text) return null;
  if (/^\d+$/.test(text)) return Number(text);
  let total = 0;
  let section = 0;
  let number = 0;
  for (const char of text) {
    if (Object.prototype.hasOwnProperty.call(CHINESE_DIGITS, char)) {
      number = CHINESE_DIGITS[char];
      continue;
    }
    const unit = CHINESE_UNITS[char];
    if (!unit) return null;
    if (unit === 10000) {
      total += (section + number) * unit;
      section = 0;
    } else {
      section += (number || 1) * unit;
    }
    number = 0;
  }
  return total + section + number || null;
}

function hasSentencePunctuation(text) {
  return /[，。！？；,.!?;]/.test(text);
}

function isWeakChapterUnit(unit) {
  return unit === '篇' || unit === '节';
}

function getChapterCandidate(line, lineIndex, startIndex, lines) {
  const title = String(line || '').trim().replace(/\s+/g, ' ');
  if (!title || title.length > 72) return null;

  const prevBlank = lineIndex === 0 || !String(lines[lineIndex - 1] || '').trim();
  const nextBlank = lineIndex === lines.length - 1 || !String(lines[lineIndex + 1] || '').trim();
  const numbered = title.match(/^(?:正文\s*)?第\s*([零〇一二两三四五六七八九十百千万\d]+)\s*([章回卷部集篇节])([：:、.\-—\s]*)(.{0,48})$/);
  if (numbered) {
    const number = parseChapterNumber(numbered[1]);
    const unit = numbered[2];
    const separator = numbered[3] || '';
    const suffix = (numbered[4] || '').trim();
    if (!number) return null;
    if (!['章', '回'].includes(unit) && suffix && !separator) return null;
    if (isWeakChapterUnit(unit) && (hasSentencePunctuation(title) || /^[是为有在于和与及的了着过把被将会能可我你他她它这那更]/.test(suffix))) {
      return null;
    }
    let score = unit === '章' || unit === '回' ? 7 : unit === '卷' || unit === '部' || unit === '集' ? 6 : 3;
    if (prevBlank) score += 1.5;
    if (nextBlank) score += 1;
    if (title.length <= 36) score += 1;
    if (title.length <= 20) score += 0.5;
    if (suffix.length > 36) score -= 1;
    if (isWeakChapterUnit(unit)) score -= 1.5;
    return { index: startIndex, title, number, unit, score, weak: isWeakChapterUnit(unit), special: false };
  }

  const special = title.match(/^(序章|楔子|前言|引子|尾声|后记|番外)(?:\s*[：:、.\-—]\s*(.{1,40}))?$/);
  if (special) {
    let score = 6;
    if (prevBlank) score += 1;
    if (nextBlank) score += 1;
    return { index: startIndex, title, number: null, unit: special[1], score, weak: false, special: true };
  }

  return null;
}

function averageCandidateGap(candidates) {
  if (candidates.length < 2) return 0;
  let total = 0;
  for (let index = 1; index < candidates.length; index++) {
    total += candidates[index].index - candidates[index - 1].index;
  }
  return total / (candidates.length - 1);
}

function sequenceConfidence(candidates) {
  const numbered = candidates.filter(item => Number.isFinite(item.number));
  if (numbered.length < 2) return 0;
  let increasing = 0;
  for (let index = 1; index < numbered.length; index++) {
    const diff = numbered[index].number - numbered[index - 1].number;
    if (diff > 0 && diff <= 10) increasing++;
  }
  return increasing / (numbered.length - 1);
}

function chooseChapterCandidates(candidates) {
  const strong = candidates.filter(item => !item.weak && item.score >= 6);
  const weak = candidates.filter(item => item.weak && item.score >= 4);
  const selected = strong.length >= 2
    ? strong
    : strong.filter(item => item.score >= 8);

  if (selected.length >= 2) {
    return candidates.filter(item => selected.includes(item) || (item.special && item.score >= 7));
  }

  const weakLooksLikeToc = weak.length >= 3
    && sequenceConfidence(weak) >= 0.65
    && averageCandidateGap(weak) >= 300;
  if (weakLooksLikeToc) return weak;
  return selected;
}

function parseNovelChapters(text) {
  const normalized = normalizeText(text);
  const lines = normalized.split('\n');
  const matches = [];
  let offset = 0;
  lines.forEach((line, index) => {
    const candidate = getChapterCandidate(line, index, offset, lines);
    if (candidate) matches.push(candidate);
    offset += line.length + 1;
  });
  const selected = chooseChapterCandidates(matches);
  if (!matches.length) {
    return [{ title: '全文', content: normalized || '这本书还没有可阅读的正文。' }];
  }
  if (!selected.length) {
    return [{ title: '全文', content: normalized || '这本书还没有可阅读的正文。' }];
  }
  return selected.map((item, index) => {
    const start = item.index + item.title.length;
    const end = index + 1 < selected.length ? selected[index + 1].index : normalized.length;
    return { title: item.title, content: normalized.slice(start, end).trim() || item.title };
  });
}

}

    '演示段评：这段先把局面立住，读起来有明显的推进感。',
    '演示段评：这里的信息很密，人物和局势都在往前挤。',
    '演示段评：这一笔不急着解释，反而把后面的悬念托出来了。',
    '演示段评：章法很会收放，刚铺开的气氛已经能带着往下读。',
  ];
  return (Array.isArray(chunk) ? chunk : [])
    .filter(item => Number.isInteger(Number(item?.paragraphIndex)) && normalizeText(item?.text))
    .map((item, index) => {
      const paragraphIndex = Number(item.paragraphIndex);
      const persona = activePersonas[index % activePersonas.length];
      const template = templates[hashText(`${chapterTitle}-${paragraphIndex}-${item.text}`) % templates.length];
      return {
        paragraphIndex,
        personaId: persona.id,
        text: template,
        discussionMode: index % 4 === 0 ? 'inviting' : 'open',
      };
    });
}

function safeJsonParse(text, fallback = null) {
  try {
    return JSON.parse(text);
  } catch {
    return fallback;
  }
}

function stripJsonFence(rawText = '') {
  return String(rawText || '').replace(/```json|```/gi, '').trim();
}

function repairLooseJson(rawText = '') {
  return stripJsonFence(rawText)
    .replace(/,\s*}/g, '}')
    .replace(/,\s*]/g, ']')
    .trim();
}

function parseStructuredPayload(rawText, repair = value => value) {
  const direct = stripJsonFence(rawText);
  try {
    return { ok: true, value: JSON.parse(direct), repaired: false };
  } catch (error) {
    try {
      return { ok: true, value: JSON.parse(repair(direct)), repaired: true };
    } catch (repairError) {
      return { ok: false, error: repairError };
    }
  }
}

function disableModelThinking(body = {}) {
  const messages = Array.isArray(body.messages) ? body.messages.map((message, index) => {
    if (!message || typeof message !== 'object') return message;
    if (index !== 0) return { ...message };
    const content = String(message.content || '');
    const noThinkingPrefix = '/no_think\nDo not reason step by step. Do not output thinking. Return only the final answer.';
    return {
      ...message,
      content: content.includes('/no_think') || content.includes('Do not reason step by step')
        ? content
        : `${noThinkingPrefix}\n${content}`,
    };
  }) : body.messages;
  return {
    ...body,
    messages,
    reasoning: { enabled: false, effort: 'none', exclude: true },
    think: false,
    include_reasoning: false,
  };
}

function extractJsonBlock(text) {
  const raw = String(text || '').trim();
  if (!raw) return '{}';
  const fenced = raw.match(/```(?:json)?\s*([\s\S]*?)```/i);
  if (fenced) return fenced[1].trim();
  const start = raw.indexOf('{');
  const end = raw.lastIndexOf('}');
  if (start >= 0 && end > start) return raw.slice(start, end + 1);
  return raw;
}

  if (preferred && normalizedProfiles.some(profile => profile.id === preferred)) return preferred;
  return normalizedProfiles[0].id || '';
}

function groupPersonasByProfile(personas = [], profiles = [], defaultProfileId = '') {

    if (!profile) return;
    if (!groupsById.has(profile.id)) groupsById.set(profile.id, { profile, personas: [] });
    groupsById.get(profile.id).personas.push(persona);
  });
  return Array.from(groupsById.values());
}

function getNextPreviewSample(previousDirection = '', seed = Date.now()) {

  const candidates = pool.filter(sample => sample.direction !== previousDirection);
  const list = candidates.length ? candidates : pool;
  const index = Math.abs(Number(seed) || 0) % list.length;
  return list[index];
}

function buildCommentTree(comments = [], replyBuckets = {}) {
  const commentIds = new Set((comments || []).map(comment => comment?.id).filter(Boolean));
  const topLevel = [];
  const repliesByParent = {};
  (comments || []).forEach(comment => {
    if (!comment) return;
    const parentId = comment.replyToCommentId;
    if (parentId && commentIds.has(parentId)) {
      repliesByParent[parentId] = [...(repliesByParent[parentId] || []), comment];
      return;
    }
    topLevel.push(comment);
  });
  topLevel.forEach(comment => {
    const id = comment?.id;
    if (!id) return;
    repliesByParent[id] = [
      ...(repliesByParent[id] || []),
      ...((replyBuckets && Array.isArray(replyBuckets[id])) ? replyBuckets[id] : []),
    ];
  });
  return { topLevel, repliesByParent };
}

function countCommentTree(comments = [], replyBuckets = {}) {
  const tree = buildCommentTree(comments, replyBuckets);
  return tree.topLevel.reduce((total, comment) => {
    return total + 1 + ((tree.repliesByParent[comment.id] || []).length);
  }, 0);
}

function summarizeThreadTurns(turns = []) {
  return turns
    .filter(turn => turn && String(turn.text || '').trim())
    .slice(-4)
    .map(turn => `${turn.role === 'user' ? 'U' : 'A'}:${String(turn.text || '').trim().slice(0, 36)}`)
    .join(' | ');
}

function appendThreadTurn(thread, message) {
  const existingTurns = (thread && Array.isArray(thread.turns)) ? thread.turns : [];
  const nextTurns = [...existingTurns, message];
  const maxTurns = 6;
  const overflowCount = Math.max(0, nextTurns.length - maxTurns);
  const keptTurns = overflowCount > 0 ? nextTurns.slice(overflowCount) : nextTurns;
  const compressedTurns = overflowCount > 0 ? nextTurns.slice(0, overflowCount) : [];
  const compressedSummary = compressedTurns.length ? summarizeThreadTurns(compressedTurns) : '';
  const priorSummary = String(thread?.summary || '').trim();
  const nextSummary = [priorSummary, compressedSummary].filter(Boolean).join(' || ').slice(-500);
  return {
    ...(thread || createEmptyThread(String(message?.threadId || ''))),
    turns: keptTurns,
    summary: nextSummary,
    updatedAt: Date.now(),
  };
}

function validateSummaryCandidate(summary, expectedChapterIndex) {
  if (!summary || typeof summary !== 'object') return { ok: false, reason: 'not-object' };
  if (summary.chapterIndex !== expectedChapterIndex) return { ok: false, reason: 'chapter-mismatch' };
  if (!String(summary.plotSummary || '').trim()) return { ok: false, reason: 'missing-plot' };
  if (!Array.isArray(summary.majorCharacters)) return { ok: false, reason: 'missing-characters' };
  if (!Array.isArray(summary.relationships)) return { ok: false, reason: 'missing-relationships' };
  if (!Array.isArray(summary.openQuestions)) return { ok: false, reason: 'missing-open-questions' };
  if (!Array.isArray(summary.worldFacts)) return { ok: false, reason: 'missing-world-facts' };
  return { ok: true };
}

function getChapterScrollPositions(novel = {}) {
  const saved = novel && typeof novel.chapterScrollPositions === 'object' && novel.chapterScrollPositions
    ? { ...novel.chapterScrollPositions }
    : {};
  const legacyPos = Number(novel?.lastScrollPos || 0);
  const legacyChapter = Math.max(0, Number(novel?.lastReadChapter || 0) || 0);
  if (legacyPos > 0 && saved[legacyChapter] == null) saved[legacyChapter] = legacyPos;
  return saved;
}

function getChapterScrollPos(novel = {}, chapterIndex = 0) {
  const positions = getChapterScrollPositions(novel);
  const value = Number(positions[chapterIndex]);
  return Number.isFinite(value) && value > 0 ? value : 0;
}

function updateChapterScrollProgress(novel = {}, chapterIndex = 0, scrollPos = null) {
  const positions = getChapterScrollPositions(novel);
  const nextScrollPos = scrollPos != null
    ? Math.max(0, Number(scrollPos) || 0)
    : getChapterScrollPos(novel, chapterIndex);
  const nextPositions = scrollPos != null
    ? { ...positions, [chapterIndex]: nextScrollPos }
    : positions;
  return {
    lastReadChapter: chapterIndex,
    maxReadChapter: Math.max(novel.maxReadChapter || 0, chapterIndex),
    lastScrollPos: nextScrollPos,
    chapterScrollPositions: nextPositions,
  };
}

function markNovelReadStarted(novel = {}) {

  if (!novel.isNew) return novel;

  delete next.isNew;
  return next;
}

function getAiGeneratedThrough(novel = {}, chapterCount = 0) {
  const raw = Number(novel?.aiGeneratedThrough);
  if (!Number.isFinite(raw)) return -1;
  return clamp(Math.floor(raw), -1, Math.max(-1, chapterCount - 1));
}

function getAiPregenTarget(currentThrough, chapterCount, step) {
  const count = Math.max(0, Number(chapterCount) || 0);
  if (!count) return -1;
  const rawStart = Number(currentThrough);
  const start = clamp(Number.isFinite(rawStart) ? rawStart : -1, -1, count - 1);
  const next = start + Math.max(1, Number(step) || 1);
  return clamp(next, 0, count - 1);
}

function getNextAiGenerationProgress(novel = {}, chapterCount = 0, completedChapterIndex = -1) {
  const count = Math.max(0, Number(chapterCount) || 0);
  const completed = new Set();
  const savedCompleted = Array.isArray(novel?.aiCompletedChapters) ? novel.aiCompletedChapters : [];
  savedCompleted.forEach(index => {
    const value = Number(index);
    if (Number.isInteger(value) && value >= 0 && value < count) completed.add(value);
  });
  if (!savedCompleted.length) {
    const legacyThrough = getAiGeneratedThrough(novel, count);
    for (let index = 0; index <= legacyThrough; index += 1) completed.add(index);
  }
  const nextCompleted = Number(completedChapterIndex);
  if (Number.isInteger(nextCompleted) && nextCompleted >= 0 && nextCompleted < count) {
    completed.add(nextCompleted);
  }
  let aiGeneratedThrough = -1;
  while (completed.has(aiGeneratedThrough + 1)) {
    aiGeneratedThrough += 1;
  }
  return {
    aiGeneratedThrough,
    aiCompletedChapters: Array.from(completed).sort((a, b) => a - b),
  };
}

function getVisibleAiGenerationJob(novel = {}, chapterCount = 0) {
  const frontier = getAiGeneratedThrough(novel, chapterCount);
  const job = novel?.aiGenerationJob || {};
  const target = Number(job.targetChapterIndex);
  if (job.running && Number.isFinite(target) && target <= frontier) {
    return {
      ...job,
      running: false,
      currentChapterIndex: target,
      targetChapterIndex: target,
      lastCompletedChapter: frontier,
      lastError: '',
    };
  }
  if (job.running) {
    const current = Number(job.currentChapterIndex);
    return {
      ...job,
      currentChapterIndex: Math.max(
        Number.isFinite(current) ? current : frontier + 1,
        frontier + 1,
      ),
    };
  }
  return job;
}

function getReconciledAiGenerationProgress(novel = {}, chapterCount = 0, completedChapterIndexes = []) {
  const count = Math.max(0, Number(chapterCount) || 0);
  const completed = new Set(getNextAiGenerationProgress(novel, count, -1).aiCompletedChapters);
  (Array.isArray(completedChapterIndexes) ? completedChapterIndexes : []).forEach(index => {
    const value = Number(index);
    if (Number.isInteger(value) && value >= 0 && value < count) completed.add(value);
  });
  const progress = getNextAiGenerationProgress({
    ...novel,
    aiGeneratedThrough: -1,
    aiCompletedChapters: Array.from(completed),
  }, count, -1);
  const withProgress = {
    ...novel,
    aiGeneratedThrough: progress.aiGeneratedThrough,
    aiCompletedChapters: progress.aiCompletedChapters,
  };
  return {
    aiGeneratedThrough: progress.aiGeneratedThrough,
    aiCompletedChapters: progress.aiCompletedChapters,
    aiGenerationJob: getVisibleAiGenerationJob(withProgress, count),
  };
}

function getCachedAiCompletedChapters(novelId, chapters = [], fingerprint = '') {
  if (!novelId || !fingerprint || !Array.isArray(chapters)) return [];
  return chapters.map((chapter, chapterIndex) => {
    const paragraphs = String(chapter?.content || '').split(/\n+/).map(item => item.trim()).filter(Boolean);
    const cached = lsGet(buildAiCacheKey(novelId, chapterIndex, fingerprint), null);
    if (chapterIndex === 0) {
      return cached?.fingerprint === fingerprint && cached?.commentsByKey && Object.keys(cached.commentsByKey).length
        ? chapterIndex
        : null;
    }
    return isCompleteChapterCommentCache(cached, paragraphs, fingerprint, CHAPTER_COMMENT_CHUNK_SIZE)
      ? chapterIndex
      : null;
  }).filter(index => Number.isInteger(index));
}

function planPrebuildWindow({ currentChapterIndex, chapterCount, warmCount = 5 }) {
  const start = Math.max(0, Number(currentChapterIndex || 0));
  const end = Math.min(Number(chapterCount || 0), start + Number(warmCount || 0));
  return Array.from({ length: Math.max(0, end - start) }, (_, offset) => start + offset);
}

function planAiPrebuildWindow({ currentChapterIndex, generatedThrough = -1, chapterCount, warmCount = 5 }) {
  const count = Math.max(0, Number(chapterCount) || 0);
  if (!count) return [];
  const current = clamp(Math.floor(Number(currentChapterIndex) || 0), 0, count - 1);
  const firstMissing = clamp(Math.floor(Number(generatedThrough) || -1) + 1, 0, count - 1);
  return planPrebuildWindow({
    currentChapterIndex: Math.min(current, firstMissing),
    chapterCount: count,
    warmCount,
  });
}

function chunkParagraphs(paragraphs, chunkSize = CHAPTER_COMMENT_CHUNK_SIZE) {
  const chunks = [];
  for (let i = 0; i < paragraphs.length; i += chunkSize) {
    chunks.push(paragraphs.slice(i, i + chunkSize).map((text, offset) => ({
      paragraphIndex: i + offset,
      text: text.slice(0, 900),
    })));
  }
  return chunks;
}

function getChapterCommentCacheSignature(paragraphs = [], chunkSize = CHAPTER_COMMENT_CHUNK_SIZE) {
  const count = Array.isArray(paragraphs) ? paragraphs.length : 0;
  const size = Math.max(1, Number(chunkSize) || CHAPTER_COMMENT_CHUNK_SIZE);
  return {
    paragraphCount: count,
    chunkSize: size,
    expectedChunkCount: Math.ceil(count / size),
  };
}

function normalizeCompletedChunkIndexes(indexes = [], expectedChunkCount = Infinity) {
  const max = Number.isFinite(Number(expectedChunkCount)) ? Number(expectedChunkCount) : Infinity;
  const seen = new Set();
  return (Array.isArray(indexes) ? indexes : [])
    .map(index => Number(index))
    .filter(index => Number.isInteger(index) && index >= 0 && index < max && !seen.has(index) && seen.add(index))
    .sort((a, b) => a - b);
}

function createChapterCommentCachePayload({
  commentsByKey = {},
  fingerprint = '',
  paragraphs = [],
  chunkSize = CHAPTER_COMMENT_CHUNK_SIZE,
  completedChunkIndexes = [],
  complete = false,
} = {}) {
  const signature = getChapterCommentCacheSignature(paragraphs, chunkSize);
  const completed = normalizeCompletedChunkIndexes(completedChunkIndexes, signature.expectedChunkCount);
  const allChunksDone = signature.expectedChunkCount === 0 || completed.length >= signature.expectedChunkCount;
  return {
    commentsByKey: commentsByKey || {},
    generatedAt: Date.now(),
    fingerprint,
    ...signature,
    completedChunkIndexes: completed,
    complete: Boolean(complete && allChunksDone),
  };
}

function isCompleteChapterCommentCache(cached, paragraphs = [], fingerprint = '', chunkSize = CHAPTER_COMMENT_CHUNK_SIZE) {
  if (!cached || cached.complete !== true || cached.fingerprint !== fingerprint || !cached.commentsByKey) return false;
  const signature = getChapterCommentCacheSignature(paragraphs, chunkSize);
  if (Number(cached.paragraphCount) !== signature.paragraphCount) return false;
  if (Number(cached.chunkSize) !== signature.chunkSize) return false;
  if (Number(cached.expectedChunkCount) !== signature.expectedChunkCount) return false;
  const completed = normalizeCompletedChunkIndexes(cached.completedChunkIndexes, signature.expectedChunkCount);
  return signature.expectedChunkCount === 0 || completed.length >= signature.expectedChunkCount;
}

function validateFirstChapterBundle(candidate, paragraphLimit = FIRST_CHAPTER_BUNDLE_MAX_PARAGRAPHS) {

  if (!summaryCheck.ok) return { ok: false, reason: `summary-${summaryCheck.reason}` };
  if (!Array.isArray(candidate.chapterComments)) return { ok: false, reason: 'missing-chapter-comments' };
  const validChapterComments = candidate.chapterComments.filter(item => normalizeText(item?.text || ''));
  if (!validChapterComments.length) return { ok: false, reason: 'empty-chapter-comments' };
  return { ok: true };
}

function normalizeBundleChapterComments(rawComments, personas, chapterIndex, profileId) {

    if (!persona) return null;

  const templates = [
    '我同意，而且这句的情绪压得更低，反而更明显。',
    '补一句，这里不像退让，更像是在先收住锋芒。',
    '这个角度成立，我更在意它把后面的紧张感先埋好了。',
  ];
  const text = templates[(hashText(baseComment.id) + chunkIndex) % templates.length];
  return buildAiComment(persona, paragraphKey, chapterIndex, text, profileId, {
    discussionMode: 'closed',
    replyToCommentId: baseComment.id,
  });
}

function normalizeGeneratedComments(rawComments, personas, chapterIndex, profileId, chunkIndex) {
  const personaMap = new Map(personas.filter(p => p.enabled).map(p => [p.id, p]));
  const byParagraph = {};
  rawComments.forEach(item => {
    const paragraphIndex = Number(item?.paragraphIndex);
    const text = normalizeText(item?.text || '');
    if (!Number.isInteger(paragraphIndex) || !text) return;
    const paragraphKey = `${chapterIndex}-${paragraphIndex}`;
    const persona = personaMap.get(item?.personaId) || choosePersonaForParagraph(personas, paragraphIndex, chunkIndex);
    if (!persona) return;
    const comment = buildAiComment(persona, paragraphKey, chapterIndex, text, profileId, {
      discussionMode: item?.discussionMode,
      replyToCommentId: item?.replyToCommentId,
    });
    const nextComments = [
      ...(byParagraph[paragraphKey] || []),
      comment,
    ];
    const supplemental = buildSupplementalReply(comment, personas, paragraphKey, chapterIndex, profileId, chunkIndex);
    if (supplemental) nextComments.push(supplemental);
    byParagraph[paragraphKey] = nextComments;
  });
  return byParagraph;
}

function mergeCommentsByKey(target, source) {
  Object.entries(source || {}).forEach(([key, comments]) => {
    target[key] = [...(target[key] || []), ...(Array.isArray(comments) ? comments : [])];
  });
  return target;
}

function ensureLocalLibrary() {
  const saved = lsGet(STORAGE_KEYS.novels, []);
  if (!Array.isArray(saved)) return [];
  return saved.filter(book => {
    const id = String(book?.id || '');
    return book && !book.demo && !id.startsWith('demo_');
  });
}

function ensurePersonasLibrary() {
  const saved = lsGet(STORAGE_KEYS.personas, null);
  const versionMatches = localStorage.getItem(STORAGE_KEYS.personasVersion) === PERSONA_SCHEMA_VERSION;
  const defaultIds = new Set(DEFAULT_PERSONAS.map(persona => persona.id));
  const deletedDefaultIds = new Set(lsGet(STORAGE_KEYS.deletedDefaultPersonas, []));
  if (!Array.isArray(saved)) {
    const defaults = DEFAULT_PERSONAS
      .filter(persona => !deletedDefaultIds.has(persona.id))
      .map(normalizePersona);
    lsSet(STORAGE_KEYS.personas, defaults);
    localStorage.setItem(STORAGE_KEYS.personasVersion, PERSONA_SCHEMA_VERSION);
    return defaults;
  }
  const savedMap = new Map(saved.map(persona => [persona.id, persona]));
  const defaults = DEFAULT_PERSONAS
    .filter(persona => !deletedDefaultIds.has(persona.id))
    .map((persona, index) => normalizePersona({
      ...persona,
      ...(versionMatches ? (savedMap.get(persona.id) || {}) : {}),
    }, index));
  const custom = saved
    .filter(persona => !defaultIds.has(persona.id) && !['gongming', 'wenrou'].includes(persona.id))
    .map(normalizePersona);
  const next = [...defaults, ...custom];
  lsSet(STORAGE_KEYS.personas, next);
  localStorage.setItem(STORAGE_KEYS.personasVersion, PERSONA_SCHEMA_VERSION);
  return next;
}

function BookPersonaCard({ novel, personas, onChange, dialogOpen = false, onDialogClose }) {
  const isControlledDialog = typeof onDialogClose === 'function';
  const [internalOpen, setInternalOpen] = useState(false);
  const [draftIds, setDraftIds] = useState([]);
  const [draftMode, setDraftMode] = useState('global');
  const enabledPersonas = useMemo(() => (personas || []).filter(persona => persona.enabled), [personas]);
  const isCustom = hasBookPersonaOverride(novel);
  const selectedPersonas = getBookPersonas(enabledPersonas, novel);
  const selectedCount = selectedPersonas.length;
  const totalCount = enabledPersonas.length;
  const modeLabel = isCustom ? '本书单独设置' : '跟随全局书友';
  const open = isControlledDialog ? dialogOpen : internalOpen;

  const resetDraft = () => {
    setDraftMode(isCustom ? 'custom' : 'global');
    setDraftIds(isCustom ? normalizeBookPersonaIds(novel.allowedPersonaIds) : enabledPersonas.map(persona => persona.id));
  };

  useEffect(() => {
    if (open) resetDraft();
  }, [open, isCustom, novel.allowedPersonaIds, enabledPersonas]);

  const openDialog = () => {
    resetDraft();
    setInternalOpen(true);
  };
  const closeDialog = () => {
    if (isControlledDialog) {
      onDialogClose();
      return;
    }
    setInternalOpen(false);
  };
  const togglePersona = (personaId) => {
    setDraftMode('custom');
    setDraftIds(prev => prev.includes(personaId)
      ? prev.filter(id => id !== personaId)
      : [...prev, personaId]);
  };
  const idsEqual = (a = [], b = []) => {
    const left = normalizeBookPersonaIds(a);
    const right = normalizeBookPersonaIds(b);
    return left.length === right.length && left.every((id, index) => id === right[index]);
  };
  const applyDraft = () => {
    if (typeof onChange === 'function') {
      if (draftMode === 'global') {
        if (isCustom) onChange(null);
      } else if (!isCustom || !idsEqual(draftIds, novel.allowedPersonaIds)) {
        onChange(draftIds);
      }
    }
    closeDialog();
  };
  const followGlobal = () => {
    if (isCustom && typeof onChange === 'function') onChange(null);
    closeDialog();
  };

  return (
    <>
      {!isControlledDialog && (
        <div
          className="book-personas-card"
          data-book-personas-card
          data-book-personas-mode={isCustom ? 'custom' : 'global'}
          data-book-personas-selected-count={selectedCount}
        >
          <button className="book-personas-open" type="button" data-book-personas-open onClick={openDialog}>
            <span>
              <span className="book-personas-title">本书 AI 书友</span>
              <span className="book-personas-meta" data-book-personas-meta>
                {modeLabel}，当前可出现 {selectedCount} / {totalCount} 位
              </span>
            </span>
            <span className="book-personas-count">{selectedCount} 位</span>
            <Icon name="chevronRight" size={18} strokeWidth={1.9} />
          </button>
        </div>
      )}
      {open && (
        <div className="delete-dialog book-personas-dialog" data-book-personas-dialog onClick={closeDialog}>
          <div className="dialog-card" onClick={event => event.stopPropagation()}>
            <h3>本书 AI 书友</h3>
            <p>选择哪些 AI 书友可以在这本书里出现。未单独设置时会跟随全局启用状态。</p>
            <div className="book-personas-tools">
              <button type="button" data-book-personas-action="follow-global" onClick={followGlobal}>跟随全局</button>
              <button type="button" data-book-personas-action="select-all" onClick={() => { setDraftMode('custom'); setDraftIds(enabledPersonas.map(persona => persona.id)); }}>全选</button>
              <button type="button" data-book-personas-action="clear" onClick={() => { setDraftMode('custom'); setDraftIds([]); }}>清空</button>
            </div>
            <div className="book-personas-list">
              {enabledPersonas.map(persona => {
                const checked = draftIds.includes(persona.id);
                return (
                  <button
                    className="book-persona-row"
                    type="button"
                    key={persona.id}
                    data-book-persona-row={persona.id}
                    data-selected={checked ? 'true' : 'false'}
                    onClick={() => togglePersona(persona.id)}
                  >
                    <div className="avatar" style={{ '--avatar-bg': persona.color }}>{persona.avatar}</div>
                    <div>
                      <div className="persona-title">{persona.name}</div>
                      <div className="persona-desc">{persona.description || persona.stylePrompt}</div>
                    </div>
                    <span className={`check-box ${checked ? 'on' : ''}`}><Icon name="check" size={14} strokeWidth={3} /></span>
                  </button>
                );
              })}
            </div>
            <div className="dialog-actions">
              <button className="btn btn-outline" onClick={closeDialog}>取消</button>
              <button className="btn btn-primary" data-book-personas-action="done" onClick={applyDraft}>保存</button>
            </div>

        </div>
      )}
    </>
  );

function AiPreGenerationCard({ novel, chapterCount, liveEnabled, onStartGeneration, dialogOpen = false, onDialogClose }) {
  const [showTargetDialog, setShowTargetDialog] = useState(false);
  const isControlledDialog = typeof onDialogClose === 'function';
  const frontier = getAiGeneratedThrough(novel, chapterCount);
  const generatedDisplay = frontier >= 0 ? `第 ${frontier + 1} 章` : '尚未生成';
  const job = getVisibleAiGenerationJob(novel, chapterCount);
  const isRunning = Boolean(job.running);
  const nextChapterDisplay = Math.min(frontier + 2, chapterCount);
  const defaultTarget = Math.min(chapterCount, Math.max(nextChapterDisplay, frontier + 6));
  const [targetChapter, setTargetChapter] = useState(defaultTarget);

  useEffect(() => {
    if (!showTargetDialog) setTargetChapter(defaultTarget);
  }, [defaultTarget, showTargetDialog]);

  const startTo = (targetIndex) => {
    if (typeof onStartGeneration === 'function') {
      onStartGeneration(targetIndex);
    }
  };
  const openTargetDialog = () => {
    setTargetChapter(defaultTarget);
    setShowTargetDialog(true);
  };
  const normalizedTargetChapter = clamp(Number(targetChapter) || nextChapterDisplay, 1, Math.max(1, chapterCount));
  const normalizedTargetIndex = normalizedTargetChapter - 1;
  const estimatedCount = Math.max(0, normalizedTargetIndex - frontier);
  const canGenerate = liveEnabled && !isRunning && frontier < chapterCount - 1;
  const statusText = isRunning
    ? `正在生成第 ${Math.max(1, (job.currentChapterIndex ?? frontier + 1) + 1)} 章`
    : job.lastError
      ? '上次中断'
      : frontier >= chapterCount - 1
        ? '已完成'
        : '空闲';
  const runningMeta = isRunning && Number.isFinite(job.targetChapterIndex)
    ? `，目标第 ${job.targetChapterIndex + 1} 章`
    : '';
  const targetStartChapter = frontier + 2;
  const panelBody = (
    <>
      <div className="ai-pregen-head">
        <div>
          <div className="ai-pregen-title" data-ai-pregen-title>AI 评论预生成</div>
          <span className="ai-pregen-meta" data-ai-frontier-meta>
            AI 评论已生成至：{generatedDisplay} / 共 {chapterCount} 章
          </span>
          <span className="ai-pregen-meta" data-ai-task-meta>
            当前任务：{statusText}{runningMeta}
          </span>
          {job.lastError && !isRunning && (
            <span className="ai-pregen-meta">失败原因：{job.lastError}</span>
          )}
        </div>
        <span className="ai-pregen-status">{liveEnabled ? statusText : '未启用 AI'}</span>
      </div>
      <div className="ai-pregen-actions">
        <button
          type="button"
          data-ai-pregen-action="next-5"
          disabled={!canGenerate}
          onClick={() => startTo(getAiPregenTarget(frontier, chapterCount, 5))}
        >
          继续 5 章
        </button>
        <button
          type="button"
          data-ai-pregen-action="next-20"
          disabled={!canGenerate}
          onClick={() => startTo(getAiPregenTarget(frontier, chapterCount, 20))}
        >
          继续 20 章
        </button>
        <button
          type="button"
          data-ai-pregen-action="target"
          disabled={!canGenerate}
          onClick={openTargetDialog}
        >
          生成到指定章节
        </button>
        <button
          type="button"
          data-ai-pregen-action="all"
          disabled={!canGenerate}
          onClick={() => startTo(chapterCount - 1)}
        >
          生成整本书
        </button>
      </div>
    </>
  );

  return (
    <>
      {isControlledDialog ? (
        dialogOpen && (
          <div className="delete-dialog ai-comment-pregen-dialog" data-ai-pregen-dialog onClick={onDialogClose}>
            <div className="dialog-card ai-pregen-card" data-ai-pregen-card onClick={event => event.stopPropagation()}>
              {panelBody}
            </div>
          </div>
        )
      ) : (
        <div className="ai-pregen-card" data-ai-pregen-card>
          {panelBody}
        </div>
      )}
      {showTargetDialog && (
        <div className="delete-dialog ai-pregen-dialog" onClick={() => setShowTargetDialog(false)}>
          <div className="dialog-card" onClick={event => event.stopPropagation()}>
            <h3>生成到第几章？</h3>
            <p>
              将从第 {targetStartChapter} 章生成到第 {normalizedTargetChapter} 章，共 {estimatedCount} 章。
            </p>
            <input
              className="ai-pregen-input"
              type="number"
              min={targetStartChapter}
              max={chapterCount}
              value={targetChapter}
              onChange={event => setTargetChapter(event.target.value)}
            />
            <div className="dialog-actions">
              <button className="btn btn-outline" onClick={() => setShowTargetDialog(false)}>取消</button>
              <button
                className="btn btn-primary"
                disabled={estimatedCount <= 0}
                onClick={() => {
                  setShowTargetDialog(false);
                  startTo(normalizedTargetIndex);
                }}
              >
                开始生成
              </button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

function CommentPanel({ comments, userComments, commentReplies = {}, personas = [], commentLikes = {}, onAddUserComment, onSubmitComment, onSummonAiReply, onToggleCommentLike, onClose }) {
  const [inputText, setInputText] = useState('');
  const [isSending, setIsSending] = useState(false);
  const [replyTarget, setReplyTarget] = useState(null);
  const [summonTarget, setSummonTarget] = useState(null);
  const [summonSelectedIds, setSummonSelectedIds] = useState([]);
  const [expandedReplies, setExpandedReplies] = useState({});
  const allComments = [...comments, ...userComments];
  const commentTree = buildCommentTree(allComments, commentReplies);
  const availablePersonas = useMemo(() => (personas || []).filter(persona => persona?.enabled !== false), [personas]);
  const availablePersonaIds = useMemo(() => availablePersonas.map(persona => persona.id), [availablePersonas]);
  const getLikeState = useCallback((comment) => {
    const saved = comment?.id ? commentLikes?.[comment.id] : null;
    if (saved) {
      return {
        likes: Math.max(0, Number(saved.likes) || 0),
        liked: Boolean(saved.liked),
      };
    }
    return {
      likes: Math.max(0, Number(comment?.likes) || 0),
      liked: Boolean(comment?.liked),
    };
  }, [commentLikes]);

  useEffect(() => {
    if (!summonTarget) return;
    setSummonSelectedIds(prev => {
      const kept = prev.filter(id => availablePersonaIds.includes(id));
      return kept.length ? kept : availablePersonaIds.slice(0, 2);
    });
  }, [availablePersonaIds, summonTarget]);

  const handleSubmit = async () => {
    const text = inputText.trim();
    if (!text) return;
    setInputText('');
    const target = replyTarget;
    setReplyTarget(null);
    if (typeof onSubmitComment === 'function') {
      setIsSending(true);
      try {
        await onSubmitComment({ text, replyTarget: target });
      } finally {
        setIsSending(false);
      }
      return;
    }
    onAddUserComment(text);
  };

  const handleReply = ({ parentComment, targetComment }) => {
    setReplyTarget({
      parentComment,
      targetComment,
      parentId: parentComment?.id || targetComment?.id,
      targetName: targetComment?.personaName || '这条评论',
    });
  };

  const handleSummonAiReply = ({ parentComment, targetComment }) => {
    if (typeof onSummonAiReply !== 'function') return;
    setSummonTarget({ parentComment, targetComment });
    setSummonSelectedIds(availablePersonaIds.slice(0, 2));
  };

  const toggleSummonReplyPersona = (personaId) => {
    setSummonSelectedIds(prev => (
      prev.includes(personaId)
        ? prev.filter(id => id !== personaId)
        : [...prev, personaId]
    ));
  };

  const generateSummonReply = () => {
    if (!summonTarget || typeof onSummonAiReply !== 'function') return;
    const selectedPersonas = availablePersonas.filter(persona => summonSelectedIds.includes(persona.id));
    if (!selectedPersonas.length) return;
    const target = summonTarget;
    setSummonTarget(null);
    Promise.resolve(onSummonAiReply({
      parentComment: target.parentComment,
      targetComment: target.targetComment,
      personas: selectedPersonas,
    })).catch(() => {});
  };

  return (
    <>
      <div className="comment-sheet-backdrop" onClick={onClose} />
      <div className="comment-sheet" data-comment-panel="true">
        <div className="sheet-grabber" />
        <div className="sheet-head">
          <div className="sheet-title-wrap">
            <div className="sheet-title">本段说</div>
            <div className="sheet-subtitle">AI 视角，畅所欲言</div>
          </div>
          <button className="sheet-close" onClick={onClose} aria-label="关闭评论">
            <Icon name="x" size={22} strokeWidth={2.1} />
          </button>
        </div>
        {false && <div className="sheet-tabs">
          <div className="sheet-tab-group">
            <span>推荐排序</span>
          </div>
          <div className="sheet-tab-group">
            <strong>默认</strong>
            <span>热门</span>
            <span>最新</span>
          </div>
        </div>
        }
        <div className="comments-list">
          {commentTree.topLevel.length === 0 ? (
            <div className="empty-state">
              <h3>还没有评论</h3>
              <p>写下你的想法，给后面的自己留个批注。</p>
            </div>
          ) : (
            commentTree.topLevel.map((comment, index) => (
              <CommentItem
                key={comment.id || index}
                comment={comment}
                replies={commentTree.repliesByParent[comment.id] || []}
                expanded={Boolean(expandedReplies[comment.id])}
                getLikeState={getLikeState}
                onToggleLike={onToggleCommentLike}
                onToggleReplies={(commentId) => setExpandedReplies(prev => ({ ...prev, [commentId]: true }))}
                onReply={handleReply}
                onSummonAiReply={handleSummonAiReply}
              />
            ))
          )}
        </div>
        {replyTarget && (
          <div className="replying-strip">
            <span>回复 <strong>@{replyTarget.targetName}</strong></span>
            <button type="button" onClick={() => setReplyTarget(null)}>取消</button>
          </div>
        )}
        <div className="comment-input" data-thread-composer="true">
          <div className="avatar" style={{ '--avatar-bg': '#e8dde5' }}>读</div>
          <div className="input-wrap">
            <input
              value={inputText}
              disabled={isSending}
              onChange={e => setInputText(e.target.value)}
              onKeyDown={e => {
                if (e.key === 'Enter' && !isSending) handleSubmit();
              }}
              placeholder={isSending ? 'AI 书友正在回复...' : replyTarget ? `回复 @${replyTarget.targetName}` : '写下你的评论...'}
            />
            <Icon className="smile" name="smile" size={20} strokeWidth={1.8} />
          </div>
          <button className="send-btn" onClick={handleSubmit} disabled={isSending || !inputText.trim()}>
            {isSending ? '发送中' : '发送'}
          </button>
        </div>
      </div>
      {summonTarget && (
        <SummonPanel
          mode="comment"
          title="召唤 AI 书友回复"
          subtitle="选择要来这条评论底下接话的 AI 书友。"
          personas={availablePersonas}
          selectedIds={summonSelectedIds}
          onToggle={toggleSummonReplyPersona}
          onGenerate={generateSummonReply}
          onClose={() => setSummonTarget(null)}
        />
      )}
    </>
  );
}
