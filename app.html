  }, [apiKeysByProfileId, currentBookAiFingerprint, currentBookPersonas, currentChapters, currentNovel?.title, currentNovelId, defaultProfileId, getRunnableProfileGroups, liveSettings.proxyUrl]);

  const ensureFirstChapterBundle = useCallback(async ({
    force = false,
    updateVisibleState = false,
  } = {}) => {
    if (updateVisibleState) {
      firstChapterBundleVisibleRef.current = true;
    }
    if (!currentNovelId || !currentChapters.length) return false;
    const chapterIndex = 0;
    const chapter = currentChapters[chapterIndex];
    if (!chapter) return false;
    if (!liveSettings.enabled) {
      if (updateVisibleState) {
        setChapterAiState({ chapterIndex, status: 'idle', commentsByKey: {}, error: '', fingerprint: currentBookAiFingerprint });
      }
      return false;
    }
    if (!currentBookPersonas.length) {
      if (updateVisibleState) {
        setChapterAiState({ chapterIndex, status: 'idle', commentsByKey: {}, error: '', fingerprint: currentBookAiFingerprint });
      }
      setAiPrebuildState(prev => ({
        ...prev,
        running: false,
        queuedChapters: [],
        lastError: '',
        startupStatus: 'idle',
        startupError: '',
        startupCompleted: false,
      }));
      return false;
    }

    const fingerprint = currentBookAiFingerprint;
    const memoryFingerprint = `${currentBookAiFingerprint}:memory-v1`;
    const memoryKey = buildChapterMemoryKey(currentNovelId, chapterIndex);
    const aiCacheKey = buildAiCacheKey(currentNovelId, chapterIndex, fingerprint);
    const discussionKey = buildChapterCommentKey(currentNovelId, chapterIndex);
    const cachedMemory = lsGet(memoryKey, null);
    const cachedAi = lsGet(aiCacheKey, null);
    const cachedDiscussion = lsGet(discussionKey, null);
    const hasStartupCache = cachedMemory?.state === 'committed'
      && cachedMemory?.fingerprint === memoryFingerprint
      && cachedAi?.fingerprint === fingerprint
      && ['first-chapter-bundle', 'first-chapter-progressive'].includes(cachedAi?.source)
      && cachedAi?.commentsByKey
      && cachedDiscussion?.fingerprint === fingerprint
      && cachedDiscussion?.source === 'first-chapter-bundle'
      && Array.isArray(cachedDiscussion?.comments);

    if (!force && hasStartupCache) {
      if (updateVisibleState) {
        setChapterAiState({ chapterIndex, status: 'success', commentsByKey: cachedAi.commentsByKey, error: '', fingerprint });
        setChapterDiscussionState(prev => ({
          ...prev,
          [discussionKey]: { status: cachedDiscussion.status || 'success', comments: cachedDiscussion.comments, error: cachedDiscussion.error || '' },
        }));
      }
      setAiPrebuildState(prev => ({
        ...prev,
        running: false,
        queuedChapters: [],
        lastCompletedChapter: Math.max(prev.lastCompletedChapter, chapterIndex),
        lastError: '',
        startupStatus: 'success',
        startupError: '',
        startupCompleted: true,
      }));
      markAiChapterComplete(chapterIndex);
      return true;
    }

    if (firstChapterBundlePromiseRef.current && !force) {
      return firstChapterBundlePromiseRef.current;
    }

    const promise = (async () => {
      const paragraphs = String(chapter.content || '').split(/\n+/).map(item => item.trim()).filter(Boolean);
      const startupParagraphLimit = Math.max(1, paragraphs.length);
      const startupChunks = chunkStartupParagraphs(paragraphs, startupParagraphLimit, FIRST_CHAPTER_COMMENT_CHUNK_SIZE);
      const activePersonas = currentBookPersonas;
      const profileGroups = getRunnableProfileGroups(activePersonas);
      const startupGroup = profileGroups.find(group => group.profile.id === defaultProfileId) || profileGroups[0] || null;

      if (!startupGroup || !activePersonas.length) {
        throw new Error('No runnable AI profile for startup bundle');
      }

      setAiPrebuildState(prev => ({
        ...prev,
        running: true,
        queuedChapters: [chapterIndex],
        lastError: '',
        startupStatus: 'running',
        startupError: '',
      }));
      if (updateVisibleState) {
        setChapterAiState({ chapterIndex, status: 'loading', commentsByKey: {}, error: '', fingerprint });
        setChapterDiscussionState(prev => ({
          ...prev,
          [discussionKey]: { status: 'loading', comments: [], error: '' },
        }));
      }

      const apiKey = apiKeysByProfileId[startupGroup.profile.id] || '';
      const body = {
        model: startupGroup.profile.model,
        temperature: Math.min(0.85, Math.max(0.25, startupGroup.profile.temperature)),
        max_tokens: Math.min(6000, startupGroup.profile.maxOutputTokens || 6000),
        messages: [
          { role: 'system', content: 'Output strict JSON only. No Markdown. Use exactly the requested schema.' },
          {
            role: 'user',
            content: buildFirstChapterBundlePrompt({
              novelTitle: currentNovel?.title || '',
              chapterTitle: chapter.title || '',
              chapterText: chapter.content || '',
              paragraphs,
              personas: activePersonas,
              paragraphLimit: startupParagraphLimit,
            }),
          },
        ],
      };
      const bundle = await aiClient.generateFirstChapterBundle(liveSettings.proxyUrl, startupGroup.profile, apiKey, body);
      const validation = validateFirstChapterBundle(bundle, startupParagraphLimit);
      if (!validation.ok) throw new Error(`Startup bundle schema invalid: ${validation.reason}`);

      const committedSummary = promoteSummaryArtifact(
        createSummaryArtifact(currentNovelId, chapterIndex, bundle.summary, memoryFingerprint)
      );
      const chapterComments = normalizeBundleChapterComments(
        bundle.chapterComments,
        activePersonas,
        chapterIndex,
        startupGroup.profile.id,
      );
      if (!chapterComments.length) {
        throw new Error('Startup bundle produced no usable chapter comments');
      }

      lsSet(memoryKey, committedSummary);
      lsSet(discussionKey, {
        comments: chapterComments,
        generatedAt: Date.now(),
        fingerprint,
        status: 'success',
        error: '',
        source: 'first-chapter-bundle',
      });

      if (firstChapterBundleVisibleRef.current) {
        setChapterAiState({ chapterIndex, status: 'loading', commentsByKey: {}, error: '', fingerprint });
        setChapterDiscussionState(prev => ({
          ...prev,
          [discussionKey]: { status: 'success', comments: chapterComments, error: '' },
        }));
      }

      const commentsByKey = {};
      const chunkErrors = [];
      const memorySummary = bundle.summary?.plotSummary || '';
      const commitParagraphProgress = (partial = true) => {
        const payload = {
          commentsByKey: { ...commentsByKey },
          generatedAt: Date.now(),
          fingerprint,
          source: 'first-chapter-progressive',
          partial,
        };
        lsSet(aiCacheKey, payload);
        if (firstChapterBundleVisibleRef.current && Object.keys(commentsByKey).length) {
          setChapterAiState({ chapterIndex, status: 'success', commentsByKey: { ...commentsByKey }, error: '', fingerprint });
        }
      };

      await mapWithConcurrency(startupChunks, AI_REQUEST_CONCURRENCY, async (chunk, chunkIndex) => {
        try {
          const rawComments = await aiClient.generateChunk(
            liveSettings.proxyUrl,
            startupGroup.profile,
            apiKey,
            chapter.title || '',
            chunk,
            activePersonas,
            memorySummary,
          );
          mergeCommentsByKey(
            commentsByKey,
            normalizeGeneratedComments(rawComments, activePersonas, chapterIndex, startupGroup.profile.id, chunkIndex),
          );
          commitParagraphProgress(true);
        } catch (error) {
          chunkErrors.push(getErrorMessage(error));
        }
      });

      if (!Object.keys(commentsByKey).length) {
        throw new Error(chunkErrors[0] || 'Startup paragraph comments produced no usable comments');
      }

      commitParagraphProgress(false);
      setAiPrebuildState(prev => ({
        ...prev,
        running: false,
        queuedChapters: [],
        lastCompletedChapter: Math.max(prev.lastCompletedChapter, chapterIndex),
        lastError: chunkErrors.length ? chunkErrors[0] : '',
        startupStatus: 'success',
        startupError: chunkErrors.length ? chunkErrors[0] : '',
        startupCompleted: true,
      }));
      markAiChapterComplete(chapterIndex);
      return true;
    })().catch(error => {
      const message = getErrorMessage(error);
      if (updateVisibleState) {
        setChapterAiState({ chapterIndex, status: 'error', commentsByKey: {}, error: message, fingerprint });
        setChapterDiscussionState(prev => ({
          ...prev,
          [discussionKey]: { status: 'error', comments: [], error: message },
        }));
      }
      setAiPrebuildState(prev => ({
        ...prev,
        running: false,
        queuedChapters: [],
        lastError: message,
        startupStatus: 'error',
        startupError: message,
        startupCompleted: false,
      }));
      throw error;
    }).finally(() => {
      firstChapterBundlePromiseRef.current = null;
    });

    firstChapterBundlePromiseRef.current = promise;
    return promise;
  }, [apiKeysByProfileId, currentBookAiFingerprint, currentBookPersonas, currentChapters, currentNovel?.title, currentNovelId, defaultProfileId, getRunnableProfileGroups, liveSettings.enabled, liveSettings.proxyUrl, markAiChapterComplete]);

  const ensureChapterComments = useCallback(async ({
    chapterIndex,
    chapterTitle,
    paragraphs,
    force = false,
    updateVisibleState = false,
    maxChunks,
    requireAllChunks = false,
  }) => {
    if (!currentNovelId) return {};
    if (!liveSettings.enabled) {
      if (updateVisibleState) {
        setChapterAiState({ chapterIndex, status: 'idle', commentsByKey: {}, error: '', fingerprint: currentBookAiFingerprint });
      }
      return {};
    }

    const activePersonas = currentBookPersonas;
    const profileGroups = getRunnableProfileGroups(activePersonas);
    if (!profileGroups.length) {
      if (updateVisibleState) {
        setChapterAiState({ chapterIndex, status: 'idle', commentsByKey: {}, error: '', fingerprint: currentBookAiFingerprint });
      }
      return {};
    }

    const fingerprint = currentBookAiFingerprint;
    const cacheKey = buildAiCacheKey(currentNovelId, chapterIndex, fingerprint);
    const allChunks = chunkParagraphs(paragraphs, CHAPTER_COMMENT_CHUNK_SIZE);
    const cached = !force ? lsGet(cacheKey, null) : null;
    if (isCompleteChapterCommentCache(cached, paragraphs, fingerprint, CHAPTER_COMMENT_CHUNK_SIZE)) {
      if (updateVisibleState) {
        setChapterAiState({ chapterIndex, status: 'success', commentsByKey: cached.commentsByKey, error: '', fingerprint });
      }
      return cached.commentsByKey;
    }

    if (updateVisibleState) {
      setChapterAiState({ chapterIndex, status: 'loading', commentsByKey: {}, error: '', fingerprint });
    }

    const chapterText = paragraphs.join('\n\n');
    const memoryKey = buildChapterMemoryKey(currentNovelId, chapterIndex);
    const cachedMemory = lsGet(memoryKey, null);
    let memorySummary = cachedMemory?.state === 'committed' ? (cachedMemory?.payload?.plotSummary || '') : '';
    if (!memorySummary && updateVisibleState) {
      memorySummary = createFallbackSummaryPayload({
        chapterIndex,
        chapterTitle,
        chapterText,
        previousSummary: createEmptyMemorySummary(Math.max(0, chapterIndex - 1)),
      }).plotSummary;
      ensureChapterSummary(chapterIndex, chapterTitle, chapterText, force).catch(() => {});
    } else if (!memorySummary) {
      const summaryArtifact = await ensureChapterSummary(chapterIndex, chapterTitle, chapterText, force);
      memorySummary = summaryArtifact?.payload?.plotSummary || '';
    }

    const canResumeCache = Boolean(
      cached?.commentsByKey
      && cached.fingerprint === fingerprint
      && Number(cached.paragraphCount) === paragraphs.length
      && Number(cached.chunkSize) === CHAPTER_COMMENT_CHUNK_SIZE
      && Number(cached.expectedChunkCount) === allChunks.length
    );
    const completedChunkIndexes = new Set(
      canResumeCache ? normalizeCompletedChunkIndexes(cached.completedChunkIndexes, allChunks.length) : []
    );
    const merged = canResumeCache ? { ...cached.commentsByKey } : {};
    const commitProgress = (complete = false) => {
      const payload = createChapterCommentCachePayload({
        commentsByKey: { ...merged },
        fingerprint,
        paragraphs,
        chunkSize: CHAPTER_COMMENT_CHUNK_SIZE,
        completedChunkIndexes: [...completedChunkIndexes],
        complete,
      });
      lsSet(cacheKey, payload);
      if (updateVisibleState && Object.keys(merged).length) {
        setChapterAiState({ chapterIndex, status: 'success', commentsByKey: { ...merged }, error: '', fingerprint });
      }
    };
    const effectiveMaxChunks = Number.isFinite(maxChunks) && maxChunks > 0
      ? Math.min(maxChunks, allChunks.length)
      : allChunks.length;
    const chunks = allChunks.slice(0, Math.max(1, effectiveMaxChunks));
    const errors = [];
    let successCount = 0;
    const tasks = [];
    for (const group of profileGroups) {
      const apiKey = apiKeysByProfileId[group.profile.id] || '';
      for (let index = 0; index < chunks.length; index++) {
        if (completedChunkIndexes.has(index)) continue;
        tasks.push({ group, apiKey, chunkIndex: index, chunk: chunks[index] });
      }
    }
    if (!tasks.length && Object.keys(merged).length) {
      commitProgress(completedChunkIndexes.size >= allChunks.length);
      return merged;
    }
    await mapWithConcurrency(tasks, AI_REQUEST_CONCURRENCY, async ({ group, apiKey, chunkIndex, chunk }) => {
      try {
        const rawComments = await aiClient.generateChunk(
          liveSettings.proxyUrl,
          group.profile,
          apiKey,
          chapterTitle,
          chunk,
          group.personas,
          memorySummary,
        );
        mergeCommentsByKey(
          merged,
          normalizeGeneratedComments(rawComments, group.personas, chapterIndex, group.profile.id, chunkIndex),
        );
        completedChunkIndexes.add(chunkIndex);
        commitProgress();
        successCount += 1;
      } catch (error) {
        errors.push(`${group.profile.name || group.profile.model}: ${getErrorMessage(error)}`);
      }
    });

    if (!successCount) {
      if (Object.keys(merged).length) {
        commitProgress(false);
        if (requireAllChunks && errors.length) {
          if (updateVisibleState) {
            setChapterAiState({ chapterIndex, status: 'error', commentsByKey: merged, error: errors[0], fingerprint });
          }
          throw new Error(errors[0]);
        }
        return merged;
      }
      if (updateVisibleState) {
        setChapterAiState({ chapterIndex, status: 'error', commentsByKey: {}, error: errors[0] || 'AI 评论生成失败', fingerprint });
      }
      return {};
    }

    if (requireAllChunks && errors.length) {
      if (updateVisibleState) {
        setChapterAiState({ chapterIndex, status: 'error', commentsByKey: merged, error: errors[0], fingerprint });
      }
      throw new Error(errors[0]);
    }

    const payload = createChapterCommentCachePayload({
      commentsByKey: merged,
      fingerprint,
      paragraphs,
      chunkSize: CHAPTER_COMMENT_CHUNK_SIZE,
      completedChunkIndexes: [...completedChunkIndexes],
      complete: completedChunkIndexes.size >= allChunks.length && !errors.length,
    });
    lsSet(cacheKey, payload);
    if (updateVisibleState) {
      setChapterAiState({ chapterIndex, status: 'success', commentsByKey: merged, error: '', fingerprint });
    }
    return merged;
  }, [apiKeysByProfileId, currentBookAiFingerprint, currentBookPersonas, currentNovelId, ensureChapterSummary, getRunnableProfileGroups, liveSettings]);

  const ensureChapterDiscussionSeed = useCallback(async ({
    chapterIndex,
    chapterTitle,
    chapterText,
    force = false,
    updateState = true,
  }) => {
    if (!currentNovelId) return [];
    const storageKey = buildChapterCommentKey(currentNovelId, chapterIndex);
    const fingerprint = currentBookAiFingerprint;
    const cached = lsGet(storageKey, null);
    if (!force && cached?.fingerprint === fingerprint && Array.isArray(cached?.comments)) {
      if (updateState) {
        setChapterDiscussionState(prev => ({
          ...prev,
          [storageKey]: {
            status: cached?.status || (cached.comments.length ? 'success' : 'error'),
            comments: cached.comments,
            error: cached?.error || '',
          },
        }));
      }
      return cached.comments;
    }

    if (updateState) {
      setChapterDiscussionState(prev => ({
        ...prev,
        [storageKey]: { status: 'loading', comments: [] },
      }));
    }

    const summaryArtifact = await ensureChapterSummary(chapterIndex, chapterTitle, chapterText, force);
    const memorySummary = summaryArtifact?.payload?.plotSummary || '';
    const activePersonas = currentBookPersonas;
    const seededPersonas = activePersonas.slice(0, 2);
    const profileGroups = getRunnableProfileGroups(activePersonas);
    let comments = [];

    if (profileGroups.length && seededPersonas.length) {
      const seedResults = await mapWithConcurrency(seededPersonas, AI_REQUEST_CONCURRENCY, async (persona) => {
        const group = profileGroups.find(item => item.personas.some(candidate => candidate.id === persona.id)) || profileGroups[0];
        if (!group) return null;
        const apiKey = apiKeysByProfileId[group.profile.id] || '';
        const body = {
          model: group.profile.model,
          temperature: Math.min(1.05, Math.max(0.4, group.profile.temperature)),
          max_tokens: Math.min(420, group.profile.maxOutputTokens || 420),
          messages: [
            { role: 'system', content: 'Reply with comment text only in concise Simplified Chinese. Do not output JSON or Markdown.' },
            {
              role: 'user',
              content: buildChapterDiscussionPrompt({
                novelTitle: currentNovel?.title || '',
                chapterTitle,
                chapterText,
                memorySummary,
                personas: [persona],
              }),
            },
          ],
        };
        try {
          const text = normalizeCommentText(await aiClient.generateThreadReply(liveSettings.proxyUrl, group.profile, apiKey, body));
          if (!text) return null;
          return buildAiComment(persona, `chapter-${chapterIndex}`, chapterIndex, text, group.profile.id, {
            discussionMode: 'open',
          });
        } catch {
          return null;
        }
      });
      comments = seedResults
        .map(result => result.status === 'fulfilled' ? result.value : null)
        .filter(Boolean);
    }

    lsSet(storageKey, {
      comments,
      generatedAt: Date.now(),
      fingerprint,
      status: comments.length ? 'success' : 'error',
      error: comments.length ? '' : '本章 AI 章评生成失败。',
    });
    if (updateState) {
      setChapterDiscussionState(prev => ({
        ...prev,
        [storageKey]: { status: comments.length ? 'success' : 'error', comments, error: comments.length ? '' : '本章 AI 章评生成失败。' },
      }));
    }
    return comments;
  }, [apiKeysByProfileId, currentBookAiFingerprint, currentBookPersonas, currentNovel?.title, currentNovelId, ensureChapterSummary, getRunnableProfileGroups, liveSettings.proxyUrl]);

  const handleSendThreadMessage = useCallback(async ({
    threadKey,
    chapterIndex,
    paragraphIndex,
    chapterTitle,
    paragraphText,
    userText,
  }) => {
    if (!currentNovelId) return;
    const currentThread = aiThreads[threadKey] || createEmptyThread(threadKey);
    const userTurn = {
      id: uid(),
      role: 'user',
      text: userText,
      createdAt: Date.now(),
    };
    const nextTurns = [...currentThread.turns, userTurn];
    setAiThreads(prev => ({
      ...prev,
      [threadKey]: appendThreadTurn(prev[threadKey] || createEmptyThread(threadKey), userTurn),
    }));

    const activePersonas = currentBookPersonas;
    const profileGroups = groupPersonasByProfile(activePersonas, modelProfiles, defaultProfileId)
      .filter(group => liveSettings.proxyUrl.trim()
        && group.profile.baseUrl.trim()
        && group.profile.model.trim()
        && !/api\.example\.com/i.test(group.profile.baseUrl));
    const persona = choosePersonaForParagraph(activePersonas, paragraphIndex);
    const memoryArtifact = lsGet(buildChapterMemoryKey(currentNovelId, chapterIndex), null);
    const memorySummary = memoryArtifact?.payload?.plotSummary || '';

    let replyText = '';
    let replyPersona = persona;
    let replyTag = persona?.tag || '书友';

    if (profileGroups.length && persona) {
      const group = profileGroups.find(item => item.personas.some(candidate => candidate.id === persona.id)) || profileGroups[0];
      const replyProfile = group.profile;
      const apiKey = apiKeysByProfileId[replyProfile.id] || '';
      const body = {
        model: replyProfile.model,
        temperature: Math.min(1.1, Math.max(0.4, replyProfile.temperature)),
        max_tokens: Math.min(500, replyProfile.maxOutputTokens || 500),
        messages: [
          { role: 'system', content: '你只输出回答正文，不要输出 JSON，不要使用 Markdown。' },
          {
            role: 'user',
            content: buildThreadReplyPrompt({
              novelTitle: currentNovel?.title || '',
              chapterTitle,
              paragraphText,
              memorySummary,
              threadSummary: currentThread.summary || '',
              threadTurns: nextTurns.slice(-6).map(turn => ({
                role: turn.role,
                text: turn.text,
                personaName: turn.personaName || '',
              })),
              userMessage: userText,
              persona,
            }),
          },
        ],
      };
      try {
        replyText = normalizeCommentText(await aiClient.generateThreadReply(liveSettings.proxyUrl, replyProfile, apiKey, body));
      } catch (error) {
        replyText = '';
      }
      replyPersona = persona;
      replyTag = persona.tag;
    }

    if (!replyText) {
      showToast({ title: 'AI 回复失败', subtitle: '这次没有生成出可用回复。' });
      return;
    }

    const assistantTurn = {
      id: uid(),
      role: 'assistant',
      text: replyText,
      personaId: replyPersona?.id || '',
      personaName: replyPersona?.name || 'AI 书友',
      personaTag: replyTag,
      createdAt: Date.now(),
    };
    setAiThreads(prev => ({
      ...prev,
      [threadKey]: appendThreadTurn(prev[threadKey] || createEmptyThread(threadKey), assistantTurn),
    }));
  }, [aiThreads, apiKeysByProfileId, currentBookPersonas, currentNovel?.title, currentNovelId, defaultProfileId, liveSettings.proxyUrl, modelProfiles, showToast]);

  const handleSummonParagraphComments = useCallback(async ({
    paragraphKey,
    chapterIndex,
    paragraphIndex,
    chapterTitle,
    paragraphText,
    personas: selectedPersonas = [],
  }) => {
    if (!currentNovelId) return 0;
    if (!liveSettings.enabled) throw new Error('AI 生成尚未启用。');
    const allowedIds = new Set(currentBookPersonas.map(persona => persona.id));
    const enabledPersonas = selectedPersonas.filter(persona => persona?.enabled !== false && allowedIds.has(persona.id));
    const profileGroups = getRunnableProfileGroups(enabledPersonas);
    if (!profileGroups.length) throw new Error('没有可用的 AI 接口。');

    const memoryArtifact = lsGet(buildChapterMemoryKey(currentNovelId, chapterIndex), null);
    const memorySummary = memoryArtifact?.payload?.plotSummary || '';
    const errors = [];

    const summonResults = await mapWithConcurrency(enabledPersonas, AI_REQUEST_CONCURRENCY, async (persona) => {
      const group = profileGroups.find(item => item.personas.some(candidate => candidate.id === persona.id)) || profileGroups[0];
      if (!group) return null;
      const apiKey = apiKeysByProfileId[group.profile.id] || '';
      const body = {
        model: group.profile.model,
        temperature: Math.min(1.05, Math.max(0.4, group.profile.temperature)),
        max_tokens: Math.min(360, group.profile.maxOutputTokens || 360),
        messages: [
          { role: 'system', content: 'Reply with comment text only in concise Simplified Chinese. Do not output JSON or Markdown.' },
          {
            role: 'user',
            content: buildSummonedParagraphCommentPrompt({
              novelTitle: currentNovel?.title || '',
              chapterTitle,
              paragraphText,
              memorySummary,
              persona,
            }),
          },
        ],
      };
      try {
        const text = normalizeCommentText(await aiClient.generateThreadReply(liveSettings.proxyUrl, group.profile, apiKey, body));
        if (!text) return null;
        return { persona, text };
      } catch (error) {
        errors.push(`${persona.name || group.profile.name}: ${getErrorMessage(error)}`);
        return null;
      }
    });

    let generatedCount = 0;
    for (const result of summonResults) {
      if (result.status !== 'fulfilled' || !result.value) continue;
      const { persona, text } = result.value;
      handleAddUserComment(paragraphKey, text, {
        personaName: persona.name,
        personaTag: persona.tag,
        personaColor: persona.color,
        personaAvatar: persona.avatar,
        source: 'summoned-llm',
      });
      generatedCount += 1;
    }

    if (!generatedCount && errors.length) {
      throw new Error(errors[0]);
    }
    return generatedCount;
  }, [apiKeysByProfileId, currentBookPersonas, currentNovel?.title, currentNovelId, getRunnableProfileGroups, handleAddUserComment, liveSettings.enabled, liveSettings.proxyUrl]);

  const handleOpenChapterDiscussion = useCallback(async ({
    chapterIndex,
    chapterTitle,
    chapterText,
  }) => {
    if (chapterIndex === 0) {
      await ensureFirstChapterBundle({
        force: false,
        updateVisibleState: true,
      });
      return;
    }
    await ensureChapterDiscussionSeed({
      chapterIndex,
      chapterTitle,
      chapterText,
      force: false,
      updateState: true,
    });
  }, [ensureChapterDiscussionSeed, ensureFirstChapterBundle]);

  const generateChapterComments = useCallback(async (chapterIndex, chapterTitle, paragraphs, force = false) => {
    if (chapterIndex === 0) {
      await ensureFirstChapterBundle({
        force,
        updateVisibleState: true,
      });
      return;
    }
    await ensureChapterComments({
      chapterIndex,
      chapterTitle,
      paragraphs,
      force,
      updateVisibleState: true,
    });
  }, [ensureChapterComments, ensureFirstChapterBundle]);

  const ensureCompleteChapterAi = useCallback(async (chapterIndex, { force = false, updateVisibleState = false } = {}) => {
    const chapter = currentChapters[chapterIndex];
    if (!chapter) throw new Error(`章节不存在：${chapterIndex + 1}`);
    if (chapterIndex === 0) {
      const ok = await ensureFirstChapterBundle({ force, updateVisibleState });
      if (!ok) throw new Error('第一章 AI 评论未完成。');
      markAiChapterComplete(chapterIndex);
      return true;
    }

    const chapterTitle = chapter.title || `第 ${chapterIndex + 1} 章`;
    const chapterText = chapter.content || '';
    const paragraphs = String(chapterText || '').split(/\n+/).map(item => item.trim()).filter(Boolean);
    await ensureChapterSummary(chapterIndex, chapterTitle, chapterText, force);
    const maxChunks = Math.max(1, Math.ceil(Math.max(1, paragraphs.length) / 8));
    const commentsByKey = await ensureChapterComments({
      chapterIndex,
      chapterTitle,
      paragraphs,
      force,
      updateVisibleState,
      maxChunks,
      requireAllChunks: true,
    });
    if (!Object.keys(commentsByKey || {}).length) {
      throw new Error(`第 ${chapterIndex + 1} 章段评生成失败。`);
    }
    const chapterComments = await ensureChapterDiscussionSeed({
      chapterIndex,
      chapterTitle,
      chapterText,
      force,
      updateState: updateVisibleState,
    });
    if (!Array.isArray(chapterComments) || !chapterComments.length) {
      throw new Error(`第 ${chapterIndex + 1} 章章评生成失败。`);
    }
    markAiChapterComplete(chapterIndex);
    return true;
  }, [currentChapters, ensureChapterComments, ensureChapterDiscussionSeed, ensureChapterSummary, ensureFirstChapterBundle, markAiChapterComplete]);

  const handleStartAiGeneration = useCallback((targetChapterIndex) => {
    if (!currentNovelId || !currentNovel || !currentChapters.length) return;
    if (!liveSettings.enabled) {
      showToast({ title: '请先启用 AI', subtitle: '需要在 AI 接口设置里保存可用模型后再生成。' });
      return;
    }
    if (!currentBookPersonas.length) {
      showToast({ title: '本书暂无可用 AI 书友', subtitle: '请先在本书 AI 书友里至少选择一位。' });
      return;
    }
    const chapterCount = currentChapters.length;
    const frontier = getAiGeneratedThrough(currentNovel, chapterCount);
    const target = clamp(Number(targetChapterIndex) || 0, 0, chapterCount - 1);
    if (target <= frontier) {
      showToast({ title: '这些章节已经生成过', subtitle: `当前已生成至第 ${Math.max(1, frontier + 1)} 章。` });
      return;
    }

    updateCurrentNovelAiGeneration({
      aiGenerationJob: {
        running: true,
        targetChapterIndex: target,
        currentChapterIndex: frontier + 1,
        startedAt: Date.now(),
        lastError: '',
      },
    });

    (async () => {
      const queue = [];
      for (let index = frontier + 1; index <= target; index += 1) queue.push(index);
      let lastCompleted = frontier;
      let maxStarted = frontier;
      let firstError = null;

      const results = await mapWithConcurrency(queue, AI_MANUAL_CHAPTER_GENERATION_CONCURRENCY, async (index) => {
        if (firstError) return { index, ok: false, skipped: true };
        if (index > maxStarted) {
          maxStarted = index;
          updateCurrentNovelAiGeneration({
            aiGenerationJob: {
              running: true,
              targetChapterIndex: target,
              currentChapterIndex: index,
              lastError: '',
            },
          });
        }
        try {
          await ensureCompleteChapterAi(index, {
            force: false,
            updateVisibleState: screen === 'reader' && currentChapter === index,
          });
          return { index, ok: true };
        } catch (error) {
          if (!firstError) firstError = error;
          return { index, ok: false, error };
        }
      });

      const okIndexes = results
        .map(result => result.status === 'fulfilled' ? result.value : null)
        .filter(value => value && value.ok)
        .map(value => value.index)
        .sort((a, b) => a - b);
      let contiguous = frontier;
      for (const index of okIndexes) {
        if (index === contiguous + 1) contiguous = index;
        else break;
      }
      lastCompleted = contiguous;

      if (!firstError) {
        updateCurrentNovelAiGeneration({
          aiGeneratedThrough: target,
          aiGenerationJob: {
            running: false,
            targetChapterIndex: target,
            currentChapterIndex: target,
            lastCompletedChapter: target,
            lastError: '',
            completedAt: Date.now(),
          },
        });
        showToast({ title: 'AI 评论预生成完成', subtitle: `已生成至第 ${target + 1} 章。` });
      } else {
        updateCurrentNovelAiGeneration({
          aiGeneratedThrough: lastCompleted,
          aiGenerationJob: {
            running: false,
            targetChapterIndex: target,
            currentChapterIndex: Math.max(0, lastCompleted + 1),
            lastCompletedChapter: lastCompleted,
            lastError: getErrorMessage(firstError),
            completedAt: Date.now(),
          },
        });
        showToast({ title: 'AI 预生成中断', subtitle: getErrorMessage(firstError) });
      }
    })();
  }, [currentBookPersonas.length, currentChapter, currentChapters, currentNovel, currentNovelId, ensureCompleteChapterAi, liveSettings.enabled, screen, showToast, updateCurrentNovelAiGeneration]);

  const ensureCompleteChapterAiRef = useRef(ensureCompleteChapterAi);
  useEffect(() => {
    ensureCompleteChapterAiRef.current = ensureCompleteChapterAi;
  }, [ensureCompleteChapterAi]);

  useEffect(() => {
    if (!['chapters', 'reader'].includes(screen) || !currentNovelId || !currentChapters.length || !liveSettings.enabled || !currentBookPersonas.length) return undefined;
    let cancelled = false;

    const prebuildWindow = planAiPrebuildWindow({
      currentChapterIndex: currentChapter,
      generatedThrough: getAiGeneratedThrough(currentNovel || {}, currentChapters.length),
      chapterCount: currentChapters.length,
      warmCount: 5,
    });
    if (!prebuildWindow.length) return undefined;

    let collectedError = null;

    (async () => {
      await mapWithConcurrency(prebuildWindow, AI_CHAPTER_PREBUILD_CONCURRENCY, async (index) => {
        if (cancelled) return;
        try {
          await ensureCompleteChapterAiRef.current(index, {
            force: false,
            updateVisibleState: screen === 'reader' && currentChapter === index,
          });
        } catch (error) {
          if (!collectedError) collectedError = error;
        }
      });
      if (!cancelled && collectedError) {
        setAiPrebuildState(prev => ({
          ...prev,
          lastError: getErrorMessage(collectedError),
        }));
      }
    })();

    return () => {
      cancelled = true;
    };
  }, [currentBookPersonas.length, currentChapter, currentChapters.length, currentNovelId, liveSettings.enabled, screen]);

const handleTestConnection = useCallback(async () => {
    if (!liveSettings.proxyUrl.trim() || !currentProfile.baseUrl.trim() || !currentProfile.model.trim()) {
      setConnectionState({
        status: 'error',
        message: '请先填写 Proxy URL、Base URL 和模型名称，再测试连接。',
        fingerprint: currentConnectionFingerprint,
      });
      return;
    }
    setConnectionState({ status: 'loading', message: '正在测试连接...', fingerprint: currentConnectionFingerprint });
    try {
      const result = await aiClient.testConnection(liveSettings.proxyUrl, currentProfile, currentApiKey);
      setConnectionState({
        status: 'success',
        message: `连接成功，模型 ${result.model || currentProfile.model} 已通过实测。`,
        fingerprint: currentConnectionFingerprint,
      });
    } catch (error) {
      setConnectionState({ status: 'error', message: getErrorMessage(error), fingerprint: currentConnectionFingerprint });
    }
  }, [liveSettings.proxyUrl, currentProfile, currentApiKey, currentConnectionFingerprint]);

  const handleDiscoverModels = useCallback(async () => {
    setIsDiscoveringModels(true);
    try {
      const models = await aiClient.listModels(liveSettings.proxyUrl, currentProfile, currentApiKey);
      setConnectionState({ status: 'success', message: models.length ? `已发现 ${models.length} 个模型。` : '端点可连通，但没有返回模型列表。' });
      if (!currentProfile.model && models[0]?.id) updateCurrentProfile({ model: models[0].id });
    } catch (error) {
      setConnectionState({ status: 'error', message: getErrorMessage(error) });
    } finally {
      setIsDiscoveringModels(false);
    }
  }, [liveSettings.proxyUrl, currentProfile, currentApiKey, updateCurrentProfile]);

  const handleAddFriend = useCallback(() => {
    setEditingPersonaId(null);
    setScreen('friendCreate');
  }, []);

  const handleEditFriend = (personaId) => {
    setEditingPersonaId(personaId);
    setScreen('friendEdit');
  };

  const handleDeleteFriend = useCallback((personaId) => {
    const target = personas.find(persona => persona.id === personaId);
    if (!target) return;
    const defaultIds = new Set(DEFAULT_PERSONAS.map(persona => persona.id));
    if (defaultIds.has(personaId)) {
      const deletedDefaults = new Set(lsGet(STORAGE_KEYS.deletedDefaultPersonas, []));
      deletedDefaults.add(personaId);
      lsSet(STORAGE_KEYS.deletedDefaultPersonas, Array.from(deletedDefaults));
    }
    setPersonas(prev => prev.filter(persona => persona.id !== personaId));
    setNovels(prev => prev.map(novel => {
      if (!Array.isArray(novel.allowedPersonaIds)) return novel;
      const nextIds = novel.allowedPersonaIds.filter(id => id !== personaId);
      if (!nextIds.length) {
        const next = { ...novel };
        delete next.allowedPersonaIds;
        return next;
      }
      return {
        ...novel,
        allowedPersonaIds: nextIds,
      };
    }));
    if (editingPersonaId === personaId) setEditingPersonaId(null);
    setScreen('friends');
    showToast({ title: 'AI书友已删除', subtitle: `「${target.name}」不会再参与后续评论生成` });
  }, [editingPersonaId, personas, showToast]);

  const handleSaveFriend = (draft, mode = 'edit') => {
    if (mode === 'create') {
      setPersonas(prev => [...prev, normalizePersona(draft, prev.length)]);
      showToast({ title: 'AI书友创建成功', subtitle: '已添加到你的AI书友列表' });
    } else {
      setPersonas(prev => prev.map(persona => persona.id === draft.id ? normalizePersona(draft) : persona));
      showToast({ title: '已保存AI书友设置', subtitle: '设置已成功保存' });
    }
    setScreen('friends');
  };

  const handleGenerateFriendPreview = useCallback(async (draftPersona, sample) => {
    const normalizedPersona = normalizePersona(draftPersona, 0);
    const explicitProfileId = String(normalizedPersona.modelProfileId || '').trim();
    const profile = explicitProfileId
      ? getProfileById(modelProfiles, explicitProfileId)
      : getProfileById(modelProfiles, defaultProfileId);
    const apiKey = apiKeysByProfileId[profile?.id] || (profile?.id === currentProfile?.id ? currentApiKey : '');
    if (DEMO_MODE || !profile?.baseUrl || !profile?.model) {
      const label = profile ? getModelProfileLabel(profile) : (explicitProfileId ? `未知接口 / ${explicitProfileId}` : '默认接口');
      throw new Error(`${explicitProfileId ? '这个书友选择的接口' : '默认接口'}：${label} 缺少 Base URL 或模型名。`);
    }
    const body = {
      model: profile.model,
      temperature: Math.min(0.9, Math.max(0.35, Number(profile.temperature) || 0.7)),
      max_tokens: 180,
      messages: [
        { role: 'system', content: 'Write concise Simplified Chinese only. Do not use Markdown.' },
        { role: 'user', content: buildPersonaPreviewPrompt({ persona: normalizedPersona, sample }) },
      ],
    };
    try {
      return normalizeCommentText(await aiClient.generatePersonaPreview(liveSettings.proxyUrl, profile, apiKey, body));
    } catch (error) {
      throw new Error(`预览接口：${getModelProfileLabel(profile)}。上游错误：${getErrorMessage(error)}`);
    }
  }, [apiKeysByProfileId, currentApiKey, currentProfile, defaultProfileId, liveSettings.proxyUrl, modelProfiles]);

  const settingsObj = {
    fontSize,
    setFontSize,
    lineHeight,
    setLineHeight,
    theme,
    setTheme,
    liveSettings,
    setLiveSettings,
    modelProfiles,
    selectedProfileId,
    setSelectedProfileId,
    defaultProfileId,
    addModelProfile,
    setDefaultProfileId,
    currentProfile,
    updateCurrentProfile,
    currentApiKey,
    setCurrentApiKey,
    connectionState,
    isDiscoveringModels,
    personas,
    setPersonas,
    onTestConnection: handleTestConnection,
    onDiscoverModels: handleDiscoverModels,
    liveTriggerKey,
    currentConnectionFingerprint,
  };
  const readerSettingsObj = {
    ...settingsObj,
    personas: currentBookPersonas,
    liveTriggerKey: currentBookAiFingerprint,
  };

  return (
    <>
      {screen === 'bookshelf' && (
        <BookshelfScreen
          novels={novels}
          onSelectNovel={handleSelectNovel}
          onImport={handleImport}
          onDeleteNovel={handleDelete}
          onRenameNovel={handleRenameNovel}
          onContinueNovel={handleContinueNovel}
          onNavigate={navigateTab}
          toast={appToast}
        />
      )}
      {screen === 'chapters' && currentNovel && (
        <ChapterListScreen
          novel={currentNovel}
          chapters={currentChapters}
          personas={personas}
          onSelectChapter={handleSelectChapter}
          onBack={() => setScreen('bookshelf')}
          onContinue={() => handleContinueNovel(currentNovel.id)}
          onDeleteNovel={handleDelete}
          onRenameNovel={handleRenameNovel}
          onStartAiGeneration={handleStartAiGeneration}
          onUpdateBookPersonas={handleUpdateBookPersonas}
          liveEnabled={liveSettings.enabled}
          toast={appToast}
        />
      )}
      {screen === 'reader' && currentNovel && currentChapters.length > 0 && (
        <ReaderScreen
          novel={currentNovel}
          chapters={currentChapters}
          chapterIndex={currentChapter}
          onBack={() => setScreen('chapters')}
          onChangeChapter={handleChangeChapter}
          onUpdateProgress={handleUpdateProgress}
          settings={readerSettingsObj}
          userComments={userComments}
          commentReplies={commentReplies}
          commentLikes={commentLikes}
          onAddUserComment={handleAddUserComment}
          onSubmitComment={handleSubmitComment}
          onSummonCommentReply={handleSummonCommentReply}
          onToggleCommentLike={handleToggleCommentLike}
          aiState={chapterAiState}
          chapterDiscussionComments={chapterDiscussionState[buildChapterCommentKey(currentNovelId, currentChapter)]?.comments || []}
          chapterDiscussionStatus={chapterDiscussionState[buildChapterCommentKey(currentNovelId, currentChapter)] || { status: 'idle', comments: [] }}
          aiPrebuildState={aiPrebuildState}
          onOpenChapterDiscussion={handleOpenChapterDiscussion}
          onGenerateChapter={generateChapterComments}
          onSummonParagraphComments={handleSummonParagraphComments}
        />
      )}
      {screen === 'settings' && (
        <SettingsScreen settings={settingsObj} onNavigate={navigateTab} />
      )}
      {screen === 'friends' && (
        <AiFriendsScreen
          personas={personas}
          onNavigate={navigateTab}
          onEditFriend={handleEditFriend}
          onAddFriend={handleAddFriend}
          onDeleteFriend={handleDeleteFriend}
          toast={appToast}
        />
      )}
      {screen === 'friendEdit' && (
        <FriendEditScreen
          persona={personas.find(persona => persona.id === editingPersonaId)}
          modelProfiles={modelProfiles}
          defaultProfileId={defaultProfileId}
          onBack={() => setScreen('friends')}
          onSave={handleSaveFriend}
          onDelete={handleDeleteFriend}
          onNavigate={navigateTab}
          onGeneratePreview={handleGenerateFriendPreview}
        />
      )}
      {screen === 'friendCreate' && (
        <FriendEditScreen
          mode="create"
          modelProfiles={modelProfiles}
          defaultProfileId={defaultProfileId}
          onBack={() => setScreen('friends')}
          onSave={handleSaveFriend}
          onNavigate={navigateTab}
          onGeneratePreview={handleGenerateFriendPreview}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
