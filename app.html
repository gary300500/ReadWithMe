<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>ReadWithMe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f3ea;
  --bg-soft: #fbf7f0;
  --surface: rgba(255, 252, 247, 0.88);
  --surface-strong: #fffaf5;
  --surface-muted: #f4ecde;
  --text: #1f1b16;
  --text-soft: #6c665f;
  --text-muted: #a0968a;
  --border: rgba(171, 137, 95, 0.18);
  --border-strong: rgba(171, 137, 95, 0.28);
  --accent: #b67a2f;
  --accent-dark: #9b6422;
  --accent-soft: #efe0c8;
  --danger: #c85f4b;
  --shadow: 0 18px 40px rgba(80, 54, 24, 0.12);
  --hairline: rgba(77, 54, 31, 0.08);
  --sans: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  --serif: "Noto Serif SC", "Songti SC", "STSong", serif;
}

* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  height: 100%;
  margin: 0;
}

body {
  overflow: hidden;
  color: var(--text);
  background:
    radial-gradient(circle at 20% 10%, rgba(211, 183, 140, 0.18), transparent 30%),
    radial-gradient(circle at 85% 0%, rgba(255, 255, 255, 0.78), transparent 28%),
    #f0ece6;
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
}

#root {
  position: relative;
  width: min(100vw, 430px);
  height: 100dvh;
  margin: 0 auto;
  overflow: hidden;
  background:
    radial-gradient(circle at 84% 8%, rgba(255, 255, 255, 0.74), transparent 22%),
    linear-gradient(180deg, #fbf7f0 0%, #f8f3ea 52%, #fbf7f0 100%);
}

button,
input,
textarea {
  font: inherit;
}

button {
  margin: 0;
  padding: 0;
  color: inherit;
  background: none;
  border: 0;
  cursor: pointer;
}

input,
textarea {
  color: var(--text);
}

::-webkit-scrollbar {
  width: 4px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: rgba(166, 122, 67, 0.22);
  border-radius: 999px;
}

@media (min-width: 760px) {
  #root {
    height: min(100dvh - 28px, 932px);
    margin-top: 14px;
    border: 10px solid #111;
    border-radius: 42px;
    box-shadow: 0 24px 65px rgba(0, 0, 0, 0.22);
  }
}

.app-screen {
  position: relative;
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background:
    radial-gradient(circle at 86% 7%, rgba(255, 255, 255, 0.82), transparent 21%),
    linear-gradient(180deg, #fbf7f0 0%, #f8f3ea 55%, #fbf7f0 100%);
}

.scroll-area {
  flex: 1;
  min-height: 0;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

.statusbar {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 44px;
  padding: 0 22px;
  flex: 0 0 44px;
  color: var(--text);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.01em;
}

.statusbar .island {
  position: absolute;
  left: 50%;
  top: 8px;
  width: 126px;
  height: 36px;
  transform: translateX(-50%);
  border-radius: 999px;
  background: #050505;
  box-shadow: inset -19px 0 0 rgba(28, 75, 142, 0.25);
}

.status-icons {
  display: flex;
  align-items: center;
  gap: 7px;
}

.signal {
  display: inline-flex;
  align-items: flex-end;
  gap: 2px;
  height: 13px;
}

.signal i {
  display: block;
  width: 3px;
  background: #111;
  border-radius: 2px;
}

.signal i:nth-child(1) { height: 4px; }
.signal i:nth-child(2) { height: 7px; }
.signal i:nth-child(3) { height: 10px; }
.signal i:nth-child(4) { height: 13px; }

.wifi {
  position: relative;
  width: 15px;
  height: 12px;
}

.wifi::before,
.wifi::after {
  position: absolute;
  left: 50%;
  content: "";
  transform: translateX(-50%);
  border: 2px solid #111;
  border-bottom: 0;
  border-radius: 14px 14px 0 0;
}

.wifi::before {
  top: 0;
  width: 14px;
  height: 8px;
}

.wifi::after {
  top: 5px;
  width: 8px;
  height: 5px;
}

.battery {
  position: relative;
  width: 23px;
  height: 12px;
  border: 1.8px solid #111;
  border-radius: 4px;
}

.battery::before {
  position: absolute;
  right: -4px;
  top: 3px;
  width: 2px;
  height: 5px;
  content: "";
  background: #111;
  border-radius: 0 2px 2px 0;
}

.battery::after {
  position: absolute;
  left: 2px;
  top: 2px;
  width: 15px;
  height: 6px;
  content: "";
  background: #111;
  border-radius: 2px;
}

.top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.brand {
  color: #4f4a44;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: -0.02em;
}

.round-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  color: var(--text);
  border-radius: 999px;
  background: rgba(241, 230, 210, 0.78);
  transition: transform 160ms ease, background 160ms ease;
}

.round-button:active {
  transform: scale(0.96);
}

.screen-body {
  padding: 10px 18px 0;
}

.library-scroll {
  padding-bottom: 98px;
}

.screen-title-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 26px 0 18px;
}

.screen-title {
  margin: 0;
  color: var(--text);
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 700;
  line-height: 1.08;
  letter-spacing: -0.01em;
}

.count-pill {
  display: inline-flex;
  align-items: center;
  height: 26px;
  padding: 0 12px;
  color: #81776b;
  background: rgba(235, 229, 219, 0.82);
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
}

.import-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 16px 17px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
  border-radius: 17px;
  background: rgba(255, 252, 247, 0.84);
  box-shadow: 0 9px 26px rgba(80, 54, 24, 0.07);
}

.import-left {
  display: flex;
  align-items: center;
  gap: 16px;
  min-width: 0;
}

.import-icon {
  position: relative;
  display: grid;
  place-items: center;
  width: 70px;
  height: 70px;
  flex: 0 0 auto;
  color: #fff;
  border-radius: 10px;
  background: linear-gradient(145deg, #f6ead4, #fff7ec);
}

.import-icon::before {
  width: 32px;
  height: 26px;
  content: "";
  border-radius: 4px 4px 7px 7px;
  background: linear-gradient(180deg, #b58242, #9d642b);
  box-shadow: inset 0 8px 0 rgba(255, 255, 255, 0.2);
}

.import-icon svg {
  position: absolute;
  bottom: 19px;
  color: #fffaf5;
}

.import-card h2 {
  margin: 0 0 6px;
  color: #2a261f;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.import-card p {
  margin: 0;
  color: var(--text-muted);
  font-size: 13px;
}

.chevron {
  color: #7c7267;
}

.privacy-card {
  display: flex;
  gap: 13px;
  align-items: flex-start;
  padding: 14px 16px;
  margin-bottom: 14px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(255, 250, 245, 0.46);
}

.privacy-badge {
  display: grid;
  place-items: center;
  width: 24px;
  height: 24px;
  flex: 0 0 auto;
  color: var(--accent);
}

.privacy-title {
  margin-bottom: 4px;
  color: var(--text-soft);
  font-size: 13px;
  font-weight: 700;
}

.privacy-text {
  color: var(--text-muted);
  font-size: 12px;
  line-height: 1.5;
}

.book-list {
  display: grid;
  gap: 10px;
  padding: 0;
}

.book-row {
  display: flex;
  width: 100%;
  gap: 14px;
  padding: 10px;
  text-align: left;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(255, 252, 247, 0.72);
  box-shadow: 0 8px 18px rgba(80, 54, 24, 0.04);
}

.book-cover {
  position: relative;
  width: 64px;
  height: 92px;
  flex: 0 0 auto;
  overflow: hidden;
  border-radius: 7px;
  color: #fff;
  background: linear-gradient(145deg, #111823, #4e6674);
  box-shadow: 0 7px 14px rgba(46, 29, 12, 0.16);
}

.book-cover::before {
  position: absolute;
  inset: 0;
  content: "";
  background:
    radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.24), transparent 24%),
    linear-gradient(115deg, transparent 0%, rgba(255, 255, 255, 0.1) 46%, transparent 47%);
}

.book-cover::after {
  position: absolute;
  left: 0;
  top: 0;
  width: 12px;
  height: 100%;
  content: "";
  background: rgba(0, 0, 0, 0.16);
}

.cover-title {
  position: absolute;
  left: 16px;
  right: 10px;
  top: 15px;
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 700;
  line-height: 1.08;
  writing-mode: vertical-rl;
  letter-spacing: 0.08em;
  text-shadow: 0 2px 6px rgba(0, 0, 0, 0.22);
}

.cover-mark {
  position: absolute;
  left: 15px;
  bottom: 8px;
  color: rgba(255, 255, 255, 0.74);
  font-size: 8px;
  font-weight: 800;
  letter-spacing: 0.12em;
}

.cover-1 { background: linear-gradient(150deg, #111823, #587181 60%, #1f2228); }
.cover-2 { background: linear-gradient(150deg, #120c08, #a15b15 58%, #2b1710); }
.cover-3 { background: linear-gradient(150deg, #d88c48, #49362d 57%, #161111); }
.cover-4 { background: linear-gradient(150deg, #e7d6b9, #5d6a6d 54%, #332f2b); }
.cover-5 { background: linear-gradient(150deg, #132134, #4b769b 58%, #09111c); }
.cover-6 { background: linear-gradient(150deg, #2a170f, #8b5c2c 58%, #15100d); }

.book-info {
  min-width: 0;
  flex: 1;
  padding-top: 2px;
}

.book-row-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}

.book-title {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  overflow: hidden;
  color: #241f18;
  font-size: 16px;
  font-weight: 800;
  line-height: 1.35;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.more-button {
  display: grid;
  place-items: center;
  width: 26px;
  height: 26px;
  flex: 0 0 auto;
  color: #81786d;
  border-radius: 999px;
}

.more-button:active {
  background: rgba(166, 122, 67, 0.12);
}

.book-percent {
  margin-top: 5px;
  color: #7f776c;
  font-size: 13px;
  font-weight: 600;
}

.new-pill {
  display: inline-flex;
  align-items: center;
  height: 18px;
  padding: 0 7px;
  color: #fff;
  border-radius: 999px;
  background: #8a4e20;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.02em;
}

.progress-track {
  width: 150px;
  max-width: 100%;
  height: 4px;
  margin: 7px 0 7px;
  overflow: hidden;
  border-radius: 999px;
  background: #e6ded3;
}

.progress-fill {
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, #9b6422, #c78a3a);
}

.last-read {
  overflow: hidden;
  color: #9f9588;
  font-size: 12px;
  line-height: 1.4;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.bottom-nav {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 82px;
  padding: 8px 42px 16px;
  border-top: 1px solid rgba(132, 103, 68, 0.08);
  background: rgba(251, 247, 240, 0.86);
  backdrop-filter: blur(18px);
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  min-width: 72px;
  color: #8f8578;
  font-size: 13px;
  font-weight: 700;
}

.nav-item.active {
  color: var(--accent);
}

.empty-state {
  padding: 34px 18px;
  color: var(--text-muted);
  text-align: center;
}

.empty-state h3 {
  margin: 10px 0 6px;
  color: var(--text);
  font-size: 17px;
}

.delete-dialog {
  position: fixed;
  inset: 0;
  z-index: 90;
  display: grid;
  place-items: center;
  padding: 26px;
  background: rgba(0, 0, 0, 0.32);
}

.dialog-card {
  width: min(100%, 318px);
  padding: 24px;
  text-align: center;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--surface-strong);
  box-shadow: var(--shadow);
}

.dialog-card h3 {
  margin: 0 0 8px;
  font-size: 17px;
}

.dialog-card p {
  margin: 0 0 20px;
  color: var(--text-soft);
  font-size: 13px;
  line-height: 1.55;
}

.dialog-actions {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.toast {
  position: absolute;
  left: 50%;
  top: 112px;
  z-index: 150;
  display: flex;
  align-items: center;
  gap: 10px;
  width: min(328px, calc(100% - 32px));
  min-height: 64px;
  padding: 12px 16px;
  color: #fff;
  transform: translateX(-50%);
  border-radius: 10px;
  background: rgba(24, 24, 24, 0.92);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
}

.toast-icon {
  display: grid;
  place-items: center;
  width: 28px;
  height: 28px;
  flex: 0 0 auto;
  border-radius: 999px;
  background: #39b54a;
  color: #fff;
  font-weight: 900;
}

.toast-title {
  font-size: 15px;
  font-weight: 900;
}

.toast-subtitle {
  margin-top: 2px;
  color: rgba(255, 255, 255, 0.78);
  font-size: 12px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 46px;
  padding: 0 18px;
  border-radius: 11px;
  font-size: 14px;
  font-weight: 800;
}

.btn:disabled {
  cursor: not-allowed;
  opacity: 0.58;
}

.btn-outline {
  color: var(--accent);
  border: 1px solid rgba(182, 122, 47, 0.72);
  background: rgba(255, 255, 255, 0.62);
}

.btn-primary {
  color: #fff;
  background: linear-gradient(180deg, #be8439, #a96c25);
}

.btn-danger {
  color: #fff;
  background: var(--danger);
}

.topbar {
  display: grid;
  grid-template-columns: 44px 1fr 44px;
  align-items: center;
  gap: 8px;
  min-height: 54px;
  padding: 2px 18px 8px;
}

.topbar-title {
  overflow: hidden;
  color: #575148;
  font-size: 14px;
  font-weight: 700;
  text-align: center;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.book-detail-body {
  padding: 2px 18px 110px;
}

.book-summary {
  display: grid;
  grid-template-columns: 78px 1fr;
  gap: 14px;
  align-items: center;
  margin: 8px 0 16px;
}

.book-summary .book-cover {
  width: 78px;
  height: 112px;
}

.book-summary-title {
  color: #241f18;
  font-size: 18px;
  font-weight: 900;
}

.book-summary-meta {
  margin-top: 7px;
  color: #8b8176;
  font-size: 13px;
  line-height: 1.5;
}

.continue-btn {
  width: 100%;
  height: 44px;
  margin: 4px 0 18px;
  color: #fff;
  border-radius: 8px;
  background: linear-gradient(180deg, #a66328, #7d3e12);
  font-size: 14px;
  font-weight: 900;
  box-shadow: 0 8px 18px rgba(124, 66, 19, 0.14);
}

.volume-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  color: #4e4439;
  font-size: 14px;
  font-weight: 900;
}

.chapters-body {
  padding: 6px 18px 24px;
}

.chapter-hero {
  margin: 8px 0 16px;
}

.chapter-hero h1 {
  margin: 0 0 8px;
  color: var(--text);
  font-family: var(--serif);
  font-size: 27px;
  letter-spacing: -0.04em;
}

.chapter-hero p {
  margin: 0;
  color: var(--text-muted);
  font-size: 13px;
}

.chapter-row {
  width: 100%;
  padding: 10px 12px;
  margin-bottom: 6px;
  text-align: left;
  border: 0;
  border-radius: 8px;
  background: transparent;
}

.chapter-row.current {
  background: #f4eadc;
}

.chapter-title {
  overflow: hidden;
  color: #241f18;
  font-size: 16px;
  font-weight: 800;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.chapter-meta {
  margin-top: 5px;
  color: var(--text-muted);
  font-size: 12px;
}

.bottom-sheet-backdrop {
  position: absolute;
  inset: 0;
  z-index: 95;
  background: rgba(0, 0, 0, 0.36);
}

.plain-backdrop {
  background: rgba(0, 0, 0, 0.02);
}

.sheet-panel {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 100;
  border-radius: 18px 18px 0 0;
  background: rgba(255, 252, 247, 0.98);
  box-shadow: 0 -18px 40px rgba(52, 35, 17, 0.18);
  animation: sheetIn 230ms cubic-bezier(0.22, 0.8, 0.22, 1);
}

.action-row {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  height: 54px;
  padding: 0 20px;
  color: #2c251e;
  text-align: left;
  border-bottom: 1px solid var(--hairline);
  font-size: 15px;
  font-weight: 800;
}

.action-row.danger {
  color: #cf3e2e;
}

.action-cancel {
  width: 100%;
  height: 52px;
  color: #6d6257;
  font-size: 15px;
  font-weight: 800;
}

.reader-screen {
  background: linear-gradient(180deg, #fbf7f0, #f8f3ea 72%, #fbf7f0);
}

.reader-scroll {
  padding: 4px 24px 92px;
}

.reader-title-muted {
  margin: 0 0 24px;
  color: #b1a697;
  font-size: 10px;
  font-weight: 500;
}

.reader-article {
  padding-top: 10px;
}

.reader-p {
  margin: 0 0 24px;
  color: #222;
  font-family: var(--serif);
  font-size: var(--reader-font-size, 20px);
  font-weight: 500;
  line-height: var(--reader-line-height, 1.84);
  letter-spacing: 0.02em;
  text-indent: 2em;
}

.comment-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 24px;
  height: 22px;
  margin-left: 6px;
  padding: 0 8px;
  color: #8f6b3d;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 800;
  line-height: 1;
  text-indent: 0;
  vertical-align: middle;
  border: 1px solid rgba(143, 107, 61, 0.32);
  border-radius: 8px 8px 8px 2px;
  background: rgba(255, 250, 245, 0.5);
}

.comment-badge.active {
  color: #fff;
  border-color: var(--accent);
  background: var(--accent);
}

.reader-progress {
  position: absolute;
  left: 18px;
  right: 18px;
  bottom: 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: #a59c90;
  font-size: 11px;
}

.chapter-jump-panel {
  padding: 10px 18px 18px;
}

.jump-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin: 4px 0 16px;
  color: #2b241c;
  font-size: 13px;
  font-weight: 900;
}

.jump-progress {
  color: #7d7063;
  font-size: 12px;
  font-weight: 800;
}

.jump-range {
  width: 100%;
  accent-color: var(--accent);
}

.jump-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 14px;
  color: #4c4339;
  font-size: 13px;
  font-weight: 800;
}

.reading-setting-panel {

function normalizeText(text) {

const CHINESE_DIGITS = {
  零: 0,
  〇: 0,
  一: 1,
  二: 2,
  两: 2,
  三: 3,
  四: 4,
  五: 5,
  六: 6,
  七: 7,
  八: 8,
  九: 9,
};

const CHINESE_UNITS = {
  十: 10,
  百: 100,
  千: 1000,
  万: 10000,
};

function parseChapterNumber(raw) {
  const text = String(raw || '').replace(/\s+/g, '');
  if (!text) return null;
  if (/^\d+$/.test(text)) return Number(text);
  let total = 0;
  let section = 0;
  let number = 0;
  for (const char of text) {
    if (Object.prototype.hasOwnProperty.call(CHINESE_DIGITS, char)) {
      number = CHINESE_DIGITS[char];
      continue;
    }
    const unit = CHINESE_UNITS[char];
    if (!unit) return null;
    if (unit === 10000) {
      total += (section + number) * unit;
      section = 0;
    } else {
      section += (number || 1) * unit;
    }
    number = 0;
  }
  return total + section + number || null;
}

function hasSentencePunctuation(text) {
  return /[，。！？；,.!?;]/.test(text);
}

function isWeakChapterUnit(unit) {
  return unit === '篇' || unit === '节';
}

function getChapterCandidate(line, lineIndex, startIndex, lines) {
  const title = String(line || '').trim().replace(/\s+/g, ' ');
  if (!title || title.length > 72) return null;

  const prevBlank = lineIndex === 0 || !String(lines[lineIndex - 1] || '').trim();
  const nextBlank = lineIndex === lines.length - 1 || !String(lines[lineIndex + 1] || '').trim();
  const numbered = title.match(/^(?:正文\s*)?第\s*([零〇一二两三四五六七八九十百千万\d]+)\s*([章回卷部集篇节])([：:、.\-—\s]*)(.{0,48})$/);
  if (numbered) {
    const number = parseChapterNumber(numbered[1]);
    const unit = numbered[2];
    const separator = numbered[3] || '';
    const suffix = (numbered[4] || '').trim();
    if (!number) return null;
    if (!['章', '回'].includes(unit) && suffix && !separator) return null;
    if (isWeakChapterUnit(unit) && (hasSentencePunctuation(title) || /^[是为有在于和与及的了着过把被将会能可我你他她它这那更]/.test(suffix))) {
      return null;
    }
    let score = unit === '章' || unit === '回' ? 7 : unit === '卷' || unit === '部' || unit === '集' ? 6 : 3;
    if (prevBlank) score += 1.5;
    if (nextBlank) score += 1;
    if (title.length <= 36) score += 1;
    if (title.length <= 20) score += 0.5;
    if (suffix.length > 36) score -= 1;
    if (isWeakChapterUnit(unit)) score -= 1.5;
    return { index: startIndex, title, number, unit, score, weak: isWeakChapterUnit(unit), special: false };
  }

  const special = title.match(/^(序章|楔子|前言|引子|尾声|后记|番外)(?:\s*[：:、.\-—]\s*(.{1,40}))?$/);
  if (special) {
    let score = 6;
    if (prevBlank) score += 1;
    if (nextBlank) score += 1;
    return { index: startIndex, title, number: null, unit: special[1], score, weak: false, special: true };
  }

  return null;
}

function averageCandidateGap(candidates) {
  if (candidates.length < 2) return 0;
  let total = 0;
  for (let index = 1; index < candidates.length; index++) {
    total += candidates[index].index - candidates[index - 1].index;
  }
  return total / (candidates.length - 1);
}

function sequenceConfidence(candidates) {
  const numbered = candidates.filter(item => Number.isFinite(item.number));
  if (numbered.length < 2) return 0;
  let increasing = 0;
  for (let index = 1; index < numbered.length; index++) {
    const diff = numbered[index].number - numbered[index - 1].number;
    if (diff > 0 && diff <= 10) increasing++;
  }
  return increasing / (numbered.length - 1);
}

function chooseChapterCandidates(candidates) {
  const strong = candidates.filter(item => !item.weak && item.score >= 6);
  const weak = candidates.filter(item => item.weak && item.score >= 4);
  const selected = strong.length >= 2
    ? strong
    : strong.filter(item => item.score >= 8);

  if (selected.length >= 2) {
    return candidates.filter(item => selected.includes(item) || (item.special && item.score >= 7));
  }

  const weakLooksLikeToc = weak.length >= 3
    && sequenceConfidence(weak) >= 0.65
    && averageCandidateGap(weak) >= 300;
  if (weakLooksLikeToc) return weak;
  return selected;
}

function parseNovelChapters(text) {
  const normalized = normalizeText(text);
  const lines = normalized.split('\n');
  const matches = [];
  let offset = 0;
  lines.forEach((line, index) => {
    const candidate = getChapterCandidate(line, index, offset, lines);
    if (candidate) matches.push(candidate);
    offset += line.length + 1;
  });
  const selected = chooseChapterCandidates(matches);
  if (!matches.length) {
    return [{ title: '全文', content: normalized || '这本书还没有可阅读的正文。' }];
  }
  if (!selected.length) {
    return [{ title: '全文', content: normalized || '这本书还没有可阅读的正文。' }];
  }
  return selected.map((item, index) => {
    const start = item.index + item.title.length;
    const end = index + 1 < selected.length ? selected[index + 1].index : normalized.length;
    return { title: item.title, content: normalized.slice(start, end).trim() || item.title };
  });
}

function hashText(text) {
  let hash = 2166136261;
  for (let i = 0; i < text.length; i++) {
    hash ^= text.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return Math.abs(hash >>> 0);
}

function safeJsonParse(text, fallback = null) {
  try {
    return JSON.parse(text);
  } catch {
    return fallback;
  }
}

function stripJsonFence(rawText = '') {
  return String(rawText || '').replace(/```json|```/gi, '').trim();
}

function repairLooseJson(rawText = '') {
  return stripJsonFence(rawText)
    .replace(/,\s*}/g, '}')
    .replace(/,\s*]/g, ']')
    .trim();
}

function parseStructuredPayload(rawText, repair = value => value) {
  const direct = stripJsonFence(rawText);
  try {
    return { ok: true, value: JSON.parse(direct), repaired: false };
  } catch (error) {
    try {
      return { ok: true, value: JSON.parse(repair(direct)), repaired: true };
    } catch (repairError) {
      return { ok: false, error: repairError };
    }
  }
}

function extractJsonBlock(text) {
  const raw = String(text || '').trim();
  if (!raw) return '{}';
  const fenced = raw.match(/```(?:json)?\s*([\s\S]*?)```/i);
  if (fenced) return fenced[1].trim();
  const start = raw.indexOf('{');
  const end = raw.lastIndexOf('}');
  if (start >= 0 && end > start) return raw.slice(start, end + 1);
  return raw;
}

function getDefaultProfileId(profiles = [], preferredId = '') {
  const normalizedProfiles = Array.isArray(profiles) ? profiles : [];
  if (!normalizedProfiles.length) return '';
  const preferred = String(preferredId || '').trim();
  if (preferred && normalizedProfiles.some(profile => profile.id === preferred)) return preferred;
  return normalizedProfiles[0].id || '';
}

function getProfileById(profiles = [], profileId = '') {
  const id = String(profileId || '').trim();
  return (Array.isArray(profiles) ? profiles : []).find(profile => profile.id === id) || null;
}

function getPersonaProfileId(persona = {}, profiles = [], defaultProfileId = '') {
  const overrideId = String(persona.modelProfileId || '').trim();
  if (overrideId && getProfileById(profiles, overrideId)) return overrideId;
  return getDefaultProfileId(profiles, defaultProfileId);
}

function groupPersonasByProfile(personas = [], profiles = [], defaultProfileId = '') {
  const groupsById = new Map();
  personas.filter(persona => persona.enabled).forEach(persona => {
    const profileId = getPersonaProfileId(persona, profiles, defaultProfileId);
    const profile = getProfileById(profiles, profileId);
    if (!profile) return;
    if (!groupsById.has(profile.id)) groupsById.set(profile.id, { profile, personas: [] });
    groupsById.get(profile.id).personas.push(persona);
  });
  return Array.from(groupsById.values());
}

function summarizeThreadTurns(turns = []) {
  return turns
    .filter(turn => turn && String(turn.text || '').trim())
    .slice(-4)
    .map(turn => `${turn.role === 'user' ? 'U' : 'A'}:${String(turn.text || '').trim().slice(0, 36)}`)
    .join(' | ');
}

function appendThreadTurn(thread, message) {
  const existingTurns = (thread && Array.isArray(thread.turns)) ? thread.turns : [];
  const nextTurns = [...existingTurns, message];
  const maxTurns = 6;
  const overflowCount = Math.max(0, nextTurns.length - maxTurns);
  const keptTurns = overflowCount > 0 ? nextTurns.slice(overflowCount) : nextTurns;
  const compressedTurns = overflowCount > 0 ? nextTurns.slice(0, overflowCount) : [];
  const compressedSummary = compressedTurns.length ? summarizeThreadTurns(compressedTurns) : '';
  const priorSummary = String(thread?.summary || '').trim();
  const nextSummary = [priorSummary, compressedSummary].filter(Boolean).join(' || ').slice(-500);
  return {
    ...(thread || createEmptyThread(String(message?.threadId || ''))),
    turns: keptTurns,
    summary: nextSummary,
    updatedAt: Date.now(),
  };
}

function validateSummaryCandidate(summary, expectedChapterIndex) {
  if (!summary || typeof summary !== 'object') return { ok: false, reason: 'not-object' };
  if (summary.chapterIndex !== expectedChapterIndex) return { ok: false, reason: 'chapter-mismatch' };
  if (!String(summary.plotSummary || '').trim()) return { ok: false, reason: 'missing-plot' };
  if (!Array.isArray(summary.majorCharacters)) return { ok: false, reason: 'missing-characters' };
  if (!Array.isArray(summary.relationships)) return { ok: false, reason: 'missing-relationships' };
  if (!Array.isArray(summary.openQuestions)) return { ok: false, reason: 'missing-open-questions' };
  if (!Array.isArray(summary.worldFacts)) return { ok: false, reason: 'missing-world-facts' };
  return { ok: true };
}

function createFallbackSummaryPayload({ chapterIndex, chapterTitle, chapterText, previousSummary }) {
  const paragraphs = String(chapterText || '')
    .split(/\n+/)
    .map(item => item.trim())
    .filter(Boolean);
  const lead = paragraphs.slice(0, 2).join(' ').slice(0, 180);
  const inheritedCharacters = Array.isArray(previousSummary?.majorCharacters)
    ? previousSummary.majorCharacters.slice(0, 3)
    : [];
  const inheritedRelations = Array.isArray(previousSummary?.relationships)
    ? previousSummary.relationships.slice(0, 2)
    : [];
  return {
    chapterIndex,
    plotSummary: lead
      ? `${chapterTitle || `第 ${chapterIndex + 1} 章`}：${lead}`
      : `${chapterTitle || `第 ${chapterIndex + 1} 章`}：本章摘要待补全。`,
    majorCharacters: inheritedCharacters,
    relationships: inheritedRelations,
    openQuestions: [],
    worldFacts: [],
  };
}

function chunkParagraphs(paragraphs, chunkSize = 8) {
  const chunks = [];
  for (let i = 0; i < paragraphs.length; i += chunkSize) {
    chunks.push(paragraphs.slice(i, i + chunkSize).map((text, offset) => ({
      paragraphIndex: i + offset,
      text: text.slice(0, 900),
    })));
  }
  return chunks.slice(0, 8);
}

const aiClient = {
  async testConnection(proxyUrl, profile, apiKey) {
    const res = await fetch(`${proxyUrl.replace(/\/$/, '')}/proxy/test`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ baseUrl: normalizeUpstreamBase(profile.baseUrl), apiKey, model: profile.model }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || data.ok === false) {
      throw new Error(data?.error?.message || data?.error || `连接失败：${res.status}`);
    }
    const expectedModel = String(profile.model || '').trim();
    const testedModel = String(data?.model || '').trim();
    const completedRealTest = data?.testKind === 'chat-completion'
      && data?.modelVerified === true
      && testedModel === expectedModel
      && String(data?.replyPreview || '').trim();
    if (!completedRealTest) {
      throw new Error('测试连接未完成真实模型调用，请重启本地代理后重试。');
    }
    return data;
  },
  async listModels(proxyUrl, profile, apiKey) {
    const res = await fetch(`${proxyUrl.replace(/\/$/, '')}/proxy/models`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ baseUrl: normalizeUpstreamBase(profile.baseUrl), apiKey }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data?.error?.message || data?.error || `模型列表失败：${res.status}`);
    return Array.isArray(data?.data) ? data.data : [];
  },
  async generateSummaryPayload(proxyUrl, profile, apiKey, body) {
    const res = await fetch(`${proxyUrl.replace(/\/$/, '')}/proxy/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ baseUrl: normalizeUpstreamBase(profile.baseUrl), apiKey, body }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data?.error?.message || data?.error || `Summary generation failed: ${res.status}`);
    const content = data?.choices?.[0]?.message?.content || '';
    const parsed = parseStructuredPayload(content, repairLooseJson);
    if (!parsed.ok) throw parsed.error || new Error('Summary payload parse failed');
    return parsed.value;
  },
  async generateChunk(proxyUrl, profile, apiKey, chapterTitle, chunk, personas, memorySummary = '') {
    const body = {
      model: profile.model,
      temperature: profile.temperature,
      max_tokens: profile.maxOutputTokens,
      messages: [
        { role: 'system', content: 'Output JSON only. Do not use Markdown.' },
        { role: 'user', content: buildGenerationPrompt({ chapterTitle, chunk, personas, memorySummary }) },
      ],
    };
    const res = await fetch(`${proxyUrl.replace(/\/$/, '')}/proxy/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ baseUrl: normalizeUpstreamBase(profile.baseUrl), apiKey, body }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data?.error?.message || data?.error || `Generation failed: ${res.status}`);
    const content = data?.choices?.[0]?.message?.content || '';
    const parsed = safeJsonParse(extractJsonBlock(content), { comments: [] });
    return Array.isArray(parsed?.comments) ? parsed.comments : [];
  },
  async generateThreadReply(proxyUrl, profile, apiKey, body) {
    const res = await fetch(`${proxyUrl.replace(/\/$/, '')}/proxy/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ baseUrl: normalizeUpstreamBase(profile.baseUrl), apiKey, body }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data?.error?.message || data?.error || `追问回复失败：${res.status}`);
    return String(data?.choices?.[0]?.message?.content || '').trim();
  },
};

function choosePersonaForParagraph(personas, paragraphIndex, salt = 0) {
  const enabled = personas.filter(p => p.enabled);
  if (!enabled.length) return null;
  return enabled[(paragraphIndex + salt) % enabled.length];
}

function buildAiComment(persona, paragraphKey, chapterIndex, text, profileId = 'demo', extra = {}) {
  return {
    id: `${profileId}-${chapterIndex}-${paragraphKey}-${hashText(text)}`,
    personaId: persona.id,
    personaName: persona.name,
    personaTag: persona.tag,
    personaColor: persona.color,
    personaAvatar: persona.avatar,
    text,
    likes: 16 + (hashText(text) % 96),
    liked: false,
    source: profileId === 'demo' ? 'demo' : 'llm',
    modelProfileId: profileId,
    createdAt: Date.now(),
    discussionMode: ['closed', 'open', 'inviting'].includes(extra.discussionMode) ? extra.discussionMode : 'open',
    replyToCommentId: extra.replyToCommentId || null,
  };
}

function buildSupplementalReply(baseComment, personas, paragraphKey, chapterIndex, profileId, chunkIndex) {
  if (!baseComment || baseComment.discussionMode !== 'inviting') return null;
  const candidates = personas.filter(persona => persona.enabled && persona.id !== baseComment.personaId);
  if (!candidates.length) return null;
  const persona = candidates[(chunkIndex + hashText(baseComment.text)) % candidates.length];
  const templates = [
    '我同意，而且这句的情绪压得更低，反而更明显。',
    '补一句，这里不像退让，更像是在先收住锋芒。',
    '这个角度成立，我更在意它把后面的紧张感先埋好了。',
  ];
  const text = templates[(hashText(baseComment.id) + chunkIndex) % templates.length];
  return buildAiComment(persona, paragraphKey, chapterIndex, text, profileId, {
    discussionMode: 'closed',
    replyToCommentId: baseComment.id,
  });
}

function normalizeGeneratedComments(rawComments, personas, chapterIndex, profileId, chunkIndex) {
  const personaMap = new Map(personas.filter(p => p.enabled).map(p => [p.id, p]));
  const byParagraph = {};
  rawComments.forEach(item => {
    const paragraphIndex = Number(item?.paragraphIndex);
    const text = normalizeText(item?.text || '');
    if (!Number.isInteger(paragraphIndex) || !text) return;
    const paragraphKey = `${chapterIndex}-${paragraphIndex}`;
    const persona = personaMap.get(item?.personaId) || choosePersonaForParagraph(personas, paragraphIndex, chunkIndex);
    if (!persona) return;
    const comment = buildAiComment(persona, paragraphKey, chapterIndex, text, profileId, {
      discussionMode: item?.discussionMode,
      replyToCommentId: item?.replyToCommentId,
    });
    const nextComments = [
      ...(byParagraph[paragraphKey] || []),
      comment,
    ];
    const supplemental = buildSupplementalReply(comment, personas, paragraphKey, chapterIndex, profileId, chunkIndex);
    if (supplemental) nextComments.push(supplemental);
    byParagraph[paragraphKey] = nextComments;
  });
  return byParagraph;
}

function mergeCommentsByKey(target, source) {
  Object.entries(source || {}).forEach(([key, comments]) => {
    target[key] = [...(target[key] || []), ...(Array.isArray(comments) ? comments : [])];
  });
  return target;
}

function generateDemoComments(paragraphText, paragraphIndex, chapterIndex, personas = DEFAULT_PERSONAS) {
  const h = hashText(`${paragraphText}-${paragraphIndex}-${chapterIndex}`);
  if (h % 5 === 0) return [];
  const enabled = personas.filter(p => p.enabled);
  if (!enabled.length) return [];
  const templates = [
    '这句的画面感很强，像镜头突然推进了一格。',
    '这里明显在压节奏，后面大概率要接一个反转。',
    '这个细节不是随手写的，感觉会回收伏笔。',
    '人物说得轻，但信息量其实很重。',
    '这段读起来像弹簧被慢慢压紧了。',
    '懂了，作者在这里偷偷把氛围拧暗了。',
  ];
  const count = 1 + (h % 2);
  return Array.from({ length: count }, (_, i) => {
    const persona = enabled[(h + i + paragraphIndex) % enabled.length];
    const text = templates[(h + i) % templates.length];
    return buildAiComment(persona, `${chapterIndex}-${paragraphIndex}`, chapterIndex, text, 'demo');
  });
}

function ensureLocalLibrary() {
  const saved = lsGet(STORAGE_KEYS.novels, []);
  if (!Array.isArray(saved)) return [];
  return saved.filter(book => {
    const id = String(book?.id || '');
    return book && !book.demo && !id.startsWith('demo_');
  });
}

function ensurePersonasLibrary() {
  const saved = lsGet(STORAGE_KEYS.personas, null);
  const versionMatches = localStorage.getItem(STORAGE_KEYS.personasVersion) === PERSONA_SCHEMA_VERSION;
  const defaultIds = new Set(DEFAULT_PERSONAS.map(persona => persona.id));
  if (!Array.isArray(saved)) {
    const defaults = DEFAULT_PERSONAS.map(normalizePersona);
    lsSet(STORAGE_KEYS.personas, defaults);
    localStorage.setItem(STORAGE_KEYS.personasVersion, PERSONA_SCHEMA_VERSION);
    return defaults;
  }
  const savedMap = new Map(saved.map(persona => [persona.id, persona]));
  const defaults = DEFAULT_PERSONAS.map((persona, index) => normalizePersona({
    ...persona,
    ...(versionMatches ? (savedMap.get(persona.id) || {}) : {}),
  }, index));
  const custom = saved
    .filter(persona => !defaultIds.has(persona.id) && !['gongming', 'wenrou'].includes(persona.id))
    .map(normalizePersona);
  const next = [...defaults, ...custom];
  lsSet(STORAGE_KEYS.personas, next);
  localStorage.setItem(STORAGE_KEYS.personasVersion, PERSONA_SCHEMA_VERSION);
  return next;
}

              {novel.metaLine || `${chapterCount} 章`}<br />
              已读到第 {Math.max(1, (novel.lastReadChapter || 0) + 1)} 章
            </div>
          </div>
        </div>
        <button className="continue-btn" onClick={onContinue}>继续阅读</button>

        <div className="volume-title">
          <span>正文卷</span>
          <span style={{ color: '#9f9588', fontSize: 12 }}>共 {chapterCount} 章</span>
        </div>

        {chapters.map((chapter, index) => {
          const isCurrent = index === (novel.lastReadChapter || 0);
          const isRead = index <= (novel.maxReadChapter || 0);
          return (
            <button key={`${chapter.title}-${index}`} className={`chapter-row ${isCurrent ? 'current' : ''}`} onClick={() => onSelectChapter(index)}>
              <div className="top-row">
                <div style={{ minWidth: 0 }}>
                  <div className="chapter-title">第 {index + 1} 章 · {chapter.title.replace(/^第[^\s]+章\s*/, '')}</div>
                  <div className="chapter-meta">{isCurrent ? '当前阅读' : isRead ? '已阅读' : '未阅读'}</div>
                </div>
                <Icon name="chevronRight" size={19} style={{ color: '#b39b7a', flex: '0 0 auto' }} />
              </div>
            </button>
          );
        })}
      </div>
      <BookActionSheet
        novel={showActions ? novel : null}
        onClose={() => setShowActions(false)}
        onContinue={() => { setShowActions(false); onContinue(); }}
        onRename={() => { setShowActions(false); setShowRename(true); }}
        onDelete={() => { setShowActions(false); setShowDelete(true); }}
      />
      <RenameDialog
        novel={showRename ? novel : null}
        onClose={() => setShowRename(false)}
        onSave={(name) => { onRenameNovel(novel.id, name); setShowRename(false); }}
      />
      {showDelete && (
        <div className="delete-dialog" onClick={() => setShowDelete(false)}>
          <div className="dialog-card" onClick={event => event.stopPropagation()}>
            <h3>删除书籍</h3>
            <p>确定要删除《{novel.title}》吗？此操作无法撤销。</p>
            <div className="dialog-actions">
              <button className="btn btn-outline" onClick={() => setShowDelete(false)}>取消</button>
              <button className="btn btn-danger" onClick={() => { onDeleteNovel(novel.id); setShowDelete(false); onBack(); }}>删除</button>
            </div>
          </div>
        </div>
      )}
      <Toast toast={toast} />
    </div>
  );
}

function CommentPanel({ comments, userComments, thread, onAddUserComment, onSendThreadMessage, onClose }) {
  const [inputText, setInputText] = useState('');
  const [isSending, setIsSending] = useState(false);
  const allComments = [...comments, ...userComments];
  const threadTurns = Array.isArray(thread?.turns) ? thread.turns : [];

  const handleSubmit = async () => {
    const text = inputText.trim();
    if (!text) return;
    if (typeof onSendThreadMessage === 'function') {
      setIsSending(true);
      try {
        await onSendThreadMessage(text);
        setInputText('');
      } finally {
        setIsSending(false);
      }
      return;
    }
    onAddUserComment(text);
    setInputText('');
  };

  return (
    <>
      <div className="comment-sheet-backdrop" onClick={onClose} />
      <div className="comment-sheet" data-comment-panel="true">
        <div className="sheet-grabber" />
        <div className="sheet-head">
          <div className="sheet-title-wrap">
            <div className="sheet-title">本段说</div>
            <div className="sheet-subtitle">AI 视角，畅所欲言</div>
          </div>
          <button className="sheet-close" onClick={onClose} aria-label="关闭评论">
            <Icon name="x" size={22} strokeWidth={2.1} />
          </button>
        </div>
        <div className="sheet-tabs">
          <div className="sheet-tab-group">
            <span>推荐排序</span>
          </div>
          <div className="sheet-tab-group">
            <strong>默认</strong>
            <span>热门</span>
            <span>最新</span>
          </div>
        </div>
        <div className="comments-list">
          {allComments.length === 0 ? (
            <div className="empty-state">
              <h3>还没有评论</h3>
              <p>写下你的想法，给后面的自己留个批注。</p>
            </div>
          ) : (
            allComments.map((comment, index) => <CommentItem key={comment.id || index} comment={comment} />)
          )}
          {threadTurns.length > 0 && (
            <div style={{ marginTop: 12, borderTop: '1px solid rgba(95, 78, 57, 0.12)', paddingTop: 12 }}>
              <div className="muted" style={{ marginBottom: 8 }}>继续讨论</div>
              {threadTurns.map((turn, index) => (
                <div
                  key={turn.id || `${turn.role}-${index}`}
                  style={{
                    marginBottom: 10,
                    padding: '10px 12px',
                    borderRadius: 14,
                    background: turn.role === 'user' ? 'rgba(197, 165, 122, 0.12)' : '#fff',
                    border: '1px solid rgba(95, 78, 57, 0.08)',
                  }}
                >
                  <div className="comment-meta" style={{ marginBottom: 4 }}>
                    <span className="comment-name">{turn.role === 'user' ? '你' : (turn.personaName || 'AI 书友')}</span>
                    {turn.personaTag && turn.role !== 'user' && <span className="tag">{turn.personaTag}</span>}
                  </div>
                  <div className="comment-text">{turn.text}</div>
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="comment-input" data-thread-composer="true">
          <div className="avatar" style={{ '--avatar-bg': '#e8dde5' }}>读</div>
          <div className="input-wrap">
            <input
              value={inputText}
              disabled={isSending}
              onChange={e => setInputText(e.target.value)}
              onKeyDown={e => {
                if (e.key === 'Enter' && !isSending) handleSubmit();
              }}
              placeholder={isSending ? 'AI 书友正在回复...' : '写下你的评论...'}
            />
            <Icon className="smile" name="smile" size={20} strokeWidth={1.8} />
          </div>
          <button className="send-btn" onClick={handleSubmit} disabled={isSending || !inputText.trim()}>
            {isSending ? '发送中' : '发送'}
          </button>
        </div>
      </div>
    </>
  );
}

function ReaderScreen({ novel, chapters, chapterIndex, onBack, onChangeChapter, onUpdateProgress, settings, userComments, aiThreads, onAddUserComment, onSendThreadMessage, aiState, chapterDiscussionComments, chapterDiscussionStatus, aiPrebuildState, onOpenChapterDiscussion, onGenerateChapter }) {
  const chapter = chapters[chapterIndex];
  const scrollRef = useRef(null);
  const [expandedParagraph, setExpandedParagraph] = useState(() => window.location.hash === '#reader-comment' ? 2 : null);
  const [expandedChapterDiscussion, setExpandedChapterDiscussion] = useState(() => window.location.hash === '#reader-chapter-discussion');
  const [showChapterJump, setShowChapterJump] = useState(() => window.location.hash === '#reader-jump');
  const [showReadingSettings, setShowReadingSettings] = useState(() => window.location.hash === '#reader-settings');
  const [summonParagraph, setSummonParagraph] = useState(() => window.location.hash === '#reader-summon' ? 2 : null);
  const [summonSelectedIds, setSummonSelectedIds] = useState(() => settings.personas.filter(p => p.enabled).slice(0, 2).map(p => p.id));
  const [readerToast, setReaderToast] = useState(null);
  const longPressTimer = useRef(null);
  const suppressNextClick = useRef(false);

  const paragraphs = useMemo(() => {
    if (!chapter) return [];
    return chapter.content.split(/\n+/).map(p => p.trim()).filter(Boolean);
  }, [chapter]);

  useEffect(() => {
    onUpdateProgress(chapterIndex);
    setExpandedParagraph(window.location.hash === '#reader-comment' ? 2 : null);
    setExpandedChapterDiscussion(window.location.hash === '#reader-chapter-discussion');
  }, [chapterIndex, onUpdateProgress]);

  useEffect(() => {
    if (settings.liveSettings.enabled && chapter) {
      onGenerateChapter(chapterIndex, chapter.title, paragraphs, false);
    }
  }, [chapterIndex, chapter, paragraphs, onGenerateChapter, settings.liveSettings.enabled, settings.liveTriggerKey]);

  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    el.scrollTop = chapterIndex === novel.lastReadChapter ? novel.lastScrollPos || 0 : 0;
  }, [chapterIndex, novel.lastReadChapter, novel.lastScrollPos]);

  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return undefined;
    let timer = null;
    const handleScroll = () => {
      if (timer) clearTimeout(timer);
      timer = setTimeout(() => onUpdateProgress(chapterIndex, el.scrollTop), 250);
    };
    el.addEventListener('scroll', handleScroll, { passive: true });
    return () => {
      el.removeEventListener('scroll', handleScroll);
      if (timer) clearTimeout(timer);
    };
  }, [chapterIndex, onUpdateProgress]);

  const activeAiState = aiState.chapterIndex === chapterIndex ? aiState : { status: 'idle', commentsByKey: {}, error: '' };
  const aiCommentsByKey = activeAiState.commentsByKey || {};
  const chapterCommentCount = Object.values(aiCommentsByKey).reduce((total, comments) => {
    return total + (Array.isArray(comments) ? comments.length : 0);
  }, 0);
  const firstCommentedParagraphIndex = paragraphs.findIndex((_, index) => {
    const key = `${chapterIndex}-${index}`;
    return Array.isArray(aiCommentsByKey[key]) && aiCommentsByKey[key].length > 0;
  });
  const progress = novel.displayReaderProgress || (chapters.length > 0 ? ((chapterIndex + 1) / chapters.length * 100).toFixed(2) : '0.00');
  const readerStyle = {
    '--reader-font-size': `${settings.fontSize || 20}px`,
    '--reader-line-height': settings.lineHeight || 1.84,
  };
  const getParagraphAiComments = useCallback((paragraphKey, paragraphText, paragraphIndex) => {
    if (Array.isArray(aiCommentsByKey[paragraphKey]) && aiCommentsByKey[paragraphKey].length) {
      return aiCommentsByKey[paragraphKey];
    }
    return generateDemoComments(paragraphText, paragraphIndex, chapterIndex, settings.personas);
  }, [aiCommentsByKey, chapterIndex, settings.personas]);
  const getParagraphThread = useCallback((paragraphIndex) => {
    const threadKey = buildParagraphThreadKey(novel.id, chapterIndex, paragraphIndex);
    return aiThreads?.[threadKey] || createEmptyThread(threadKey);
  }, [aiThreads, chapterIndex, novel.id]);
  const chapterDiscussionKey = buildChapterCommentKey(novel.id, chapterIndex);
  const chapterDiscussionThreadKey = buildChapterThreadKey(novel.id, chapterIndex);
  const chapterDiscussionThread = aiThreads?.[chapterDiscussionThreadKey] || createEmptyThread(chapterDiscussionThreadKey);
  const chapterDiscussionUserComments = userComments[chapterDiscussionKey] || [];
  const chapterDiscussionAiComments = Array.isArray(chapterDiscussionComments) ? chapterDiscussionComments : [];
  const nextQueuedCount = Array.isArray(aiPrebuildState?.queuedChapters) ? aiPrebuildState.queuedChapters.length : 0;
  const chapterDiscussionMeta = chapterDiscussionStatus?.status === 'loading'
    ? '本章章评正在准备中…'
    : chapterDiscussionAiComments.length
      ? `已缓存 ${chapterDiscussionAiComments.length} 条章评首评。`
      : chapterCommentCount > 0
        ? `已缓存 ${chapterCommentCount} 条 AI 段评，可先从这里进入本章讨论。`
        : '本章讨论入口已就位；没有缓存时仍保留示例段评。';
  const prebuildMeta = aiPrebuildState?.running
    ? `后台正在预热后续 ${nextQueuedCount} 章。`
    : aiPrebuildState?.lastError
      ? `后台预热暂时中断：${aiPrebuildState.lastError}`
      : nextQueuedCount > 0
        ? `后续还有 ${nextQueuedCount} 章待预热。`
        : '后续章节预热已就绪。';
  const clearLongPress = () => {
    if (longPressTimer.current) {
      clearTimeout(longPressTimer.current);
      longPressTimer.current = null;
    }
  };
  const startLongPress = (index) => {
    clearLongPress();
    longPressTimer.current = setTimeout(() => {
      suppressNextClick.current = true;
      setSummonParagraph(index);
      longPressTimer.current = null;
    }, 520);
  };
  const toggleSummon = (personaId) => {
    setSummonSelectedIds(prev => prev.includes(personaId)
      ? prev.filter(id => id !== personaId)
      : [...prev, personaId]);
  };
  const generateSummonedComments = () => {
    if (summonParagraph === null) return;
    const key = `${chapterIndex}-${summonParagraph}`;
    const paragraph = paragraphs[summonParagraph] || '';
    const selectedPersonas = settings.personas.filter(persona => summonSelectedIds.includes(persona.id));
    selectedPersonas.forEach((persona, index) => {
      const text = [
        '从这句话能看出场景里的压迫感已经铺开了。',
        '这里像是在把角色的判断和时代背景同时往前推。',
        '这个细节很适合回头看，信息量比表面更重。',
      ][(hashText(paragraph + persona.id) + index) % 3];
      onAddUserComment(key, text, {
        personaName: persona.name,
        personaTag: persona.tag,
        personaColor: persona.color,
        personaAvatar: persona.avatar,
        source: 'summoned',
      });
    });
    setSummonParagraph(null);
    setExpandedParagraph(summonParagraph);
    setReaderToast({ title: '已添加 AI 书友评论', subtitle: `写入 ${selectedPersonas.length} 条本段说` });
    window.setTimeout(() => setReaderToast(null), 1900);
  };

  return (
    <div className="app-screen reader-screen" style={readerStyle}>
      <StatusBar />
      <TopBar
        title={`${chapter?.title || `第 ${chapterIndex + 1} 章`} · ${progress}%`}
        left={<button onClick={onBack} aria-label="返回目录"><Icon name="chevronLeft" size={24} strokeWidth={1.9} /></button>}
        right={<button onClick={() => setShowReadingSettings(true)} aria-label="阅读设置"><Icon name="more" size={22} /></button>}
      />
      <div ref={scrollRef} className="scroll-area reader-scroll">
        <div className="reader-article">
          <div className="reader-title-muted">{novel.title}</div>
          {activeAiState.status === 'error' && (
            <div className="status-message error">{activeAiState.error}</div>
          )}
          <div className="card" data-chapter-discussion style={{ marginBottom: 16, padding: '14px 16px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', gap: 12, alignItems: 'center' }}>
                            <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 15, fontWeight: 700 }}>????</div>
                <div className="muted" style={{ marginTop: 4 }} data-chapter-discussion-meta>{chapterDiscussionMeta}</div>
                <div className="muted" style={{ marginTop: 4 }} data-prebuild-meta>{prebuildMeta}</div>
              </div>
              <button
                className="btn btn-outline"
                type="button"
                disabled={!paragraphs.length}
                onClick={() => {
                  setExpandedChapterDiscussion(true);
                  if (typeof onOpenChapterDiscussion === 'function') {
                    onOpenChapterDiscussion({
                      chapterIndex,
                      chapterTitle: chapter?.title || '',
                      chapterText: chapter?.content || '',
                    });
                  }
                }}
              >
                查看讨论
              </button>
            </div>
          </div>
          {paragraphs.map((paragraph, index) => {
            const key = `${chapterIndex}-${index}`;
            const aiComments = getParagraphAiComments(key, paragraph, index);
            const myComments = userComments[key] || [];
            const totalCount = aiComments.length + myComments.length;
            return (
              <p
                className="reader-p"
                key={key}
                data-reader-paragraph={index}
                role="button"
                tabIndex="0"
                aria-label={`打开章节跳转：第 ${index + 1} 段`}
                onClick={() => {
                  if (suppressNextClick.current) {
                    suppressNextClick.current = false;
                    return;
                  }
                  setShowChapterJump(true);
                }}
                onPointerDown={() => startLongPress(index)}
                onPointerUp={clearLongPress}
                onPointerCancel={clearLongPress}
                onContextMenu={(event) => { event.preventDefault(); setSummonParagraph(index); }}
              >
                {paragraph}
                {totalCount > 0 && (
                  <CommentBadge
                    count={totalCount}
                    active={expandedParagraph === index}
                    onClick={(event) => {
                      event.stopPropagation();
                      setExpandedParagraph(expandedParagraph === index ? null : index);
                    }}
                  />
                )}
              </p>
            );
          })}
        </div>
      </div>

      <div className="reader-progress">
        <button disabled={chapterIndex <= 0} onClick={() => chapterIndex > 0 && onChangeChapter(chapterIndex - 1)}>上一章</button>
        <div className="reader-progress-middle">
          <div className="mini-track"><div className="mini-fill" style={{ width: `${progress}%` }} /></div>
          <span>{chapterIndex + 1}/{chapters.length}</span>
        </div>
        <button disabled={chapterIndex >= chapters.length - 1} onClick={() => chapterIndex < chapters.length - 1 && onChangeChapter(chapterIndex + 1)}>下一章</button>
      </div>

      {expandedParagraph !== null && (() => {
        const key = `${chapterIndex}-${expandedParagraph}`;
        const aiComments = getParagraphAiComments(key, paragraphs[expandedParagraph], expandedParagraph);
        const myComments = userComments[key] || [];
        return (
          <CommentPanel
            comments={aiComments}
            userComments={myComments}
            thread={getParagraphThread(expandedParagraph)}
            onAddUserComment={(text) => onAddUserComment(key, text)}
            onSendThreadMessage={(text) => onSendThreadMessage({
              threadKey: buildParagraphThreadKey(novel.id, chapterIndex, expandedParagraph),
              chapterIndex,
              paragraphIndex: expandedParagraph,
              chapterTitle: chapter?.title || '',
              paragraphText: paragraphs[expandedParagraph] || '',
              userText: text,
            })}
            onClose={() => setExpandedParagraph(null)}
          />
        );
      })()}
      {expandedChapterDiscussion && (
        <CommentPanel
          comments={chapterDiscussionAiComments}
          userComments={chapterDiscussionUserComments}
          thread={chapterDiscussionThread}
          onAddUserComment={(text) => onAddUserComment(chapterDiscussionKey, text)}
          onSendThreadMessage={(text) => onSendThreadMessage({
            threadKey: chapterDiscussionThreadKey,
            chapterIndex,
            paragraphIndex: 0,
            chapterTitle: chapter?.title || '',
            paragraphText: chapter?.content || '',
            userText: text,
          })}
          onClose={() => setExpandedChapterDiscussion(false)}
        />
      )}
      {showChapterJump && (
        <ChapterJumpPanel
          chapter={chapter}
          chapterIndex={chapterIndex}
          chapters={chapters}
          progress={progress}
          onClose={() => setShowChapterJump(false)}
          onChangeChapter={(index) => { onChangeChapter(index); setShowChapterJump(false); }}
          onOpenCatalog={() => { setShowChapterJump(false); onBack(); }}
        />
      )}
      {showReadingSettings && <ReadingSettingsPanel settings={settings} onClose={() => setShowReadingSettings(false)} />}
      {summonParagraph !== null && (
        <SummonPanel
          personas={settings.personas}
          selectedIds={summonSelectedIds}
          onToggle={toggleSummon}
          onGenerate={generateSummonedComments}
          onClose={() => setSummonParagraph(null)}
        />
      )}
      <Toast toast={readerToast} />
    </div>
  );
}

  useEffect(() => {
    setDraft(isCreate ? createBlankPersona() : { ...persona });
  }, [isCreate, persona?.id]);
  if (!isCreate && !persona) return null;

  const updateDraft = (patch) => setDraft(prev => ({ ...prev, ...patch }));
  const promptText = draft.stylePrompt || '';
  const defaultPersona = !isCreate ? DEFAULT_PERSONAS.find(item => item.id === persona.id) : null;
  const canSubmit = !isCreate || (draft.name.trim() && promptText.trim());
  const defaultProfile = getProfileById(modelProfiles, defaultProfileId) || modelProfiles[0] || null;

    const file = event.target.files?.[0];

              <button className="btn btn-primary" onClick={restoreDefault}>确认恢复</button>

function App() {
  const [novels, setNovels] = useState(() => ensureLocalLibrary());
  const initialHash = window.location.hash.replace('#', '');
  const initialNovelId = novels[0]?.id || null;
  const shouldOpenReader = ['reader', 'reader-comment', 'reader-jump', 'reader-settings', 'reader-summon'].includes(initialHash);
  const [screen, setScreen] = useState(() => {
    if (initialHash === 'settings' || initialHash === 'api-settings') return 'settings';
    if (initialHash === 'friends' || initialHash === 'ai-friends') return 'friends';
    if (initialHash === 'chapters' && initialNovelId) return 'chapters';
    if (shouldOpenReader && initialNovelId) return 'reader';
    return 'bookshelf';
  });
  const [currentNovelId, setCurrentNovelId] = useState(() => (initialHash === 'chapters' || shouldOpenReader ? initialNovelId : null));
  const [currentChapter, setCurrentChapter] = useState(() => shouldOpenReader ? (novels[0]?.lastReadChapter || 0) : 0);
  const [appToast, setAppToast] = useState(null);
  const [editingPersonaId, setEditingPersonaId] = useState(null);

  const baseSettings = lsGet(STORAGE_KEYS.settings, { fontSize: 20, lineHeight: 1.84, theme: 'light' });
  const [fontSize, setFontSize] = useState(() => baseSettings.fontSize || 20);
  const [lineHeight, setLineHeight] = useState(() => baseSettings.lineHeight || 1.84);
  const [theme, setTheme] = useState(() => baseSettings.theme || 'light');
  const [liveSettings, setLiveSettings] = useState(() => ({ ...DEFAULT_LIVE_SETTINGS, ...lsGet(STORAGE_KEYS.liveSettings, DEFAULT_LIVE_SETTINGS) }));
  const [modelProfiles, setModelProfiles] = useState(() => {
    const saved = lsGet(STORAGE_KEYS.modelProfiles, DEFAULT_MODEL_PROFILES);
    return (saved && saved.length ? saved : DEFAULT_MODEL_PROFILES).map(normalizeModelProfile);
  });
  const [selectedProfileId, setSelectedProfileId] = useState(() => getDefaultProfileId(modelProfiles, liveSettings.profileId));
  const [personas, setPersonas] = useState(() => {
    return ensurePersonasLibrary();
  });
  const [apiKeysByProfileId, setApiKeysByProfileId] = useState(() => lsGet(STORAGE_KEYS.apiKeys, {}));
  const [connectionState, setConnectionState] = useState({ status: 'idle', message: '' });
  const [isDiscoveringModels, setIsDiscoveringModels] = useState(false);
  const [chapterAiState, setChapterAiState] = useState({ chapterIndex: null, status: 'idle', commentsByKey: {}, error: '', fingerprint: '' });
  const [chapterDiscussionState, setChapterDiscussionState] = useState({});
  const [aiPrebuildState, setAiPrebuildState] = useState(() => ({ ...createPrebuildState(), ...lsGet(STORAGE_KEYS.aiPrebuildState, {}) }));
  const [aiThreads, setAiThreads] = useState(() => lsGet(STORAGE_KEYS.aiThreads, {}));
  const [userComments, setUserComments] = useState({});

  const currentNovel = novels.find(novel => novel.id === currentNovelId);
  const currentChapters = useMemo(() => {
    if (!currentNovelId) return [];
    const data = lsGet(`rwm_novel_${currentNovelId}`, null);
    return data?.chapters || [];
  }, [currentNovelId]);

  const defaultProfileId = useMemo(() => getDefaultProfileId(modelProfiles, liveSettings.profileId), [modelProfiles, liveSettings.profileId]);
  const currentProfile = useMemo(() => normalizeModelProfile(getProfileById(modelProfiles, selectedProfileId) || getProfileById(modelProfiles, defaultProfileId) || modelProfiles[0] || DEFAULT_MODEL_PROFILES[0]), [modelProfiles, selectedProfileId, defaultProfileId]);
  const currentApiKey = apiKeysByProfileId[currentProfile.id] || '';
  const liveTriggerKey = useMemo(
    () => profileFingerprint(modelProfiles, personas, liveSettings.promptVersion, defaultProfileId),
    [modelProfiles, personas, liveSettings.promptVersion, defaultProfileId],
  );
  const currentConnectionFingerprint = useMemo(
    () => connectionFingerprint(currentProfile, currentApiKey, liveSettings.proxyUrl),
    [currentProfile, currentApiKey, liveSettings.proxyUrl],
  );

  useEffect(() => { lsSet(STORAGE_KEYS.novels, novels); }, [novels]);
  useEffect(() => { lsSet(STORAGE_KEYS.settings, { fontSize, lineHeight, theme }); }, [fontSize, lineHeight, theme]);
  useEffect(() => { lsSet(STORAGE_KEYS.liveSettings, liveSettings); }, [liveSettings]);
  useEffect(() => { lsSet(STORAGE_KEYS.modelProfiles, modelProfiles); }, [modelProfiles]);
  useEffect(() => { lsSet(STORAGE_KEYS.personas, personas); }, [personas]);
  useEffect(() => { lsSet(STORAGE_KEYS.aiPrebuildState, aiPrebuildState); }, [aiPrebuildState]);
  useEffect(() => { lsSet(STORAGE_KEYS.aiThreads, aiThreads); }, [aiThreads]);
  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);
  useEffect(() => {
    setChapterDiscussionState({});
    setAiPrebuildState(createPrebuildState());
  }, [currentNovelId, liveTriggerKey]);

  useEffect(() => {
    const resolvedDefaultId = getDefaultProfileId(modelProfiles, liveSettings.profileId);
    if (resolvedDefaultId && resolvedDefaultId !== liveSettings.profileId) {
      setLiveSettings(prev => ({ ...prev, profileId: resolvedDefaultId }));
    }
    if (!getProfileById(modelProfiles, selectedProfileId)) {
      setSelectedProfileId(resolvedDefaultId);
    }
  }, [modelProfiles, liveSettings.profileId, selectedProfileId]);

  useEffect(() => {
    setConnectionState(prev => {
      if (prev.status === 'idle') return prev;
      if (prev.fingerprint === currentConnectionFingerprint) return prev;
      return { status: 'idle', message: '' };
    });
  }, [currentConnectionFingerprint]);

  useEffect(() => {
    if (currentNovelId) setUserComments(lsGet(`rwm_comments_${currentNovelId}`, {}));
  }, [currentNovelId]);

  const persistApiKeys = useCallback((updater) => {
    setApiKeysByProfileId(prev => {
      const updated = typeof updater === 'function' ? updater(prev) : updater;
      lsSet(STORAGE_KEYS.apiKeys, updated);
      return updated;
    });
  }, []);

  const setCurrentApiKey = useCallback((value) => {
    persistApiKeys(prev => ({ ...prev, [currentProfile.id]: value }));
  }, [currentProfile.id, persistApiKeys]);

  const updateCurrentProfile = useCallback((patch) => {
    setModelProfiles(prev => {
      const targetId = selectedProfileId || getDefaultProfileId(prev, liveSettings.profileId);
      const next = prev.length ? [...prev] : DEFAULT_MODEL_PROFILES.map(normalizeModelProfile);
      const index = next.findIndex(profile => profile.id === targetId);
      const safeIndex = index >= 0 ? index : 0;
      const base = next[safeIndex] || DEFAULT_MODEL_PROFILES[0];
      next[safeIndex] = normalizeModelProfile({ ...base, ...patch, id: base.id });
      return next;
    });
  }, [liveSettings.profileId, selectedProfileId]);

  const addModelProfile = useCallback(() => {
    const id = uid();
    const profile = normalizeModelProfile({
      id,
      name: `AI 接口 ${modelProfiles.length + 1}`,
      baseUrl: DEFAULT_MODEL_PROFILES[0].baseUrl,
      model: DEFAULT_MODEL_PROFILES[0].model,
    });
    setModelProfiles(prev => [...prev, profile]);
    setSelectedProfileId(id);
    setConnectionState({ status: 'idle', message: '' });
  }, [modelProfiles.length]);

  const setDefaultProfileId = useCallback((profileId) => {
    const resolved = getDefaultProfileId(modelProfiles, profileId);
    if (!resolved) return;
    setLiveSettings(prev => ({ ...prev, enabled: true, profileId: resolved }));

  const navigateTab = useCallback((target) => {

  const handleImport = useCallback((title, text, fileName) => {

      title,

  const clearNovelAiCache = useCallback((novelId) => {

        .filter(key => key.startsWith(`rwm_ai_comments_${novelId}_`))
        .forEach(key => localStorage.removeItem(key));

  const handleDelete = useCallback((id) => {

    try {
      localStorage.removeItem(`rwm_novel_${id}`);

    clearNovelAiCache(id);
    if (currentNovelId === id) {

  const handleSelectNovel = (id) => {

  const handleUpdateProgress = useCallback((chapterIndex, scrollPos) => {

  const handleAddUserComment = useCallback((paragraphKey, text, patch = {}) => {

  const getRunnableProfileGroups = useCallback((activePersonas = personas.filter(persona => persona.enabled)) => {
    return groupPersonasByProfile(activePersonas, modelProfiles, defaultProfileId)
