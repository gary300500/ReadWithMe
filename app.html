              <div style={{ textAlign: 'left', minWidth: 0 }}>
                <div className="persona-title">{persona.name}</div>
                <div className="persona-desc">{persona.description || persona.stylePrompt}</div>
              </div>
              <span className={`check-box ${checked ? 'on' : ''}`}><Icon name="check" size={14} strokeWidth={3} /></span>
            </button>
          );
        })}
        <button
          className="summon-button"
          data-paragraph-summon-generate={mode === 'paragraph' ? 'true' : undefined}
          data-comment-summon-generate={mode === 'comment' ? 'true' : undefined}
          disabled={!selectedCount || isGenerating}
          onClick={onGenerate}
        >
          {isGenerating ? 'Generating...' : `Generate (${selectedCount})`}
        </button>
      </div>
    </>
  );
}

function ReaderScreen({ novel, chapters, chapterIndex, onBack, onChangeChapter, onUpdateProgress, settings, userComments, commentReplies, commentLikes, onAddUserComment, onSubmitComment, onSummonCommentReply, onToggleCommentLike, aiState, chapterDiscussionComments, chapterDiscussionStatus, aiPrebuildState, onOpenChapterDiscussion, onGenerateChapter, onSummonParagraphComments }) {
  const chapter = chapters[chapterIndex];
  const scrollRef = useRef(null);
  const [expandedParagraph, setExpandedParagraph] = useState(() => window.location.hash === '#reader-comment' ? 2 : null);
  const [expandedChapterDiscussion, setExpandedChapterDiscussion] = useState(() => window.location.hash === '#reader-chapter-discussion');
  const [showChapterJump, setShowChapterJump] = useState(() => window.location.hash === '#reader-jump');
  const [showReadingSettings, setShowReadingSettings] = useState(() => window.location.hash === '#reader-settings');
  const [jumpParagraphIndex, setJumpParagraphIndex] = useState(0);
  const [paragraphActionIndex, setParagraphActionIndex] = useState(null);
  const [summonParagraph, setSummonParagraph] = useState(() => window.location.hash === '#reader-summon' ? 2 : null);
  const [summonSelectedIds, setSummonSelectedIds] = useState(() => settings.personas.filter(p => p.enabled).slice(0, 2).map(p => p.id));
  const [isSummonGenerating, setIsSummonGenerating] = useState(false);
  const [readerToast, setReaderToast] = useState(null);
  const longPressTimer = useRef(null);
  const suppressNextClick = useRef(false);
  const isRestoringScroll = useRef(false);
  const latestScrollTop = useRef(0);

  const paragraphs = useMemo(() => {
    if (!chapter) return [];
    return chapter.content.split(/\n+/).map(p => p.trim()).filter(Boolean);
  }, [chapter]);

  useEffect(() => {
    onUpdateProgress(chapterIndex);
    setExpandedParagraph(window.location.hash === '#reader-comment' ? 2 : null);
    setExpandedChapterDiscussion(window.location.hash === '#reader-chapter-discussion');
    setShowChapterJump(window.location.hash === '#reader-jump');
    setJumpParagraphIndex(0);
    setParagraphActionIndex(null);
    setSummonParagraph(null);
  }, [chapterIndex, onUpdateProgress]);

  useEffect(() => {
    const availableIds = settings.personas.filter(persona => persona.enabled).map(persona => persona.id);
    setSummonSelectedIds(prev => {
      const kept = prev.filter(id => availableIds.includes(id));
      return kept.length ? kept : availableIds.slice(0, 2);
    });
  }, [settings.personas]);

  useEffect(() => {
    if (settings.liveSettings.enabled && chapter && settings.personas.length) {
      onGenerateChapter(chapterIndex, chapter.title, paragraphs, false);
    }
  }, [chapterIndex, chapter, paragraphs, onGenerateChapter, settings.liveSettings.enabled, settings.liveTriggerKey, settings.personas.length]);

  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    const targetScrollTop = getChapterScrollPos(novel, chapterIndex);
    isRestoringScroll.current = true;
    let lastAppliedScrollTop = null;
    const restoreScroll = () => {
      if (lastAppliedScrollTop != null && Math.abs(el.scrollTop - lastAppliedScrollTop) > 2) {
        return;
      }
      el.scrollTop = targetScrollTop;
      lastAppliedScrollTop = el.scrollTop;
      latestScrollTop.current = el.scrollTop;
    };
    restoreScroll();
    const frame = window.requestAnimationFrame(() => {
      restoreScroll();
      isRestoringScroll.current = false;
    });
    const timer = window.setTimeout(() => {
      restoreScroll();
      isRestoringScroll.current = false;
    }, 120);
    return () => {
      window.cancelAnimationFrame(frame);
      window.clearTimeout(timer);
    };
  }, [chapterIndex, novel.id, chapter?.content]);

  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return undefined;
    let timer = null;
    const handleScroll = () => {
      latestScrollTop.current = el.scrollTop;
      if (isRestoringScroll.current) return;
      if (timer) clearTimeout(timer);
      timer = setTimeout(() => onUpdateProgress(chapterIndex, el.scrollTop), 250);
    };
    el.addEventListener('scroll', handleScroll, { passive: true });
    return () => {
      el.removeEventListener('scroll', handleScroll);
      if (timer) clearTimeout(timer);
      if (!isRestoringScroll.current) {
        const finalScrollTop = Number(latestScrollTop.current);
        onUpdateProgress(chapterIndex, Number.isFinite(finalScrollTop) ? finalScrollTop : el.scrollTop);
      }
    };
  }, [chapterIndex, onUpdateProgress]);

  const persistCurrentScroll = useCallback(() => {
    const el = scrollRef.current;
    if (!el) return;
    latestScrollTop.current = el.scrollTop;
    onUpdateProgress(chapterIndex, el.scrollTop);
  }, [chapterIndex, onUpdateProgress]);

  const cachedAiForChapter = lsGet(buildAiCacheKey(novel.id, chapterIndex, settings.liveTriggerKey), null);
  const aiCommentsByKey = getVisibleAiCommentsByKey({
    aiState,
    chapterIndex,
    cachedAi: cachedAiForChapter,
    fingerprint: settings.liveTriggerKey,
  });
  const activeAiState = aiState.chapterIndex === chapterIndex
    ? aiState
    : (Object.keys(aiCommentsByKey).length
      ? { status: 'success', commentsByKey: aiCommentsByKey, error: '' }
      : { status: 'idle', commentsByKey: {}, error: '' });
  const chapterCommentCount = Object.values(aiCommentsByKey).reduce((total, comments) => {
    return total + (Array.isArray(comments) ? comments.length : 0);
  }, 0);
  const firstCommentedParagraphIndex = paragraphs.findIndex((_, index) => {
    const key = `${chapterIndex}-${index}`;
    return Array.isArray(aiCommentsByKey[key]) && aiCommentsByKey[key].length > 0;
  });
  const progress = novel.displayReaderProgress || (chapters.length > 0 ? ((chapterIndex + 1) / chapters.length * 100).toFixed(2) : '0.00');
  const paragraphCount = Math.max(1, paragraphs.length);
  const activeJumpParagraphIndex = clamp(jumpParagraphIndex, 0, paragraphCount - 1);
  const paragraphProgress = paragraphs.length ? ((activeJumpParagraphIndex + 1) / paragraphCount * 100).toFixed(0) : '0';
  const readerStyle = {
    '--reader-font-size': `${settings.fontSize || 20}px`,
    '--reader-line-height': settings.lineHeight || 1.84,
  };
  const getParagraphAiComments = useCallback((paragraphKey) => {
    if (Array.isArray(aiCommentsByKey[paragraphKey]) && aiCommentsByKey[paragraphKey].length) {
      return aiCommentsByKey[paragraphKey];
    }
    return [];
  }, [aiCommentsByKey]);
  const getScopeReplies = useCallback((scopeKey) => {
    return commentReplies?.[scopeKey] || {};
  }, [commentReplies]);
  const chapterDiscussionKey = buildChapterCommentKey(novel.id, chapterIndex);
  const chapterDiscussionUserComments = userComments[chapterDiscussionKey] || [];
  const chapterDiscussionAiComments = Array.isArray(chapterDiscussionComments) ? chapterDiscussionComments : [];
  const chapterDiscussionTotalCount = countCommentTree(
    [...chapterDiscussionAiComments, ...chapterDiscussionUserComments],
    getScopeReplies(chapterDiscussionKey),
  );
  const chapterDiscussionPreviewComments = [...chapterDiscussionAiComments, ...chapterDiscussionUserComments].slice(0, 2);
  const nextQueuedCount = Array.isArray(aiPrebuildState?.queuedChapters) ? aiPrebuildState.queuedChapters.length : 0;
  const chapterDiscussionMeta = chapterDiscussionStatus?.status === 'loading'
    ? '本章章评正在准备中…'
    : chapterDiscussionAiComments.length
      ? `已缓存 ${chapterDiscussionAiComments.length} 条章评首评。`
      : chapterCommentCount > 0
        ? `已缓存 ${chapterCommentCount} 条 AI 段评，可先从这里进入本章讨论。`
        : chapterDiscussionStatus?.status === 'error'
          ? (chapterDiscussionStatus?.error || '本章 AI 章评生成失败。')
          : settings.liveSettings.enabled
            ? '本章 AI 评论正在生成中，生成完成后会出现在对应段落。'
            : '本章讨论入口已就位；当前未启用 AI 生成。';
  const prebuildMeta = aiPrebuildState?.running
    ? `后台正在预热后续 ${nextQueuedCount} 章。`
    : aiPrebuildState?.lastError
      ? `后台预热暂时中断：${aiPrebuildState.lastError}`
      : nextQueuedCount > 0
        ? `后续还有 ${nextQueuedCount} 章待预热。`
        : '后续章节预热已就绪。';
  const clearLongPress = () => {
    if (longPressTimer.current) {
      clearTimeout(longPressTimer.current);
      longPressTimer.current = null;
    }
  };
  const startLongPress = (index) => {
    clearLongPress();
    longPressTimer.current = setTimeout(() => {
      suppressNextClick.current = true;
      setShowChapterJump(false);
      setParagraphActionIndex(index);
      longPressTimer.current = null;
    }, 520);
  };
  const toggleSummon = (personaId) => {
    setSummonSelectedIds(prev => prev.includes(personaId)
      ? prev.filter(id => id !== personaId)
      : [...prev, personaId]);
  };
  const openChapterDiscussion = () => {
    if (!paragraphs.length) return;
    setExpandedChapterDiscussion(true);
    if (typeof onOpenChapterDiscussion === 'function') {
      onOpenChapterDiscussion({
        chapterIndex,
        chapterTitle: chapter?.title || '',
        chapterText: chapter?.content || '',
      });
    }
  };
  const getBottomVisibleParagraphIndex = () => {
    const el = scrollRef.current;
    if (!el) return activeJumpParagraphIndex;
    const containerRect = el.getBoundingClientRect();
    const nodes = Array.from(el.querySelectorAll('[data-reader-paragraph]'));
    let bottomIndex = activeJumpParagraphIndex;
    let bottomEdge = Number.NEGATIVE_INFINITY;
    nodes.forEach(node => {
      const rect = node.getBoundingClientRect();
      if (rect.bottom <= containerRect.top || rect.top >= containerRect.bottom) return;
      const index = Number(node.dataset.readerParagraph);
      if (!Number.isFinite(index)) return;
      const edge = Math.min(rect.bottom, containerRect.bottom);
      if (edge >= bottomEdge) {
        bottomEdge = edge;
        bottomIndex = index;
      }
    });
    return clamp(bottomIndex, 0, paragraphCount - 1);
  };
  const openReaderControls = (index = null) => {
    const nextIndex = Number.isFinite(index) ? index : getBottomVisibleParagraphIndex();
    setJumpParagraphIndex(clamp(nextIndex, 0, paragraphCount - 1));
    setShowChapterJump(true);
  };
  const shouldIgnoreReaderTap = (target) => {
    if (!(target instanceof Element)) return false;
    return Boolean(target.closest('button, input, textarea, select, a, [data-paragraph-actions], [data-comment-panel="true"], [data-chapter-discussion], .sheet-panel, .bottom-sheet-backdrop'));
  };
  const handleReaderAreaClick = (event) => {
    if (suppressNextClick.current) {
      suppressNextClick.current = false;
      return;
    }
    if (paragraphActionIndex !== null) {
      if (event.target instanceof Element && event.target.closest('[data-paragraph-actions]')) return;
      setParagraphActionIndex(null);
      return;
    }
    if (shouldIgnoreReaderTap(event.target)) return;
    openReaderControls();
  };
  const scrollToParagraph = (index) => {
    const nextIndex = clamp(index, 0, paragraphCount - 1);
    setJumpParagraphIndex(nextIndex);
    const el = scrollRef.current;
    const target = el?.querySelector(`[data-reader-paragraph="${nextIndex}"]`);
    if (!el || !target) return;
    const nextTop = Math.max(0, target.offsetTop - 12);
    isRestoringScroll.current = true;
    el.scrollTop = nextTop;
    onUpdateProgress(chapterIndex, nextTop);
    window.setTimeout(() => {
      isRestoringScroll.current = false;
    }, 120);
  };
  const openParagraphComment = (index) => {
    setParagraphActionIndex(null);
    setExpandedParagraph(index);
  };
  const openSummonComment = (index) => {
    setParagraphActionIndex(null);
    setSummonParagraph(index);
  };
  const generateSummonedComments = async () => {
    if (summonParagraph === null) return;
    const targetParagraphIndex = summonParagraph;
    const key = `${chapterIndex}-${targetParagraphIndex}`;
    const paragraph = paragraphs[targetParagraphIndex] || '';
    const selectedPersonas = settings.personas.filter(persona => summonSelectedIds.includes(persona.id));
    if (!selectedPersonas.length || typeof onSummonParagraphComments !== 'function') return;
    setIsSummonGenerating(true);
    setSummonParagraph(null);
    setReaderToast({ title: 'AI 书友正在后台生成', subtitle: '你可以继续阅读，评论生成后会写入本段。' });
    try {
      const generatedCount = await onSummonParagraphComments({
        paragraphKey: key,
        chapterIndex,
        paragraphIndex: targetParagraphIndex,
        chapterTitle: chapter?.title || '',
        paragraphText: paragraph,
        personas: selectedPersonas,
      });
      setSummonParagraph(null);
      setReaderToast({
        title: generatedCount > 0 ? 'AI 书友评论已生成' : 'AI 书友没有生成可用评论',
        subtitle: generatedCount > 0 ? `写入 ${generatedCount} 条本段评论` : '没有写入本地固定话术。',
      });
    } catch (error) {
      setReaderToast({ title: 'AI 书友生成失败', subtitle: getErrorMessage(error) });
    } finally {
      setIsSummonGenerating(false);
      window.setTimeout(() => setReaderToast(null), 2200);
    }
  };

  return (
    <div className="app-screen reader-screen" style={readerStyle}>
      <StatusBar />
      <TopBar
        title={`${chapter?.title || `第 ${chapterIndex + 1} 章`} · ${progress}%`}
        left={<button onClick={() => { persistCurrentScroll(); onBack(); }} aria-label="返回目录"><Icon name="chevronLeft" size={24} strokeWidth={1.9} /></button>}
        right={<button onClick={() => setShowReadingSettings(true)} aria-label="阅读设置"><Icon name="more" size={22} /></button>}
      />
      <div ref={scrollRef} className="scroll-area reader-scroll" onClick={handleReaderAreaClick}>
        <div className="reader-article">
          <div className="reader-title-muted">{novel.title}</div>
          {activeAiState.status === 'error' && (
            <div className="status-message error">{activeAiState.error}</div>
          )}
          <div className="card legacy-chapter-discussion" style={{ marginBottom: 16, padding: '14px 16px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', gap: 12, alignItems: 'center' }}>
                            <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 15, fontWeight: 700 }}>????</div>
                <div className="muted" style={{ marginTop: 4 }} data-legacy-chapter-discussion-meta>{chapterDiscussionMeta}</div>
                <div className="muted" style={{ marginTop: 4 }} data-legacy-prebuild-meta>{prebuildMeta}</div>
              </div>
              <button
                className="btn btn-outline"
                type="button"
                disabled={!paragraphs.length}
                onClick={() => {
                  setExpandedChapterDiscussion(true);
                  if (typeof onOpenChapterDiscussion === 'function') {
                    onOpenChapterDiscussion({
                      chapterIndex,
                      chapterTitle: chapter?.title || '',
                      chapterText: chapter?.content || '',
                    });
                  }
                }}
              >
                查看讨论
              </button>
            </div>
          </div>
          {paragraphs.map((paragraph, index) => {
            const key = `${chapterIndex}-${index}`;
            const aiComments = getParagraphAiComments(key);
            const myComments = userComments[key] || [];
            const totalCount = countCommentTree([...aiComments, ...myComments], getScopeReplies(key));
            return (
              <div className="reader-paragraph-wrap" key={key}>
                <p
                  className="reader-p"
                  data-reader-paragraph={index}
                  role="button"
                  tabIndex="0"
                  aria-label={`打开章节跳转：第 ${index + 1} 段`}
                  onClick={(event) => {
                    event.stopPropagation();
                    if (suppressNextClick.current) {
                      suppressNextClick.current = false;
                      return;
                    }
                    if (paragraphActionIndex !== null) {
                      setParagraphActionIndex(null);
                      return;
                    }
                    openReaderControls(index);
                  }}
                  onPointerDown={() => startLongPress(index)}
                  onPointerUp={clearLongPress}
                  onPointerCancel={clearLongPress}
                  onContextMenu={(event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    setShowChapterJump(false);
                    setParagraphActionIndex(index);
                  }}
                >
                  {paragraph}
                  {totalCount > 0 && (
                    <CommentBadge
                      count={totalCount}
                      active={expandedParagraph === index}
                      onClick={(event) => {
                        event.stopPropagation();
                        setExpandedParagraph(expandedParagraph === index ? null : index);
                      }}
                    />
                  )}
                </p>
                {paragraphActionIndex === index && (
                  <ParagraphActionPanel
                    onOpenComment={() => openParagraphComment(index)}
                    onOpenSummon={() => openSummonComment(index)}
                  />
                )}
              </div>
            );
          })}
          <section className="chapter-end-discussion" data-chapter-discussion onClick={event => event.stopPropagation()}>
            <button
              className="chapter-end-discussion-header"
              type="button"
              disabled={!paragraphs.length}
              onClick={openChapterDiscussion}
            >
              <span className="chapter-end-title">
                <span>本章说</span>
                <span className="chapter-end-count">{chapterDiscussionTotalCount} 条评论</span>
              </span>
              <Icon name="chevronRight" size={18} strokeWidth={1.9} />
            </button>
            <div className="chapter-end-meta" data-chapter-discussion-meta>{chapterDiscussionMeta}</div>
            <div className="chapter-end-meta" data-prebuild-meta>{prebuildMeta}</div>
            {chapterDiscussionPreviewComments.length > 0 && (
              <div className="chapter-end-preview-list">
                {chapterDiscussionPreviewComments.map(comment => (
                  <button
                    className="chapter-end-preview"
                    type="button"
                    key={comment.id}
                    onClick={openChapterDiscussion}
                  >
                    <span className="chapter-end-preview-avatar" style={{ '--avatar-bg': comment.personaColor || '#b8844e' }}>
                      {comment.personaAvatar || 'AI'}
                    </span>
                    <span style={{ minWidth: 0 }}>
                      <span className="chapter-end-preview-name">{comment.personaName || 'AI 书友'}</span>
                      <span className="chapter-end-preview-text">{normalizeCommentText(comment.text)}</span>
                    </span>
                  </button>
                ))}
              </div>
            )}
            <button className="chapter-end-composer" type="button" onClick={openChapterDiscussion}>
              写下你的本章想法...
            </button>
          </section>
        </div>
      </div>

      {expandedParagraph !== null && (() => {
        const key = `${chapterIndex}-${expandedParagraph}`;
        const aiComments = getParagraphAiComments(key);
        const myComments = userComments[key] || [];
        return (
          <CommentPanel
            comments={aiComments}
            userComments={myComments}
            commentReplies={getScopeReplies(key)}
            personas={settings.personas}
            commentLikes={commentLikes}
            onAddUserComment={(text) => onAddUserComment(key, text)}
            onSubmitComment={({ text, replyTarget }) => onSubmitComment({
              scopeKey: key,
              chapterIndex,
              paragraphIndex: expandedParagraph,
              chapterTitle: chapter?.title || '',
              paragraphText: paragraphs[expandedParagraph] || '',
              text,
              replyTarget,
            })}
            onSummonAiReply={({ parentComment, targetComment, personas }) => onSummonCommentReply({
              scopeKey: key,
              chapterIndex,
              paragraphIndex: expandedParagraph,
              chapterTitle: chapter?.title || '',
              paragraphText: paragraphs[expandedParagraph] || '',
              parentComment,
              targetComment,
              personas,
            })}
            onToggleCommentLike={onToggleCommentLike}
            onClose={() => setExpandedParagraph(null)}
          />
        );
      })()}
      {expandedChapterDiscussion && (
        <CommentPanel
          comments={chapterDiscussionAiComments}
          userComments={chapterDiscussionUserComments}
          commentReplies={getScopeReplies(chapterDiscussionKey)}
          personas={settings.personas}
          commentLikes={commentLikes}
          onAddUserComment={(text) => onAddUserComment(chapterDiscussionKey, text)}
          onSubmitComment={({ text, replyTarget }) => onSubmitComment({
            scopeKey: chapterDiscussionKey,
            chapterIndex,
            paragraphIndex: 0,
            chapterTitle: chapter?.title || '',
            paragraphText: chapter?.content || '',
            text,
            replyTarget,
          })}
          onSummonAiReply={({ parentComment, targetComment, personas }) => onSummonCommentReply({
            scopeKey: chapterDiscussionKey,
            chapterIndex,
            paragraphIndex: 0,
            chapterTitle: chapter?.title || '',
            paragraphText: chapter?.content || '',
            parentComment,
            targetComment,
            personas,
          })}
          onToggleCommentLike={onToggleCommentLike}
          onClose={() => setExpandedChapterDiscussion(false)}
        />
      )}
      {showChapterJump && (
        <ChapterJumpPanel
          chapter={chapter}
          chapterIndex={chapterIndex}
          chapters={chapters}
          paragraphIndex={activeJumpParagraphIndex}
          paragraphCount={paragraphCount}
          paragraphProgress={paragraphProgress}
          onClose={() => setShowChapterJump(false)}
          onChangeChapter={(index) => { persistCurrentScroll(); onChangeChapter(index); setShowChapterJump(false); }}
          onChangeParagraph={scrollToParagraph}
          onOpenCatalog={() => { persistCurrentScroll(); setShowChapterJump(false); onBack(); }}
        />
      )}
      {showReadingSettings && <ReadingSettingsPanel settings={settings} onClose={() => setShowReadingSettings(false)} />}
      {summonParagraph !== null && (
        <SummonPanel
          personas={settings.personas}
          selectedIds={summonSelectedIds}
          onToggle={toggleSummon}
          onGenerate={generateSummonedComments}
          isGenerating={isSummonGenerating}
          onClose={() => setSummonParagraph(null)}
        />
      )}
      <Toast toast={readerToast} />
    </div>
  );
}

function SettingsScreen({ settings, onNavigate }) {
  const {
    currentProfile,
    updateCurrentProfile,
    modelProfiles,
    selectedProfileId,
    setSelectedProfileId,
    defaultProfileId,
    addModelProfile,
    setDefaultProfileId,
    currentApiKey,
    setCurrentApiKey,
    liveSettings,
    setLiveSettings,
    connectionState,
    isDiscoveringModels,
    onTestConnection,
    onDiscoverModels,
    currentConnectionFingerprint,
  } = settings;
  const [showKey, setShowKey] = useState(false);
  const [showHelp, setShowHelp] = useState(false);
  const [toast, setToast] = useState(null);
  const isCurrentConnectionTested = connectionState.fingerprint === currentConnectionFingerprint;
  const isLoading = connectionState.status === 'loading' || isDiscoveringModels;
  const isSuccess = connectionState.status === 'success' && isCurrentConnectionTested;
  const isError = connectionState.status === 'error' && isCurrentConnectionTested;
  const statusText = isLoading ? '测试中' : isSuccess ? '已连接' : isError ? '连接失败' : '未测试';
  const statusMessage = isSuccess
    ? (connectionState.message || '连接成功，模型可用。可以开始使用该接口生成评论。')
    : isError
      ? (connectionState.message || '连接失败，请检查 Base URL / API Key / 模型名称。')
      : '填写配置后点击测试连接。测试会真实调用所选模型。';

  const saveConfig = () => {
    if (!isSuccess) {
      setToast({ title: '请先测试连接', subtitle: '确认模型可用后再保存配置' });
      window.setTimeout(() => setToast(null), 1900);
      return;
    }
    setLiveSettings(prev => ({ ...prev, enabled: true, profileId: currentProfile.id }));
    setToast({ title: '已保存并设为当前接口', subtitle: '接口配置已保存在本地设备' });
    window.setTimeout(() => setToast(null), 1900);
  };
  const isDefaultProfile = currentProfile.id === defaultProfileId;

  return (
    <div className="app-screen">
      <StatusBar />
      <div className="scroll-area settings-body tab-body">
        <div className="settings-head">
          <h1>AI 接口设置</h1>
          <p>配置你的 AI 服务，用于生成评论。支持任何 OpenAI SDK 兼容接口。</p>
        </div>

        <span className="section-label">接口列表</span>
        <div className="profile-list">
          {modelProfiles.map(profile => (
            <button
              key={profile.id}
              className={`profile-row ${profile.id === selectedProfileId ? 'active' : ''}`}
              onClick={() => setSelectedProfileId(profile.id)}
            >
              <span style={{ minWidth: 0 }}>
                <span className="profile-name">{profile.name || '未命名接口'}</span>
                <span className="profile-meta">{profile.model || '未填写模型'} · {profile.baseUrl || '未填写 Base URL'}</span>
              </span>
              {profile.id === defaultProfileId && <span className="profile-pill">默认</span>}
            </button>
          ))}
        </div>

        <div className="profile-tools">
          <button className="btn btn-outline" onClick={addModelProfile}>新增接口</button>
          <button className="btn btn-outline" onClick={() => setDefaultProfileId(currentProfile.id)} disabled={isDefaultProfile}>
            {isDefaultProfile ? '已是默认' : '设为默认'}

        </div>

        <label className="form-field">
          <span className="field-label">配置名称</span>
          <input className="input" value={currentProfile.name} onChange={e => updateCurrentProfile({ name: e.target.value })} placeholder="例如：我的 OpenAI 服务" />
        </label>

        <label className="form-field">
          <span className="field-label">Base URL</span>
          <input className="input" value={currentProfile.baseUrl} onChange={e => updateCurrentProfile({ baseUrl: e.target.value })} placeholder="例如：https://api.openai.com/v1" />
        </label>

        <label className="form-field">
          <span className="field-label">API Key</span>
          <span className="password-wrap">
            <input className="input" type={showKey ? 'text' : 'password'} value={currentApiKey} onChange={e => setCurrentApiKey(e.target.value)} placeholder="输入你的 API Key" />
            <button className="eye-btn" type="button" onClick={() => setShowKey(prev => !prev)} aria-label="显示或隐藏 API Key">
              <Icon name="eye" size={20} strokeWidth={1.8} />
            </button>
          </span>
        </label>

        <label className="form-field">
          <span className="field-label">模型名称</span>
          <input className="input" value={currentProfile.model} onChange={e => updateCurrentProfile({ model: e.target.value })} placeholder="例如：gpt-4.1-mini" />
        </label>

        <div className="config-example-box settings-example-box">
          <strong>填写示例与提示</strong><br />
          OpenAI 官方 → https://api.openai.com/v1<br />
          自建/远程兼容服务 → http://100.x.x.x:11434/v1<br />
          模型名称示例：gpt-4.1-mini、qwen2.5:7b、deepseek-r1:7b<br />
          按你的服务端支持如实填写。
        </div>

        <div className="settings-actions">
          <button className="btn btn-outline" onClick={onTestConnection} disabled={isLoading}>{isLoading ? '测试中...' : '测试连接'}</button>
          <button className="btn btn-primary" onClick={saveConfig}>保存配置</button>
        </div>

        <button style={{ display: 'none' }} onClick={onDiscoverModels} disabled={isDiscoveringModels}>发现模型</button>

        <span className="section-label">当前状态</span>
        <div className={`status-message ${isError ? 'error' : ''} ${isSuccess ? 'success' : ''}`}>
          <div className="status-head">
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontWeight: 800 }}>
              <span className={`status-dot ${isLoading ? 'loading' : isSuccess ? 'success' : isError ? 'error' : ''}`} />
              当前状态：{statusText}
            </div>
            <button className="help-icon-btn" onClick={() => setShowHelp(true)} aria-label="查看配置说明">i</button>
          </div>
          <div style={{ marginTop: 7 }}>{statusMessage}</div>
        </div>

        <div className="settings-tip">
          提示：请确保你拥有所使用 AI 服务的合法权限。<br />
          测试连接会向当前模型发起一次最小请求；API Key 仅保存在本地设备中。
        </div>
      </div>
      <BottomNav active="settings" onNavigate={onNavigate} />
      <Toast toast={toast} />

      {isLoading && (
        <div className="delete-dialog">
          <div className="dialog-card loading-card">
            <div className="spinner" />
            <h3>正在测试连接...</h3>
            <p>请稍候</p>
          </div>
        </div>
      )}

      {showHelp && (
        <div className="delete-dialog" onClick={() => setShowHelp(false)}>
          <div className="dialog-card config-dialog" onClick={event => event.stopPropagation()}>
            <h3>配置说明</h3>
            <ul className="config-list">
              <li>适配一切 OpenAI SDK 兼容方式。</li>
              <li>可连接官方服务、代理服务、自建兼容服务。</li>
              <li>远程 Ollama 也可使用，但需提供兼容的 Base URL。</li>
              <li>API Key 是否必填取决于你的服务端。</li>
              <li>测试连接会真实调用所填模型，成功后再保存为当前接口。</li>
            </ul>
            <div className="config-example-box">
              <strong>常见示例</strong><br />
              OpenAI 官方：https://api.openai.com/v1<br />
              自建/远程兼容服务：http://100.x.x.x:11434/v1<br />
              模型示例：gpt-4.1-mini、qwen2.5:7b、deepseek-r1:7b
            </div>
            <div className="settings-tip" style={{ margin: '0 0 16px', textAlign: 'left' }}>
              提示（可选）：通过 Tailscale 连接到远程电脑，再访问该电脑上运行的 Ollama（兼容 OpenAI 接口），即可在本地使用。
            </div>
            <button className="btn btn-primary" style={{ width: '100%' }} onClick={() => setShowHelp(false)}>知道了</button>
          </div>
        </div>
      )}
    </div>
  );
}

function AiFriendsScreen({ personas, onNavigate, onEditFriend, onAddFriend, onDeleteFriend, toast }) {
  const [deletingPersona, setDeletingPersona] = useState(null);
  const openFriend = (personaId) => onEditFriend(personaId);
  const handleCardKeyDown = (event, personaId) => {
    if (event.key !== 'Enter' && event.key !== ' ') return;
    event.preventDefault();
    openFriend(personaId);
  };
  const confirmDelete = () => {
    if (!deletingPersona) return;
    onDeleteFriend(deletingPersona.id);
    setDeletingPersona(null);
  };
  return (
    <div className="app-screen">
      <StatusBar />
      <div className="scroll-area settings-body tab-body">
        <div className="friends-head">
          <div>
            <h1>AI 书友设置</h1>
            <p>管理您的 AI 书友（阅读陪伴角色），自定义他们的性格与出现频率。</p>
          </div>
          <button className="add-friend-btn" onClick={onAddFriend}>＋ 新增AI书友</button>
        </div>
        <div className="section-label">我的AI书友</div>
        {personas.map(persona => (
          <div
            className="friend-card"
            key={persona.id}
            role="button"
            tabIndex="0"
            onClick={() => openFriend(persona.id)}
            onKeyDown={event => handleCardKeyDown(event, persona.id)}
          >
            <PersonaAvatar persona={persona} />
            <div style={{ minWidth: 0 }}>
              <div className="friend-title">
                {persona.name}
                <span className="preset-pill">{persona.preset ? '预设' : '自定义'}</span>
              </div>
              <div className="friend-desc">{persona.description || persona.stylePrompt}</div>
              <div className="friend-desc">出现频率：{frequencyLabel(persona.frequency)}</div>
            </div>
            <div className="friend-card-actions">
              <Icon name="chevronRight" size={18} style={{ color: '#9f9588' }} />
            </div>
          </div>
        ))}
      </div>
      <BottomNav active="friends" onNavigate={onNavigate} />
      <Toast toast={toast} />
      {deletingPersona && (
        <div className="delete-dialog" onClick={() => setDeletingPersona(null)}>
          <div className="dialog-card" onClick={event => event.stopPropagation()}>
            <h3>删除AI书友？</h3>
            <p>删除「{deletingPersona.name}」后，它不会再出现在书友列表或后续评论生成里。</p>
            <div className="dialog-actions">
              <button className="btn btn-outline" onClick={() => setDeletingPersona(null)}>取消</button>
              <button className="btn btn-danger" onClick={confirmDelete}>删除</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function FriendEditScreen({ persona, mode = 'edit', modelProfiles = [], defaultProfileId = '', onBack, onSave, onDelete, onNavigate, onGeneratePreview }) {
  const isCreate = mode === 'create';
  const avatarFileRef = useRef(null);
  const [draft, setDraft] = useState(() => isCreate ? createBlankPersona() : { ...persona });
  const [showAvatarSheet, setShowAvatarSheet] = useState(false);
  const [showRestoreConfirm, setShowRestoreConfirm] = useState(false);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
  const [showAdvancedPage, setShowAdvancedPage] = useState(false);
  const [showMoreSheet, setShowMoreSheet] = useState(false);
  const [previewSample, setPreviewSample] = useState(() => getNextPreviewSample('', 0));
  const [previewText, setPreviewText] = useState('');
  const [previewStatus, setPreviewStatus] = useState('idle');
  useEffect(() => {
    setDraft(isCreate ? createBlankPersona() : { ...persona });
    setShowAdvancedPage(false);
    setPreviewText('');
    setPreviewStatus('idle');
  }, [isCreate, persona?.id]);
  if (!isCreate && !persona) return null;

  const updateDraft = (patch) => setDraft(prev => ({ ...prev, ...patch }));
  const normalizedDraft = normalizeReadingPersona(draft);
  const draftExamples = normalizePersonaExamples(draft.examples);
  const advancedEnabled = Boolean(normalizedDraft.advancedPromptEnabled);
  const advancedPromptText = normalizedDraft.advancedPromptText || '';
  const defaultPersona = !isCreate ? DEFAULT_PERSONAS.find(item => item.id === persona.id) : null;
  const canSubmit = (!isCreate || draft.name.trim()) && (!advancedEnabled || normalizeText(advancedPromptText));
  const defaultProfile = getProfileById(modelProfiles, defaultProfileId) || modelProfiles[0] || null;

  const updateExample = (index, patch) => {
    const next = (Array.isArray(draft.examples) ? draft.examples : []).map((item, i) =>
      i === index ? { ...item, ...patch } : item
    );
    updateDraft({ examples: next });
  };
  const addExample = () => {
    const list = Array.isArray(draft.examples) ? draft.examples : [];
    if (list.length >= 6) return;
    updateDraft({ examples: [...list, { trigger: '', reply: '' }] });
  };
  const removeExample = (index) => {
    const list = Array.isArray(draft.examples) ? draft.examples : [];
    updateDraft({ examples: list.filter((_, i) => i !== index) });
  };

  const handleAvatarFile = (event) => {
    const file = event.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => updateDraft({ avatar: ev.target.result, color: '#efe0c8' });
    reader.readAsDataURL(file);
    event.target.value = '';
    setShowAvatarSheet(false);
  };

  const restoreDefault = () => {
    if (defaultPersona) setDraft(normalizePersona(defaultPersona, DEFAULT_PERSONAS.findIndex(item => item.id === defaultPersona.id)));
    setPreviewText('');
    setPreviewStatus('idle');
    setShowRestoreConfirm(false);
  };

  const openAdvancedPage = () => {
    if (!advancedEnabled || !normalizeText(advancedPromptText)) {
      updateDraft({
        advancedPromptEnabled: true,
        advancedPromptText: compilePersonaPrompt(normalizeReadingPersona(draft)),
      });
    }
    setShowAdvancedPage(true);
  };

  const regenerateAdvancedPrompt = () => {
    if (!window.confirm('重新生成会覆盖当前高级 Prompt，是否继续？')) return;
    updateDraft({ advancedPromptText: compilePersonaPrompt(normalizeReadingPersona({ ...draft, advancedPromptEnabled: false })) });
  };

  const exitAdvancedMode = () => {
    if (!window.confirm('退出高级模式后，将重新使用结构化人格生成评论。是否继续？')) return;
    updateDraft({ advancedPromptEnabled: false });
    setShowAdvancedPage(false);
  };

  const changePreviewSample = () => {
    const next = getNextPreviewSample(previewSample.direction, Date.now());
    setPreviewSample(next);
    setPreviewText('');
    setPreviewStatus('idle');
  };

  const generatePreview = async () => {
    const normalized = normalizeReadingPersona(draft);
    setPreviewStatus('loading');
    try {
      if (!onGeneratePreview) throw new Error('preview-generator-missing');
      const result = await onGeneratePreview(normalized, previewSample);
      setPreviewText(normalizeCommentText(result));
      setPreviewStatus('success');
    } catch (error) {
      setPreviewText(getErrorMessage(error));
      setPreviewStatus('error');
    }
  };

  const submit = () => {
    if (!canSubmit) return;
    const name = draft.name.trim() || '我的AI书友';
    const normalized = normalizeReadingPersona(draft);
    onSave({
      ...normalized,
      name,
      tag: draft.preset ? draft.tag : '自定义',
      description: draft.description || `${name} 的自定义阅读视角`,
      enabled: true,
    }, isCreate ? 'create' : 'edit');
  };

  const confirmDelete = () => {
    if (isCreate || !draft.id || !onDelete) return;
    onDelete(draft.id);
    setShowDeleteConfirm(false);
  };

  if (showAdvancedPage) {
    return (
      <div className="app-screen">
        <StatusBar />
        <TopBar
          title="高级微调"
          left={<button onClick={() => setShowAdvancedPage(false)} aria-label="返回编辑AI书友"><Icon name="chevronLeft" size={25} strokeWidth={1.9} /></button>}
          right={null}
        />
        <div className="scroll-area edit-body" data-advanced-prompt-page>
          <div style={{ color: '#8d8276', fontSize: 13, marginBottom: 12 }}>
            高级 Prompt 会完全接管这个书友的段评风格。这里的内容会随 AI 书友设置一起保存。
          </div>
          <div className="persona-panel">
            <div className="field-label-row">
              <span className="field-label">当前书友</span>
              <span className={`mode-pill ${advancedEnabled ? 'active' : ''}`}>{advancedEnabled ? '已接管' : '未启用'}</span>
            </div>
            <div className="friend-title" style={{ marginTop: 4 }}>{draft.name || '我的AI书友'}</div>
            <div className="friend-desc">从基础人格生成初稿后，可以在这里继续加细节、禁忌和语气要求。</div>
          </div>
          <label className="form-field">
            <span className="field-label-row">
              <span className="field-label">高级 Prompt</span>
              <span className="field-counter">{advancedPromptText.length}/5000</span>
            </span>
            <textarea
              className="prompt-box advanced-prompt-box"
              maxLength="5000"
              value={advancedPromptText}
              onChange={event => updateDraft({ advancedPromptEnabled: true, advancedPromptText: event.target.value })}
            />
          </label>
          <div className="inline-actions">
            <button type="button" className="btn btn-outline" onClick={regenerateAdvancedPrompt}>从基础人格重生成</button>
            <button type="button" className="btn btn-outline" onClick={exitAdvancedMode}>退出高级模式</button>
          </div>
          <div className="settings-actions" style={{ marginTop: 18 }}>
            <button className="btn btn-outline" onClick={() => setShowAdvancedPage(false)}>返回</button>
            <button className="btn btn-primary" onClick={() => setShowAdvancedPage(false)} disabled={!normalizeText(advancedPromptText)}>完成</button>
          </div>
        </div>
        <BottomNav active="friends" onNavigate={(target) => {
          if (target === 'friends') setShowAdvancedPage(false);
          else onNavigate(target);
        }} />
      </div>
    );
  }

  return (
    <div className="app-screen">
      <StatusBar />
      <TopBar
        title={isCreate ? '创建 AI书友' : '编辑 AI书友'}
        left={<button onClick={onBack} aria-label="返回AI书友设置"><Icon name="chevronLeft" size={25} strokeWidth={1.9} /></button>}
        right={isCreate ? null : (
          <button className="round-button" onClick={() => setShowMoreSheet(true)} aria-label="更多操作"><Icon name="more" size={22} /></button>
        )}
      />
      <div className="scroll-area edit-body">
        <div className="edit-avatar-zone">
          <PersonaAvatar persona={draft} />
          <button type="button" className="avatar-edit-link" onClick={() => setShowAvatarSheet(true)}>更换头像</button>
          <input ref={avatarFileRef} type="file" accept="image/*" onChange={handleAvatarFile} style={{ display: 'none' }} />
        </div>
        <div className="name-headline-wrap">
          <input
            className="name-headline"
            maxLength="12"
            value={draft.name || ''}
            onChange={event => updateDraft({ name: event.target.value })}
            placeholder={isCreate ? '给你的AI书友起个名字' : ''}
          />
          <span className="name-headline-counter">{(draft.name || '').length}/12</span>
        </div>
        <label className="form-field">
          <span className="field-label">出现频率</span>
          <div className="frequency">
            {[
              ['low', '低'],
              ['medium', '中'],
              ['high', '高'],
            ].map(([value, label]) => (
              <button key={value} type="button" className={draft.frequency === value ? 'active' : ''} onClick={() => updateDraft({ frequency: value })}>{label}</button>
            ))}
          </div>
        </label>
        <div className="frequency-hint">{frequencyHint(draft.frequency)}</div>
        {advancedEnabled && (
          <div className="frequency-hint section-frozen-hint">高级 Prompt 已接管生成，以下分区暂不生效，仅作为来源参考。</div>
        )}
        <div className={`persona-sections ${advancedEnabled ? 'is-frozen' : ''}`} data-persona-sections>
          {PERSONA_SECTION_FIELDS.map(({ key, label, placeholder, hint, maxLength }) => {
            const value = draft[key] || '';
            return (
              <label key={key} className="form-field section-field">
                <span className="field-label-row">
                  <span className="field-label">{label}</span>
                  <span className="field-counter">{value.length}/{maxLength}</span>
                </span>
                <textarea
                  className="prompt-box section-box"
                  maxLength={String(maxLength)}
                  value={value}
                  disabled={advancedEnabled}
                  onChange={event => updateDraft({ [key]: event.target.value })}
                  placeholder={placeholder}
                />
                {hint && <span className="field-sub-hint">{hint}</span>}
              </label>
            );
          })}
        </div>
        <div className={`persona-panel examples-card ${advancedEnabled ? 'is-frozen' : ''}`} data-persona-examples>
          <div className="field-label-row">
            <span className="field-label">案例（看到什么 → 回什么）</span>
            <span className="field-counter">{draftExamples.length}/6</span>
          </div>
          <div className="field-sub-hint" style={{ marginTop: 2, marginBottom: 10 }}>给几个示范，模型会照着这种「触发→反应」的感觉走（不照抄内容）。</div>
          {(Array.isArray(draft.examples) ? draft.examples : []).map((item, index) => (
            <div key={index} className="example-row">
              <div className="example-row-head">
                <span className="example-index">案例 {index + 1}</span>
                <button type="button" className="example-remove" disabled={advancedEnabled} onClick={() => removeExample(index)} aria-label={`删除案例 ${index + 1}`}>
                  <Icon name="trash" size={15} />
                </button>
              </div>
              <textarea
                className="prompt-box example-box"
                maxLength="200"
                value={item?.trigger || ''}
                disabled={advancedEnabled}
                onChange={event => updateExample(index, { trigger: event.target.value })}
                placeholder="看到这样的内容…（小说片段）"
              />
              <textarea
                className="prompt-box example-box"
                maxLength="120"
                value={item?.reply || ''}
                disabled={advancedEnabled}
                onChange={event => updateExample(index, { reply: event.target.value })}
                placeholder="就回这样的内容…（这个书友的短评）"
              />
            </div>
          ))}
          <button type="button" className="btn btn-outline full-width-btn" disabled={advancedEnabled || draftExamples.length >= 6} onClick={addExample}>+ 添加案例</button>
        </div>
        <label className="form-field">
          <span className="field-label">使用接口</span>
          <select
            className="input"
            value={draft.modelProfileId || ''}
            onChange={event => updateDraft({ modelProfileId: event.target.value })}
          >
            <option value="">跟随默认接口{defaultProfile ? `（${defaultProfile.name}）` : ''}</option>
            {modelProfiles.map(profile => (
              <option key={profile.id} value={profile.id}>{profile.name || '未命名接口'} · {profile.model || '未填写模型'}</option>
            ))}
          </select>
        </label>
        <button type="button" className="entry-row" data-advanced-prompt-panel onClick={openAdvancedPage}>
          <span className="entry-row-label">{advancedEnabled ? '编辑高级微调' : '进入高级微调'}</span>
          <span className="entry-row-tail">
            <span className={`mode-pill ${advancedEnabled ? 'active' : ''}`}>{advancedEnabled ? '已接管' : '未启用'}</span>
            <Icon name="chevronRight" size={18} strokeWidth={1.8} />
          </span>
        </button>
        <div className="persona-panel preview-card" data-ai-friend-preview>
          <div className="field-label-row" style={{ marginBottom: 10 }}>
            <span className="field-label">段评预览</span>
            <span className="mode-pill">{previewSample.label}</span>
          </div>
          <div className="preview-sample">{previewSample.text}</div>
          <div className="preview-reply">
            <PersonaAvatar persona={draft} />
            <div
              className={`preview-output ${
                previewStatus === 'loading' ? 'is-loading'
                : previewStatus === 'error' ? 'is-error'
                : previewText ? '' : 'is-placeholder'
              }`}
            >
              {previewText || (previewStatus === 'loading' ? '正在生成预览...' : '点击「生成预览」试听这个书友。')}
            </div>
          </div>
          {previewStatus === 'error' && <div className="frequency-hint preview-hint">预览需要可用 AI 接口和 API Key。</div>}
          <div className="inline-actions">
            <button type="button" className="btn btn-outline" onClick={changePreviewSample}>换一个示例</button>
            <button type="button" className="btn btn-primary" onClick={generatePreview} disabled={previewStatus === 'loading'}>{previewStatus === 'loading' ? '生成中' : '生成预览'}</button>
          </div>
        </div>
        <button className="btn btn-primary full-width-btn" style={{ marginTop: 28 }} onClick={submit} disabled={!canSubmit}>{isCreate ? '创建AI书友' : '保存修改'}</button>
      </div>
      <BottomNav active="friends" onNavigate={(target) => {
        if (target === 'friends') onBack();
        else onNavigate(target);
      }} />

      {showMoreSheet && (
        <>
          <div className="bottom-sheet-backdrop" onClick={() => setShowMoreSheet(false)} />
          <div className="sheet-panel friend-menu-sheet">
            {defaultPersona && (
              <button className="action-row" onClick={() => { setShowMoreSheet(false); setShowRestoreConfirm(true); }}>
                <Icon name="refresh" size={20} />恢复默认人格
              </button>
            )}
            <button className="action-row danger" onClick={() => { setShowMoreSheet(false); setShowDeleteConfirm(true); }}>
              <Icon name="trash" size={20} />删除AI书友
            </button>
            <button className="action-cancel" onClick={() => setShowMoreSheet(false)}>取消</button>
          </div>
        </>
      )}

      {showAvatarSheet && (
        <>
          <div className="bottom-sheet-backdrop" onClick={() => setShowAvatarSheet(false)} />
          <div className="sheet-panel avatar-sheet-panel">
            <div className="avatar-sheet-title">选择头像来源</div>
            <button className="action-row" onClick={() => { updateDraft({ avatar: '友', color: '#d8dce3' }); setShowAvatarSheet(false); }}>默认头像</button>
            <button className="action-row" onClick={() => avatarFileRef.current?.click()}>上传图片</button>
            <button className="action-cancel" onClick={() => setShowAvatarSheet(false)}>取消</button>
          </div>
        </>
      )}

      {showRestoreConfirm && (
        <div className="delete-dialog" onClick={() => setShowRestoreConfirm(false)}>
          <div className="dialog-card" onClick={event => event.stopPropagation()}>
            <h3>恢复默认人格设定？</h3>
            <p>将恢复该书友的默认人格设定，当前的所有修改都将被删除。</p>
            <div className="dialog-actions">
              <button className="btn btn-outline" onClick={() => setShowRestoreConfirm(false)}>取消</button>
              <button className="btn btn-primary" onClick={restoreDefault}>确认恢复</button>
            </div>
          </div>
        </div>
      )}

      {showDeleteConfirm && (
        <div className="delete-dialog" onClick={() => setShowDeleteConfirm(false)}>
          <div className="dialog-card" onClick={event => event.stopPropagation()}>
            <h3>删除AI书友？</h3>
            <p>删除「{draft.name || '这个AI书友'}」后，它不会再出现在书友列表或后续评论生成里。</p>
            <div className="dialog-actions">
              <button className="btn btn-outline" onClick={() => setShowDeleteConfirm(false)}>取消</button>
              <button className="btn btn-danger" onClick={confirmDelete}>删除</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [novels, setNovels] = useState(() => ensureLocalLibrary());
  const initialHash = window.location.hash.replace('#', '');
  const initialNovelId = novels[0]?.id || null;
  const shouldOpenReader = ['reader', 'reader-comment', 'reader-jump', 'reader-settings', 'reader-summon'].includes(initialHash);
  const [screen, setScreen] = useState(() => {
    if (initialHash === 'settings' || initialHash === 'api-settings') return 'settings';
    if (initialHash === 'friends' || initialHash === 'ai-friends') return 'friends';
    if (initialHash === 'chapters' && initialNovelId) return 'chapters';
    if (shouldOpenReader && initialNovelId) return 'reader';
    return 'bookshelf';
  });
  const [currentNovelId, setCurrentNovelId] = useState(() => (initialHash === 'chapters' || shouldOpenReader ? initialNovelId : null));
  const [currentChapter, setCurrentChapter] = useState(() => shouldOpenReader ? (novels[0]?.lastReadChapter || 0) : 0);
  const [appToast, setAppToast] = useState(null);
  const [editingPersonaId, setEditingPersonaId] = useState(null);

  const baseSettings = lsGet(STORAGE_KEYS.settings, { fontSize: 20, lineHeight: 1.84, theme: 'light' });
  const [fontSize, setFontSize] = useState(() => baseSettings.fontSize || 20);
  const [lineHeight, setLineHeight] = useState(() => baseSettings.lineHeight || 1.84);
  const [theme, setTheme] = useState(() => baseSettings.theme || 'light');
  const [liveSettings, setLiveSettings] = useState(() => ({
    ...DEFAULT_LIVE_SETTINGS,
    ...lsGet(STORAGE_KEYS.liveSettings, DEFAULT_LIVE_SETTINGS),
    promptVersion: DEFAULT_PROMPT_VERSION,
  }));
  const [modelProfiles, setModelProfiles] = useState(() => {
    const saved = lsGet(STORAGE_KEYS.modelProfiles, DEFAULT_MODEL_PROFILES);
    return (saved && saved.length ? saved : DEFAULT_MODEL_PROFILES).map(normalizeModelProfile);
  });
  const [selectedProfileId, setSelectedProfileId] = useState(() => getDefaultProfileId(modelProfiles, liveSettings.profileId));
  const [personas, setPersonas] = useState(() => {
    return ensurePersonasLibrary();
  });
  const [apiKeysByProfileId, setApiKeysByProfileId] = useState(() => lsGet(STORAGE_KEYS.apiKeys, {}));
  const [connectionState, setConnectionState] = useState({ status: 'idle', message: '' });
  const [isDiscoveringModels, setIsDiscoveringModels] = useState(false);
  const [chapterAiState, setChapterAiState] = useState({ chapterIndex: null, status: 'idle', commentsByKey: {}, error: '', fingerprint: '' });
  const [chapterDiscussionState, setChapterDiscussionState] = useState({});
  const [aiPrebuildState, setAiPrebuildState] = useState(() => ({ ...createPrebuildState(), ...lsGet(STORAGE_KEYS.aiPrebuildState, {}) }));
  const [aiThreads, setAiThreads] = useState(() => lsGet(STORAGE_KEYS.aiThreads, {}));
  const [userComments, setUserComments] = useState({});
  const [commentReplies, setCommentReplies] = useState({});
  const [commentLikes, setCommentLikes] = useState({});
  const firstChapterBundlePromiseRef = useRef(null);
  const firstChapterBundleVisibleRef = useRef(false);

  const currentNovel = novels.find(novel => novel.id === currentNovelId);
  const currentChapters = useMemo(() => {
    if (!currentNovelId) return [];
    const data = lsGet(`rwm_novel_${currentNovelId}`, null);
    return data?.chapters || [];
  }, [currentNovelId]);

  const defaultProfileId = useMemo(() => getDefaultProfileId(modelProfiles, liveSettings.profileId), [modelProfiles, liveSettings.profileId]);
  const currentProfile = useMemo(() => normalizeModelProfile(getProfileById(modelProfiles, selectedProfileId) || getProfileById(modelProfiles, defaultProfileId) || modelProfiles[0] || DEFAULT_MODEL_PROFILES[0]), [modelProfiles, selectedProfileId, defaultProfileId]);
  const currentApiKey = apiKeysByProfileId[currentProfile.id] || '';
  const liveTriggerKey = useMemo(
    () => profileFingerprint(modelProfiles, personas, liveSettings.promptVersion, defaultProfileId),
    [modelProfiles, personas, liveSettings.promptVersion, defaultProfileId],
  );
  const currentConnectionFingerprint = useMemo(
    () => connectionFingerprint(currentProfile, currentApiKey, liveSettings.proxyUrl),
    [currentProfile, currentApiKey, liveSettings.proxyUrl],
  );
  const currentBookPersonas = useMemo(
    () => getBookPersonas(personas, currentNovel || {}),
    [personas, currentNovel],
  );
  const currentBookAiFingerprint = useMemo(
    () => profileFingerprint(modelProfiles, currentBookPersonas, liveSettings.promptVersion, defaultProfileId),
    [modelProfiles, currentBookPersonas, liveSettings.promptVersion, defaultProfileId],
  );

  useEffect(() => { lsSet(STORAGE_KEYS.novels, novels); }, [novels]);

  useEffect(() => {
    try {
      if (localStorage.getItem('rwm_demo_seeded') === '1') return;
    } catch {}
    try {
      const existing = lsGet(STORAGE_KEYS.novels, []);
      if (Array.isArray(existing) && existing.some(book =>
        book && (book.id === DEMO_BOOK_ID || book.fileName === '水浒传.txt' || book.title === DEMO_BOOK_TITLE)
      )) {
        try { localStorage.setItem('rwm_demo_seeded', '1'); } catch {}
        return;
      }
    } catch {}
    let cancelled = false;
    (async () => {
      try {
        const res = await fetch(DEMO_BOOK_PATH);
        if (!res.ok || cancelled) return;
        const text = await res.text();
        if (cancelled || !text) return;
        const chapters = parseNovelChapters(text);
        if (!chapters.length) return;
        const meta = createDemoNovelMeta(chapters);
        lsSet(`rwm_novel_${meta.id}`, { chapters });

        try {
          const cacheRes = await fetch('./demo-water-margin-cache.json');
          if (cacheRes.ok && !cancelled) {
            const cache = await cacheRes.json();
            const visitorFingerprint = profileFingerprint(
              modelProfiles,
              personas,
              liveSettings.promptVersion,
              defaultProfileId,
            );
            const visitorHash = String(hashText(visitorFingerprint));
            const visitorMemoryFingerprint = `${visitorFingerprint}:memory-v1`;
            (cache.entries || []).forEach(entry => {
              if (!entry || typeof entry.key !== 'string' || !entry.value) return;
              let key = entry.key;
              let value = entry.value;
              const paragraphMatch = key.match(/^(rwm_ai_comments_.+_\d+)_\d+$/);
              const memoryMatch = key.match(/^rwm_ai_memory_.+_\d+$/);
              if (paragraphMatch) {
                key = `${paragraphMatch[1]}_${visitorHash}`;
                value = { ...value, fingerprint: visitorFingerprint };
              } else if (memoryMatch) {
                value = { ...value, fingerprint: visitorMemoryFingerprint };
              } else {
                value = { ...value, fingerprint: visitorFingerprint };
              }
              try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
            });
            if (cache.threads && Object.keys(cache.threads).length) {
              try {
                const existing = JSON.parse(localStorage.getItem(STORAGE_KEYS.aiThreads) || '{}');
                const merged = { ...cache.threads, ...existing };
                localStorage.setItem(STORAGE_KEYS.aiThreads, JSON.stringify(merged));
              } catch {}
            }
          }
        } catch {}

        setNovels(prev => {
          if (prev.some(book => book.id === meta.id)) return prev;
          return [{ ...meta, isNew: true }, ...prev];
        });
        try { localStorage.setItem('rwm_demo_seeded', '1'); } catch {}
      } catch {}
    })();
    return () => { cancelled = true; };
  }, []);

  useEffect(() => { lsSet(STORAGE_KEYS.settings, { fontSize, lineHeight, theme }); }, [fontSize, lineHeight, theme]);
  useEffect(() => { lsSet(STORAGE_KEYS.liveSettings, liveSettings); }, [liveSettings]);
  useEffect(() => { lsSet(STORAGE_KEYS.modelProfiles, modelProfiles); }, [modelProfiles]);
  useEffect(() => { lsSet(STORAGE_KEYS.personas, personas); }, [personas]);
  useEffect(() => { lsSet(STORAGE_KEYS.aiPrebuildState, aiPrebuildState); }, [aiPrebuildState]);
  useEffect(() => { lsSet(STORAGE_KEYS.aiThreads, aiThreads); }, [aiThreads]);
  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);
  useEffect(() => {
    setChapterDiscussionState({});
    setAiPrebuildState(createPrebuildState());
    firstChapterBundlePromiseRef.current = null;
    firstChapterBundleVisibleRef.current = false;
  }, [currentNovelId, liveTriggerKey, currentBookAiFingerprint]);

  useEffect(() => {
    if (!currentNovelId || !currentChapters.length || !currentBookAiFingerprint) return;
    const cachedCompletedChapters = getCachedAiCompletedChapters(currentNovelId, currentChapters, currentBookAiFingerprint);
    setNovels(prev => prev.map(novel => {
      if (novel.id !== currentNovelId) return novel;
      const reconciled = getReconciledAiGenerationProgress(
        novel,
        currentChapters.length,
        cachedCompletedChapters,
      );
      const sameThrough = novel.aiGeneratedThrough === reconciled.aiGeneratedThrough;
      const sameCompleted = JSON.stringify(novel.aiCompletedChapters || []) === JSON.stringify(reconciled.aiCompletedChapters);
      const sameJob = JSON.stringify(novel.aiGenerationJob || {}) === JSON.stringify(reconciled.aiGenerationJob || {});
      if (sameThrough && sameCompleted && sameJob) return novel;
      return {
        ...novel,
        aiGeneratedThrough: reconciled.aiGeneratedThrough,
        aiCompletedChapters: reconciled.aiCompletedChapters,
        aiGenerationJob: reconciled.aiGenerationJob,
      };
    }));
  }, [currentBookAiFingerprint, currentChapters, currentNovelId]);

  useEffect(() => {
    const resolvedDefaultId = getDefaultProfileId(modelProfiles, liveSettings.profileId);
    if (resolvedDefaultId && resolvedDefaultId !== liveSettings.profileId) {
      setLiveSettings(prev => ({ ...prev, profileId: resolvedDefaultId }));
    }
    if (!getProfileById(modelProfiles, selectedProfileId)) {
      setSelectedProfileId(resolvedDefaultId);
    }
  }, [modelProfiles, liveSettings.profileId, selectedProfileId]);

  useEffect(() => {
    setConnectionState(prev => {
      if (prev.status === 'idle') return prev;
      if (prev.fingerprint === currentConnectionFingerprint) return prev;
      return { status: 'idle', message: '' };
    });
  }, [currentConnectionFingerprint]);

  useEffect(() => {
    if (currentNovelId) {
      setUserComments(lsGet(`rwm_comments_${currentNovelId}`, {}));
      setCommentReplies(lsGet(buildCommentRepliesStorageKey(currentNovelId), {}));
      setCommentLikes(lsGet(buildCommentLikesStorageKey(currentNovelId), {}));
    } else {
      setUserComments({});
      setCommentReplies({});
      setCommentLikes({});
    }
  }, [currentNovelId]);

  const persistApiKeys = useCallback((updater) => {
    setApiKeysByProfileId(prev => {
      const updated = typeof updater === 'function' ? updater(prev) : updater;
      lsSet(STORAGE_KEYS.apiKeys, updated);
      return updated;
    });
  }, []);

  const setCurrentApiKey = useCallback((value) => {
    persistApiKeys(prev => ({ ...prev, [currentProfile.id]: value }));
  }, [currentProfile.id, persistApiKeys]);

  const updateCurrentProfile = useCallback((patch) => {
    setModelProfiles(prev => {
      const targetId = selectedProfileId || getDefaultProfileId(prev, liveSettings.profileId);
      const next = prev.length ? [...prev] : DEFAULT_MODEL_PROFILES.map(normalizeModelProfile);
      const index = next.findIndex(profile => profile.id === targetId);
      const safeIndex = index >= 0 ? index : 0;
      const base = next[safeIndex] || DEFAULT_MODEL_PROFILES[0];
      next[safeIndex] = normalizeModelProfile({ ...base, ...patch, id: base.id });
      return next;
    });
  }, [liveSettings.profileId, selectedProfileId]);

  const addModelProfile = useCallback(() => {
    const id = uid();
    const profile = normalizeModelProfile({
      id,
      name: `AI 接口 ${modelProfiles.length + 1}`,
      baseUrl: DEFAULT_MODEL_PROFILES[0].baseUrl,
      model: DEFAULT_MODEL_PROFILES[0].model,
    });
    setModelProfiles(prev => [...prev, profile]);
    setSelectedProfileId(id);
    setConnectionState({ status: 'idle', message: '' });
  }, [modelProfiles.length]);

  const setDefaultProfileId = useCallback((profileId) => {
    const resolved = getDefaultProfileId(modelProfiles, profileId);
    if (!resolved) return;
    setLiveSettings(prev => ({ ...prev, enabled: true, profileId: resolved }));
  }, [modelProfiles]);

  const showToast = useCallback((toast) => {
    setAppToast(toast);
    window.setTimeout(() => setAppToast(null), 1900);
  }, []);

  const navigateTab = useCallback((target) => {
    if (target === 'bookshelf') setScreen('bookshelf');
    if (target === 'friends') setScreen('friends');
    if (target === 'settings') setScreen('settings');
  }, []);

  const handleImport = useCallback((title, text, fileName) => {
    const chapters = parseNovelChapters(text);
    const id = uid();
    const meta = {
      id,
      title,
      fileName,
      totalChapters: chapters.length,
      lastReadChapter: 0,
      maxReadChapter: 0,
      lastScrollPos: 0,
      chapterScrollPositions: {},
      addedAt: Date.now(),
      coverTheme: ((hashText(title) % 6) + 1),
    };
    lsSet(`rwm_novel_${id}`, { chapters });
    setNovels(prev => [{ ...meta, isNew: true }, ...prev]);
    setCurrentNovelId(id);
    setCurrentChapter(0);
    setScreen('chapters');
    showToast({ title: '导入成功', subtitle: '已导入 1 本书' });
  }, [showToast]);

  const clearNovelAiCache = useCallback((novelId) => {
    try {
      Object.keys(localStorage)
        .filter(key => key.startsWith(`rwm_ai_comments_${novelId}_`))
        .forEach(key => localStorage.removeItem(key));
    } catch {}
  }, []);

  const handleDelete = useCallback((id) => {
    setNovels(prev => prev.filter(novel => novel.id !== id));
    try {
      localStorage.removeItem(`rwm_novel_${id}`);
      localStorage.removeItem(`rwm_comments_${id}`);
      localStorage.removeItem(buildCommentRepliesStorageKey(id));
      localStorage.removeItem(buildCommentLikesStorageKey(id));
    } catch {}
    clearNovelAiCache(id);
    if (currentNovelId === id) {
      setCurrentNovelId(null);
      setScreen('bookshelf');
      setChapterAiState({ chapterIndex: null, status: 'idle', commentsByKey: {}, error: '', fingerprint: '' });
    }
  }, [clearNovelAiCache, currentNovelId]);

  const handleSelectNovel = (id) => {
    setNovels(prev => prev.map(novel => novel.id === id ? markNovelReadStarted(novel) : novel));
    setCurrentNovelId(id);
    const novel = novels.find(item => item.id === id);
    setCurrentChapter(novel?.lastReadChapter || 0);
    setScreen('chapters');
  };

  const handleContinueNovel = (id = currentNovelId) => {
    const novel = novels.find(item => item.id === id);
    if (!novel) return;
    setNovels(prev => prev.map(item => item.id === id ? markNovelReadStarted(item) : item));
    setCurrentNovelId(id);
    setCurrentChapter(novel.lastReadChapter || 0);
    setScreen('reader');
  };

  const handleRenameNovel = (id, name) => {
    setNovels(prev => prev.map(novel => novel.id === id ? { ...novel, title: name } : novel));
  };

  const handleSelectChapter = (index) => {
    if (currentNovelId) {
      setNovels(prev => prev.map(novel => novel.id === currentNovelId ? markNovelReadStarted(novel) : novel));
    }
    setCurrentChapter(index);
    setScreen('reader');
  };

  const handleChangeChapter = (index) => {
    setCurrentChapter(index);
  };

  const handleUpdateProgress = useCallback((chapterIndex, scrollPos) => {
    setNovels(prev => prev.map(novel => (
      novel.id === currentNovelId
        ? {
            ...markNovelReadStarted(novel),
            ...updateChapterScrollProgress(novel, chapterIndex, scrollPos),
          }
        : novel
    )));
  }, [currentNovelId]);

  const updateCurrentNovelAiGeneration = useCallback((patch) => {
    if (!currentNovelId) return;
    setNovels(prev => prev.map(novel => {
      if (novel.id !== currentNovelId) return novel;
      return {
        ...novel,
        ...patch,
        aiGenerationJob: {
          ...(novel.aiGenerationJob || {}),
          ...(patch.aiGenerationJob || {}),
        },
      };
    }));
  }, [currentNovelId]);

  const handleUpdateBookPersonas = useCallback((novelId, allowedPersonaIds) => {
    const hasOverride = Array.isArray(allowedPersonaIds);
    const normalizedIds = hasOverride ? normalizeBookPersonaIds(allowedPersonaIds) : undefined;
    setNovels(prev => prev.map(novel => {
      if (novel.id !== novelId) return novel;
      const next = {
        ...novel,
        allowedPersonaIds: normalizedIds,
        aiGeneratedThrough: -1,
        aiCompletedChapters: [],
        aiGenerationJob: {},
      };
      if (!hasOverride) delete next.allowedPersonaIds;
      return next;
    }));
    clearNovelAiCache(novelId);
    if (novelId === currentNovelId) {
      setChapterAiState({ chapterIndex: null, status: 'idle', commentsByKey: {}, error: '', fingerprint: '' });
      setChapterDiscussionState({});
      setAiPrebuildState(createPrebuildState());
      firstChapterBundlePromiseRef.current = null;
      firstChapterBundleVisibleRef.current = false;
    }
    showToast({
      title: hasOverride ? '已更新本书 AI 书友' : '已恢复跟随全局书友',
      subtitle: hasOverride ? `当前允许 ${normalizedIds.length} 位书友出现。` : '这本书会使用全局启用的 AI 书友。',
    });
  }, [clearNovelAiCache, currentNovelId, showToast]);

  const markAiChapterComplete = useCallback((chapterIndex, jobPatch = {}) => {
    if (!currentNovelId) return;
    setNovels(prev => prev.map(novel => {
      if (novel.id !== currentNovelId) return novel;
      const progress = getNextAiGenerationProgress(novel, currentChapters.length, chapterIndex);
      const visibleJob = getVisibleAiGenerationJob({
        ...novel,
        aiGeneratedThrough: progress.aiGeneratedThrough,
      }, currentChapters.length);
      return {
        ...novel,
        aiGeneratedThrough: progress.aiGeneratedThrough,
        aiCompletedChapters: progress.aiCompletedChapters,
        aiGenerationJob: {
          ...visibleJob,
          ...jobPatch,
          lastCompletedChapter: progress.aiGeneratedThrough,
          updatedAt: Date.now(),
        },
      };
    }));
  }, [currentChapters.length, currentNovelId]);

  const handleAddUserComment = useCallback((paragraphKey, text, patch = {}) => {
    const comment = createReaderComment(text, patch);
    setUserComments(prev => {
      const existing = prev[paragraphKey] || [];
      const updated = {
        ...prev,
        [paragraphKey]: [...existing, comment],
      };
      lsSet(`rwm_comments_${currentNovelId}`, updated);
      return updated;
    });
    return comment;
  }, [currentNovelId]);

  const addCommentReply = useCallback((scopeKey, parentCommentId, reply) => {
    if (!scopeKey || !parentCommentId || !reply || !currentNovelId) return;
    setCommentReplies(prev => {
      const scopeReplies = prev[scopeKey] || {};
      const updated = {
        ...prev,
        [scopeKey]: {
          ...scopeReplies,
          [parentCommentId]: [
            ...(scopeReplies[parentCommentId] || []),
            reply,
          ],
        },
      };
      lsSet(buildCommentRepliesStorageKey(currentNovelId), updated);
      return updated;
    });
  }, [currentNovelId]);

  const handleToggleCommentLike = useCallback((comment) => {
    if (!currentNovelId || !comment?.id) return;
    setCommentLikes(prev => {
      const baseLikes = Math.max(0, Number(comment.likes) || 0);
      const current = prev[comment.id] || {
        likes: baseLikes,
        liked: Boolean(comment.liked),
      };
      const nextLiked = !current.liked;
      const nextLikes = Math.max(0, (Number(current.likes) || baseLikes) + (nextLiked ? 1 : -1));
      const updated = {
        ...prev,
        [comment.id]: {
          likes: nextLikes,
          liked: nextLiked,
        },
      };
      lsSet(buildCommentLikesStorageKey(currentNovelId), updated);
      return updated;
    });
  }, [currentNovelId]);

  const getRunnableProfileGroups = useCallback((activePersonas = currentBookPersonas) => {
    return groupPersonasByProfile(activePersonas, modelProfiles, defaultProfileId)
      .filter(group => liveSettings.proxyUrl.trim()
        && group.profile.baseUrl.trim()
        && group.profile.model.trim()
        && !/api\.example\.com/i.test(group.profile.baseUrl));
  }, [currentBookPersonas, defaultProfileId, liveSettings.proxyUrl, modelProfiles]);

  const selectReplyPersonas = useCallback((targetComment, limit = 2) => {
    const enabled = currentBookPersonas;
    if (!enabled.length) return [];
    const preferred = enabled.filter(persona => persona.id !== targetComment?.personaId);
    const pool = preferred.length ? preferred : enabled;
    const start = hashText(`${targetComment?.id || ''}-${targetComment?.text || ''}`) % pool.length;
    const ordered = [...pool.slice(start), ...pool.slice(0, start)];
    return ordered.slice(0, Math.max(1, limit));
  }, [currentBookPersonas]);

  const generateCommentReplies = useCallback(async ({
    scopeKey,
    parentComment,
    targetComment,
    chapterIndex,
    paragraphIndex,
    chapterTitle,
    paragraphText,
    userMessage,
    limit = 2,
    personas: selectedPersonas = [],
  }) => {
    if (!currentNovelId || !scopeKey || !parentComment?.id || !targetComment || !liveSettings.enabled) return 0;
    const allowedPersonaIds = new Set(currentBookPersonas.map(persona => persona.id));
    const manualReplyPersonas = (Array.isArray(selectedPersonas) ? selectedPersonas : [])
      .filter(persona => persona?.enabled !== false && allowedPersonaIds.has(persona.id));
    const replyPersonas = manualReplyPersonas.length ? manualReplyPersonas : selectReplyPersonas(targetComment, limit);
    const replyLimit = manualReplyPersonas.length ? manualReplyPersonas.length : limit;
    const profileGroups = getRunnableProfileGroups(replyPersonas);
    if (!replyPersonas.length || !profileGroups.length) return 0;

    const memoryArtifact = lsGet(buildChapterMemoryKey(currentNovelId, chapterIndex), null);
    const memorySummary = memoryArtifact?.payload?.plotSummary || '';
    const recentReplies = commentReplies?.[scopeKey]?.[parentComment.id] || [];

    const replyResults = await mapWithConcurrency(replyPersonas.slice(0, replyLimit), AI_REQUEST_CONCURRENCY, async (persona) => {
      const group = profileGroups.find(item => item.personas.some(candidate => candidate.id === persona.id)) || profileGroups[0];
      if (!group) return null;
      const replyProfile = group.profile;
      const apiKey = apiKeysByProfileId[replyProfile.id] || '';
      const body = {
        model: replyProfile.model,
        temperature: Math.min(1.1, Math.max(0.35, replyProfile.temperature)),
        max_tokens: Math.min(360, replyProfile.maxOutputTokens || 360),
        messages: [
          { role: 'system', content: 'Reply with comment text only in concise Simplified Chinese. Do not output JSON or Markdown.' },
          {
            role: 'user',
            content: buildCommentReplyPrompt({
              novelTitle: currentNovel?.title || '',
              chapterTitle,
              paragraphText,
              memorySummary,
              parentComment,
              targetComment,
              recentReplies,
              userMessage,
              persona,
            }),
          },
        ],
      };
      const replyText = normalizeCommentText(await aiClient.generateThreadReply(liveSettings.proxyUrl, replyProfile, apiKey, body));
      if (!replyText) return null;
      return { persona, replyText };
    });

    let generatedCount = 0;
    let firstError = null;
    for (const result of replyResults) {
      if (result.status === 'rejected') {
        if (!firstError) firstError = result.reason;
        continue;
      }
      const value = result.value;
      if (!value) continue;
      const { persona, replyText } = value;
      addCommentReply(scopeKey, parentComment.id, createReaderComment(replyText, {

  const ensureChapterSummary = useCallback(async (chapterIndex, chapterTitle, chapterText, force = false) => {
    if (!currentNovelId) return null;
    const fingerprint = `${currentBookAiFingerprint}:memory-v1`;
    const storageKey = buildChapterMemoryKey(currentNovelId, chapterIndex);
    const cached = lsGet(storageKey, null);
    if (!force && cached?.state === 'committed' && cached?.fingerprint === fingerprint) {
      return cached;
    }

    const previousArtifact = chapterIndex > 0
      ? lsGet(buildChapterMemoryKey(currentNovelId, chapterIndex - 1), null)
      : null;
    let previousSummary = previousArtifact?.state === 'committed'
      ? previousArtifact.payload
      : createEmptyMemorySummary(Math.max(0, chapterIndex - 1));
    const activePersonas = currentBookPersonas;
    const profileGroups = getRunnableProfileGroups(activePersonas);
    const summaryGroup = profileGroups.find(group => group.profile.id === defaultProfileId) || profileGroups[0] || null;

    let payload = createFallbackSummaryPayload({
      chapterIndex,
      chapterTitle,
      chapterText,
      previousSummary,
    });

    if (summaryGroup) {
      const apiKey = apiKeysByProfileId[summaryGroup.profile.id] || '';
      const body = {
        model: summaryGroup.profile.model,
        temperature: Math.min(0.7, Math.max(0.2, summaryGroup.profile.temperature)),
        max_tokens: Math.min(900, summaryGroup.profile.maxOutputTokens || 900),
        messages: [
          { role: 'system', content: 'Output strict JSON only. Use exactly the requested keys.' },
          {

              novelTitle: currentNovel?.title || '',
              chapterIndex,

              previousSummary,
              chapterText,
            }),
          },

      };
      try {
        const candidate = await aiClient.generateSummaryPayload(liveSettings.proxyUrl, summaryGroup.profile, apiKey, body);
        if (validateSummaryCandidate(candidate, chapterIndex).ok) {
          payload = candidate;
        }
      } catch {}
    }

    const committed = promoteSummaryArtifact(
      createSummaryArtifact(currentNovelId, chapterIndex, payload, fingerprint)
    );
