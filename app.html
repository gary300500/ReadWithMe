        && group.profile.baseUrl.trim()
        && group.profile.model.trim()
        && !/api\.example\.com/i.test(group.profile.baseUrl));
  }, [defaultProfileId, liveSettings.proxyUrl, modelProfiles, personas]);

  const ensureChapterSummary = useCallback(async (chapterIndex, chapterTitle, chapterText, force = false) => {
    if (!currentNovelId) return null;
    const fingerprint = `${liveTriggerKey}:memory-v1`;
    const storageKey = buildChapterMemoryKey(currentNovelId, chapterIndex);
    const cached = lsGet(storageKey, null);
    if (!force && cached?.state === 'committed' && cached?.fingerprint === fingerprint) {
      return cached;
    }

    const previousArtifact = chapterIndex > 0
      ? lsGet(buildChapterMemoryKey(currentNovelId, chapterIndex - 1), null)
      : null;
    let previousSummary = previousArtifact?.state === 'committed'
      ? previousArtifact.payload
      : createEmptyMemorySummary(Math.max(0, chapterIndex - 1));
    const activePersonas = personas.filter(persona => persona.enabled);
    const profileGroups = getRunnableProfileGroups(activePersonas);
    const summaryGroup = profileGroups.find(group => group.profile.id === defaultProfileId) || profileGroups[0] || null;

    let payload = createFallbackSummaryPayload({
      chapterIndex,
      chapterTitle,
      chapterText,
      previousSummary,
    });

    if (summaryGroup) {
      const apiKey = apiKeysByProfileId[summaryGroup.profile.id] || '';
      const body = {
        model: summaryGroup.profile.model,
        temperature: Math.min(0.7, Math.max(0.2, summaryGroup.profile.temperature)),
        max_tokens: Math.min(900, summaryGroup.profile.maxOutputTokens || 900),
        messages: [
          { role: 'system', content: 'Output strict JSON only. Use exactly the requested keys.' },
          {
            role: 'user',
            content: buildChapterMemoryPrompt({
              novelTitle: currentNovel?.title || '',
              chapterIndex,
              chapterTitle,
              previousSummary,
              chapterText,
            }),
          },
        ],
      };
      try {
        const candidate = await aiClient.generateSummaryPayload(liveSettings.proxyUrl, summaryGroup.profile, apiKey, body);
        if (validateSummaryCandidate(candidate, chapterIndex).ok) {
          payload = candidate;
        }
      } catch {}
    }

    const committed = promoteSummaryArtifact(
      createSummaryArtifact(currentNovelId, chapterIndex, payload, fingerprint)
    );
    lsSet(storageKey, committed);
    return committed;
  }, [apiKeysByProfileId, currentChapters, currentNovel?.title, currentNovelId, defaultProfileId, getRunnableProfileGroups, liveSettings.proxyUrl, liveTriggerKey, personas]);

  const ensureChapterComments = useCallback(async ({
    chapterIndex,
    chapterTitle,
    paragraphs,
    force = false,
    updateVisibleState = false,
  }) => {
    if (!currentNovelId) return {};
    if (!liveSettings.enabled) {
      if (updateVisibleState) {
        setChapterAiState({ chapterIndex, status: 'idle', commentsByKey: {}, error: '', fingerprint: liveTriggerKey });
      }
      return {};
    }

    const activePersonas = personas.filter(persona => persona.enabled);
    const profileGroups = getRunnableProfileGroups(activePersonas);
    if (!profileGroups.length) {
      if (updateVisibleState) {
        setChapterAiState({ chapterIndex, status: 'idle', commentsByKey: {}, error: '', fingerprint: liveTriggerKey });
      }
      return {};
    }

    const fingerprint = profileFingerprint(modelProfiles, personas, liveSettings.promptVersion, defaultProfileId);
    const cacheKey = buildAiCacheKey(currentNovelId, chapterIndex, fingerprint);
    if (!force) {
      const cached = lsGet(cacheKey, null);
      if (cached?.commentsByKey) {
        if (updateVisibleState) {
          setChapterAiState({ chapterIndex, status: 'success', commentsByKey: cached.commentsByKey, error: '', fingerprint });
        }
        return cached.commentsByKey;
      }
    }

    if (updateVisibleState) {
      setChapterAiState({ chapterIndex, status: 'loading', commentsByKey: {}, error: '', fingerprint });
    }

    const summaryArtifact = await ensureChapterSummary(chapterIndex, chapterTitle, paragraphs.join('\n\n'), force);
    const memorySummary = summaryArtifact?.payload?.plotSummary || '';

    const merged = {};
    const chunks = chunkParagraphs(paragraphs);
    const errors = [];
    let successCount = 0;
    for (const group of profileGroups) {
      try {
        const apiKey = apiKeysByProfileId[group.profile.id] || '';
        for (let index = 0; index < chunks.length; index++) {
          const rawComments = await aiClient.generateChunk(
            liveSettings.proxyUrl,
            group.profile,
            apiKey,
            chapterTitle,
            chunks[index],
            group.personas,
            memorySummary,
          );
          mergeCommentsByKey(
            merged,
            normalizeGeneratedComments(rawComments, group.personas, chapterIndex, group.profile.id, index),
          );
        }
        successCount += 1;
      } catch (error) {
        errors.push(`${group.profile.name || group.profile.model}: ${getErrorMessage(error)}`);
      }
    }

    if (!successCount) {
      if (updateVisibleState) {
        setChapterAiState({ chapterIndex, status: 'error', commentsByKey: {}, error: errors[0] || 'AI 评论生成失败', fingerprint });
      }
      return {};
    }

    const payload = { commentsByKey: merged, generatedAt: Date.now(), fingerprint };
    lsSet(cacheKey, payload);
    if (updateVisibleState) {
      setChapterAiState({ chapterIndex, status: 'success', commentsByKey: merged, error: '', fingerprint });
    }
    return merged;
  }, [apiKeysByProfileId, currentNovelId, defaultProfileId, ensureChapterSummary, getRunnableProfileGroups, liveSettings, liveTriggerKey, modelProfiles, personas]);

  const ensureChapterDiscussionSeed = useCallback(async ({
    chapterIndex,
    chapterTitle,
    chapterText,
    force = false,
    updateState = true,
  }) => {
    if (!currentNovelId) return [];
    const storageKey = buildChapterCommentKey(currentNovelId, chapterIndex);
    const fingerprint = profileFingerprint(modelProfiles, personas, liveSettings.promptVersion, defaultProfileId);
    const cached = lsGet(storageKey, null);
    if (!force && cached?.fingerprint === fingerprint && Array.isArray(cached?.comments) && cached.comments.length) {
      if (updateState) {
        setChapterDiscussionState(prev => ({
          ...prev,
          [storageKey]: { status: 'success', comments: cached.comments },
        }));
      }
      return cached.comments;
    }

    if (updateState) {
      setChapterDiscussionState(prev => ({
        ...prev,
        [storageKey]: { status: 'loading', comments: [] },
      }));
    }

    const summaryArtifact = await ensureChapterSummary(chapterIndex, chapterTitle, chapterText, force);
    const memorySummary = summaryArtifact?.payload?.plotSummary || '';
    const activePersonas = personas.filter(persona => persona.enabled);
    const seededPersonas = activePersonas.slice(0, 2);
    const profileGroups = getRunnableProfileGroups(activePersonas);
    let comments = [];

    if (profileGroups.length && seededPersonas.length) {
      for (const persona of seededPersonas) {
        const group = profileGroups.find(item => item.personas.some(candidate => candidate.id === persona.id)) || profileGroups[0];
        if (!group) continue;
        const apiKey = apiKeysByProfileId[group.profile.id] || '';
        const body = {
          model: group.profile.model,
          temperature: Math.min(1.05, Math.max(0.4, group.profile.temperature)),
          max_tokens: Math.min(420, group.profile.maxOutputTokens || 420),
          messages: [
            { role: 'system', content: 'Reply with comment text only in concise Simplified Chinese. Do not output JSON or Markdown.' },
            {
              role: 'user',
              content: buildChapterDiscussionPrompt({
                novelTitle: currentNovel?.title || '',
                chapterTitle,
                chapterText,
                memorySummary,
                personas: [persona],
              }),
            },
          ],
        };
        try {
          const text = normalizeText(await aiClient.generateThreadReply(liveSettings.proxyUrl, group.profile, apiKey, body));
          if (text) {
            comments.push(buildAiComment(persona, `chapter-${chapterIndex}`, chapterIndex, text, group.profile.id, {
              discussionMode: 'open',
            }));
          }
        } catch {}
      }
    }

    if (!comments.length) {
      const fallbackPersonas = seededPersonas.length ? seededPersonas : [DEFAULT_PERSONAS[0]];
      const fallbackTexts = [
        '这一章更像是在把后面的冲突慢慢压出来，表面不炸，底下已经很紧了。',
        '我更在意这章的人物状态变化，很多话没明说，但态度已经变了。',
      ];
      comments = fallbackPersonas.map((persona, index) => buildAiComment(
        persona,
        `chapter-${chapterIndex}`,
        chapterIndex,
        fallbackTexts[index % fallbackTexts.length],
        'chapter-demo',
        { discussionMode: 'open' },
      ));
    }

    lsSet(storageKey, { comments, generatedAt: Date.now(), fingerprint });
    if (updateState) {
      setChapterDiscussionState(prev => ({
        ...prev,
        [storageKey]: { status: 'success', comments },
      }));
    }
    return comments;
  }, [apiKeysByProfileId, currentNovel?.title, currentNovelId, defaultProfileId, ensureChapterSummary, getRunnableProfileGroups, liveSettings.promptVersion, liveSettings.proxyUrl, modelProfiles, personas]);

  const handleSendThreadMessage = useCallback(async ({
    threadKey,
    chapterIndex,
    paragraphIndex,
    chapterTitle,
    paragraphText,
    userText,
  }) => {
    if (!currentNovelId) return;
    const currentThread = aiThreads[threadKey] || createEmptyThread(threadKey);
    const userTurn = {
      id: uid(),
      role: 'user',
      text: userText,
      createdAt: Date.now(),
    };
    const nextTurns = [...currentThread.turns, userTurn];
    setAiThreads(prev => ({
      ...prev,
      [threadKey]: appendThreadTurn(prev[threadKey] || createEmptyThread(threadKey), userTurn),
    }));

    const activePersonas = personas.filter(persona => persona.enabled);
    const profileGroups = groupPersonasByProfile(activePersonas, modelProfiles, defaultProfileId)
      .filter(group => liveSettings.proxyUrl.trim()
        && group.profile.baseUrl.trim()
        && group.profile.model.trim()
        && !/api\.example\.com/i.test(group.profile.baseUrl));
    const persona = choosePersonaForParagraph(activePersonas, paragraphIndex);
    const memoryArtifact = lsGet(buildChapterMemoryKey(currentNovelId, chapterIndex), null);
    const memorySummary = memoryArtifact?.payload?.plotSummary || '';

    let replyText = '';
    let replyPersona = persona;
    let replyTag = persona?.tag || '书友';

    if (profileGroups.length && persona) {
      const group = profileGroups.find(item => item.personas.some(candidate => candidate.id === persona.id)) || profileGroups[0];
      const replyProfile = group.profile;
      const apiKey = apiKeysByProfileId[replyProfile.id] || '';
      const body = {
        model: replyProfile.model,
        temperature: Math.min(1.1, Math.max(0.4, replyProfile.temperature)),
        max_tokens: Math.min(500, replyProfile.maxOutputTokens || 500),
        messages: [
          { role: 'system', content: '你只输出回答正文，不要输出 JSON，不要使用 Markdown。' },
          {
            role: 'user',
            content: buildThreadReplyPrompt({
              novelTitle: currentNovel?.title || '',
              chapterTitle,
              paragraphText,
              memorySummary,
              threadSummary: currentThread.summary || '',
              threadTurns: nextTurns.slice(-6).map(turn => ({
                role: turn.role,
                text: turn.text,
                personaName: turn.personaName || '',
              })),
              userMessage: userText,
              persona,
            }),
          },
        ],
      };
      try {
        replyText = normalizeText(await aiClient.generateThreadReply(liveSettings.proxyUrl, replyProfile, apiKey, body));
      } catch (error) {
        replyText = '';
      }
      replyPersona = persona;
      replyTag = persona.tag;
    }

    if (!replyText) {
      const fallbackReplies = [
        '我觉得他不是突然退让，更像是在先把情绪压住，后面大概率还有动作。',
        '从这一段看，他像是意识到了代价，所以才会先收一步，不一定是真的认输。',
        '这里读起来像是短暂停顿，重点不是退，而是他已经开始重新判断局势了。',
      ];
      replyText = fallbackReplies[(hashText(`${paragraphText}-${userText}`) + paragraphIndex) % fallbackReplies.length];
      if (!replyPersona) {
        replyPersona = activePersonas[0] || DEFAULT_PERSONAS[0];
        replyTag = replyPersona.tag || '书友';
      }
    }

    const assistantTurn = {
      id: uid(),
      role: 'assistant',
      text: replyText,
      personaId: replyPersona?.id || '',
      personaName: replyPersona?.name || 'AI 书友',
      personaTag: replyTag,
      createdAt: Date.now(),
    };
    setAiThreads(prev => ({
      ...prev,
      [threadKey]: appendThreadTurn(prev[threadKey] || createEmptyThread(threadKey), assistantTurn),
    }));
  }, [aiThreads, apiKeysByProfileId, currentNovel?.title, currentNovelId, defaultProfileId, liveSettings.proxyUrl, modelProfiles, personas]);

  const handleOpenChapterDiscussion = useCallback(async ({
    chapterIndex,
    chapterTitle,
    chapterText,
  }) => {
    await ensureChapterDiscussionSeed({
      chapterIndex,
      chapterTitle,
      chapterText,
      force: false,
      updateState: true,
    });
  }, [ensureChapterDiscussionSeed]);

  const generateChapterComments = useCallback(async (chapterIndex, chapterTitle, paragraphs, force = false) => {
    await ensureChapterComments({
      chapterIndex,
      chapterTitle,
      paragraphs,
      force,
      updateVisibleState: true,
    });
  }, [ensureChapterComments]);

  useEffect(() => {
    if (screen !== 'reader' || !currentNovelId || !currentChapters.length || !liveSettings.enabled) return undefined;
    const queuedChapters = planPrebuildWindow({
      currentChapterIndex: currentChapter + 1,
      chapterCount: currentChapters.length,
      warmCount: 4,
    });
    if (!queuedChapters.length) {
      setAiPrebuildState(prev => ({ ...prev, running: false, queuedChapters: [], lastError: '' }));
      return undefined;
    }

    let cancelled = false;
    setAiPrebuildState(prev => ({
      ...prev,
      running: true,
      queuedChapters,
      lastError: '',
    }));

    (async () => {
      for (const index of queuedChapters) {
        if (cancelled) return;
        const chapter = currentChapters[index];
        if (!chapter) continue;
        await ensureChapterSummary(index, chapter.title || '', chapter.content || '', false);
        if (cancelled) return;
        await ensureChapterComments({
          chapterIndex: index,
          chapterTitle: chapter.title || '',
          paragraphs: String(chapter.content || '').split(/\n+/).map(item => item.trim()).filter(Boolean),
          force: false,
          updateVisibleState: false,
        });
        if (cancelled) return;
        await ensureChapterDiscussionSeed({
          chapterIndex: index,
          chapterTitle: chapter.title || '',
          chapterText: chapter.content || '',
          force: false,
          updateState: false,
        });
        if (cancelled) return;
        setAiPrebuildState(prev => ({
          ...prev,
          lastCompletedChapter: index,
          queuedChapters: prev.queuedChapters.filter(item => item !== index),
        }));
      }

      if (!cancelled) {
        setAiPrebuildState(prev => ({
          ...prev,
          running: false,
          queuedChapters: [],
          lastError: '',
        }));
      }
    })().catch(error => {
      if (!cancelled) {
        setAiPrebuildState(prev => ({
          ...prev,
          running: false,
          lastError: getErrorMessage(error),
        }));
      }
    });

    return () => {
      cancelled = true;
    };
  }, [currentChapter, currentChapters, currentNovelId, ensureChapterComments, ensureChapterDiscussionSeed, ensureChapterSummary, liveSettings.enabled, screen]);

const handleTestConnection = useCallback(async () => {
    if (!liveSettings.proxyUrl.trim() || !currentProfile.baseUrl.trim() || !currentProfile.model.trim()) {
      setConnectionState({
        status: 'error',
        message: '请先填写 Proxy URL、Base URL 和模型名称，再测试连接。',
        fingerprint: currentConnectionFingerprint,
      });
      return;
    }
    setConnectionState({ status: 'loading', message: '正在测试连接...', fingerprint: currentConnectionFingerprint });
    try {
      const result = await aiClient.testConnection(liveSettings.proxyUrl, currentProfile, currentApiKey);
      setConnectionState({
        status: 'success',
        message: `连接成功，模型 ${result.model || currentProfile.model} 已通过实测。`,
        fingerprint: currentConnectionFingerprint,
      });
    } catch (error) {
      setConnectionState({ status: 'error', message: getErrorMessage(error), fingerprint: currentConnectionFingerprint });
    }
  }, [liveSettings.proxyUrl, currentProfile, currentApiKey, currentConnectionFingerprint]);

  const handleDiscoverModels = useCallback(async () => {
    setIsDiscoveringModels(true);
    try {
      const models = await aiClient.listModels(liveSettings.proxyUrl, currentProfile, currentApiKey);
      setConnectionState({ status: 'success', message: models.length ? `已发现 ${models.length} 个模型。` : '端点可连通，但没有返回模型列表。' });
      if (!currentProfile.model && models[0]?.id) updateCurrentProfile({ model: models[0].id });
    } catch (error) {
      setConnectionState({ status: 'error', message: getErrorMessage(error) });
    } finally {
      setIsDiscoveringModels(false);
    }
  }, [liveSettings.proxyUrl, currentProfile, currentApiKey, updateCurrentProfile]);

  const handleAddFriend = useCallback(() => {

    setScreen('friendCreate');

  const handleSaveFriend = (draft, mode = 'edit') => {

      setPersonas(prev => [...prev, normalizePersona(draft, prev.length)]);
      showToast({ title: 'AI书友创建成功', subtitle: '已添加到你的AI书友列表' });
    } else {
      setPersonas(prev => prev.map(persona => persona.id === draft.id ? normalizePersona(draft) : persona));
      showToast({ title: '已保存AI书友设置', subtitle: '设置已成功保存' });
    }
    setScreen('friends');
  };

  const settingsObj = {
    fontSize,
    setFontSize,
    lineHeight,
    setLineHeight,
    theme,
    setTheme,
    liveSettings,
    setLiveSettings,
    modelProfiles,
    selectedProfileId,
    setSelectedProfileId,
    defaultProfileId,
    addModelProfile,
    setDefaultProfileId,
    currentProfile,
    updateCurrentProfile,
    currentApiKey,
    setCurrentApiKey,
    connectionState,
    isDiscoveringModels,
    personas,
    setPersonas,
    onTestConnection: handleTestConnection,
    onDiscoverModels: handleDiscoverModels,
    liveTriggerKey,
    currentConnectionFingerprint,
  };

  return (
    <>
      {screen === 'bookshelf' && (
        <BookshelfScreen
          novels={novels}
          onSelectNovel={handleSelectNovel}
          onImport={handleImport}
          onDeleteNovel={handleDelete}
          onRenameNovel={handleRenameNovel}

          onNavigate={navigateTab}
          toast={appToast}
        />
      )}
      {screen === 'chapters' && currentNovel && (
        <ChapterListScreen
          novel={currentNovel}
          chapters={currentChapters}
          onSelectChapter={handleSelectChapter}
          onBack={() => setScreen('bookshelf')}
          onContinue={() => handleContinueNovel(currentNovel.id)}
          onDeleteNovel={handleDelete}
          onRenameNovel={handleRenameNovel}
          toast={appToast}
        />
      )}
      {screen === 'reader' && currentNovel && currentChapters.length > 0 && (
        <ReaderScreen
          novel={currentNovel}
          chapters={currentChapters}
          chapterIndex={currentChapter}
          onBack={() => setScreen('chapters')}
          onChangeChapter={handleChangeChapter}
          onUpdateProgress={handleUpdateProgress}
          settings={settingsObj}
          userComments={userComments}
          aiThreads={aiThreads}
          onAddUserComment={handleAddUserComment}
          onSendThreadMessage={handleSendThreadMessage}
          aiState={chapterAiState}
          chapterDiscussionComments={chapterDiscussionState[buildChapterCommentKey(currentNovelId, currentChapter)]?.comments || []}
          chapterDiscussionStatus={chapterDiscussionState[buildChapterCommentKey(currentNovelId, currentChapter)] || { status: 'idle', comments: [] }}
          aiPrebuildState={aiPrebuildState}
          onOpenChapterDiscussion={handleOpenChapterDiscussion}
          onGenerateChapter={generateChapterComments}
        />
      )}
      {screen === 'settings' && (
        <SettingsScreen settings={settingsObj} onNavigate={navigateTab} />
      )}
      {screen === 'friends' && (
        <AiFriendsScreen
          personas={personas}
          onNavigate={navigateTab}
          onEditFriend={handleEditFriend}
          onAddFriend={handleAddFriend}
          toast={appToast}
        />

      {screen === 'friendEdit' && (
        <FriendEditScreen
          persona={personas.find(persona => persona.id === editingPersonaId)}
          modelProfiles={modelProfiles}
          defaultProfileId={defaultProfileId}
          onBack={() => setScreen('friends')}
          onSave={handleSaveFriend}
          onNavigate={navigateTab}
        />
      )}
      {screen === 'friendCreate' && (
        <FriendEditScreen
          mode="create"
          modelProfiles={modelProfiles}
          defaultProfileId={defaultProfileId}
          onBack={() => setScreen('friends')}
          onSave={handleSaveFriend}
          onNavigate={navigateTab}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
